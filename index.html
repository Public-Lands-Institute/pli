y listed at time of preserve dedication 1990, delisted by USFWS September 2021; population documented on preserve).","gps":"38.9989° N, 84.8153° W","primary_nation":"Shawnee","agency_type":"State nature preserve"}},{"type":"Feature","geometry":{"type":"Point","coordinates":[-84.0365,39.5146]},"properties":{"slug":"caesar-creek","name":"Caesar Creek State Park","state":"OH","acreage":"7,530","geology":"~447 Mya Ordovician limestone and shale.","epoch":"Late Ordovician (Cincinnatian Series); Waynesville, Liberty, and Whitewater formations.","hydrology":"Caesar Creek is a tributary of the Little Miami River (a National Wild and Scenic River), draining a 237-square-mile watershed in Warren, Clinton, and Greene counties; the U.S. Army Corps of Engineers dam (completed 1978) impounds a 2,830-acre reservoir; Anderson Fork converges with Caesar Creek at the former site of New Burlington.","native_lands":"Shawnee (Shawanwaki) · Myaamia (Miami) · Hopewell culture (300 BCE-600 CE) · Fort Ancient culture (1200-1600 CE); Fort Ancient Earthworks, a UNESCO World Heritage Site, located in Warren County; creek named for Caesar, an enslaved Virginian who escaped bondage c. 1774, was adopted by the Shawnee, and used the valley as hunting grounds; Shawnee and Miami ceded southern Ohio via Treaty of Greenville 1795; remaining Ohio Shawnee removed west via Treaty of Wapakoneta 1831.","displacement_tenure":"Cession 11: Treaty of Greenville (1795); U.S. Army Corps of Engineers began acquiring Caesar Creek Valley land in the mid-1960s under eminent domain authority of the Flood Control Act of 1938; construction started 1971, dam completed 1978; village of New Burlington condemned and inundated, approximately 300 residents displaced involuntarily; last resident departed April 20, 1973; state park opened 1978, managed by Ohio DNR under lease from the Army Corps.","shadow_history":"The creation of Caesar Creek Lake required the forced inundation of New Burlington, a functioning rural community straddling the Warren/Clinton County line at the confluence of Caesar Creek and Anderson Fork. Approximately 300 residents were displaced beginning in the mid-1960s when the Army Corps of Engineers began acquiring land under eminent domain; the last resident, 87-year-old Lawrence Mitchner, departed April 20, 1973, after refusing to meet with Corps appraisers. The community included a post office, Quaker meetinghouse, school, churches, a Masonic lodge, and farms. John Baskin documented the displacement in New Burlington: The Life and Death of an American Village (1976). The Caesar's Creek Quaker Meetinghouse was relocated rather than demolished. A 1976 archaeological reconnaissance conducted prior to inundation documented pre-contact sites in the reservoir footprint; earlier surveys had recorded a Hopewell-era village of 60-70 acres near the creek, featuring burial mounds up to 8 feet high with 79 documented burials; these and other sites were permanently inundated without preservation. The creek's name carries an additional layer: it memorializes Caesar, an enslaved Virginian who escaped bondage c. 1774 and was adopted into the Shawnee nation, a detail absent from most park signage.","ecology":"Oak-hickory and beech-maple upland forests with northern floodplain forest in creek valleys; restored native prairie and wetland complexes support grassland-dependent birds including grasshopper sparrow, Eastern meadowlark, bald eagle, and osprey; over 200 bird species recorded.","conservation_status":"Ohio State Park (ODNR, opened 1978, leased from U.S. Army Corps of Engineers); Caesar Creek Lake Wildlife Area (3,100 acres, ODNR Division of Wildlife); Caesar Creek Important Bird Area (Audubon Society of Ohio).","endangered_species":"Indiana bat (Myotis sodalis, federally endangered); northern long-eared bat (Myotis septentrionalis, federally endangered 2022); snuffbox mussel (Epioblasma triquetra, federally endangered) potentially present in watershed.","gps":"39.5146° N, 84.0365° W","primary_nation":"Shawnee","agency_type":"State park"}},{"type":"Feature","geometry":{"type":"Point","coordinates":[-84.8084,39.1207]},"properties":{"slug":"shawnee-lookout","name":"Shawnee Lookout","state":"OH","acreage":"2,179","geology":"~450 Mya Ordovician limestone and shale.","epoch":"Late Ordovician (Cincinnatian Series); Waynesville and Arnheim formations.","hydrology":"Confluence of the Ohio River and Great Miami River at the park's southern and western margins; headwater streams drain west from the ridge to the Great Miami; more than 9,000 feet of headwater streams were buried in culverts during 1979 golf course construction and are being daylighted beginning 2025; Great Miami watershed.","native_lands":"Adena culture · Hopewell tradition · Fort Ancient culture · Shawnee (Shawanwaki) · Myaamia (Miami); site occupied continuously for approximately 14,000 years; Hopewell builders constructed the Miami Fort earthwork complex approximately 2,000 years ago -- a water management and ceremonial enclosure nearly 6 km in extent, the largest of its kind in Ohio; Fort Ancient culture succeeded Hopewell occupation; Shawnee cultural continuity with the earthwork builders documented by University of Cincinnati archaeologists; the Treaty of Fort Finney (January 31, 1786) was signed at Fort Finney, a U.S. military post erected at the mouth of the Great Miami River directly below the Miami Fort earthwork; Shawnee delegates were coerced under military threat; the broader Shawnee nation repudiated the treaty, triggering the Northwest Indian War; full cession came via Treaty of Greene Ville 1795 following Battle of Fallen Timbers 1794.","displacement_tenure":"Cession 11: Treaty of Greene Ville (1795); land acquired by Hamilton County Park District (founded 1930), later Great Parks of Hamilton County; Shawnee Lookout Golf Course operated 1979-2019 on portions of the Shawnee Lookout Archaeological District.","shadow_history":"The Shawnee Lookout Archaeological District was listed on the National Register of Historic Places in 1974 (NRHP #74001516), recognizing it as one of the most significant Native American hilltop sites in the eastern United States; the listing did not prevent the Hamilton County Park District from constructing the Shawnee Lookout Golf Course in 1979 directly over portions of the archaeological district, burying more than 9,000 feet of headwater streams in culverts and grading land across an active site of national significance; cart paths were laid across the earthwork landscape; the golf course operated until 2019. University of Cincinnati archaeologist Ken Tankersley's fieldwork in 2008-2009 revealed via LiDAR survey that the Miami Fort earthwork complex is approximately twice the size recorded by the standard 19th-century maps, suggesting that major portions of the site were unmapped, unprotected, and potentially altered for over 150 years. The foundational documentation of the site came from E.G. Squier and Edwin Davis's 1847-1848 survey, published as the Smithsonian's first monograph, Ancient Monuments of the Mississippi Valley (1848); in the course of that survey Squier and Davis collected more than 6,000 objects from Ohio Valley mounds and enclosures; Squier sold the collection to a British collector in 1864 for $10,000, and it was transferred to the British Museum in 1931, where it remains today; which objects originated at Miami Fort specifically has not been confirmed in accessible public records. Stream daylighting and archaeological district restoration began 2025 in partnership with The Nature Conservancy, with the Miami Tribe of Oklahoma's Tribal Historic Preservation Office actively consulted on the identification of intact sites and sacred areas.","ecology":"Upland deciduous ridge forest above the Ohio and Great Miami River confluence; pawpaw groves host the largest zebra swallowtail butterfly population in Hamilton County; spicebush understory; tallgrass prairie remnants along trail corridors; bottomland forest along the Great Miami; more than 500 plant species documented; cerulean warbler, bald eagle, and fox squirrel present; adjacent Oxbow wetlands (914 acres) support 270+ bird species.","conservation_status":"Great Parks of Hamilton County; Shawnee Lookout Archaeological District, National Register of Historic Places (listed December 2, 1974).","endangered_species":"running buffalo clover (Trifolium stoloniferum, federally listed 1987, delisted 2021); bald eagle present (delisted).","gps":"39.1207° N, 84.8084° W","primary_nation":"Shawnee","agency_type":"County park"}},{"type":"Feature","geometry":{"type":"Point","coordinates":[-84.6878,39.2922]},"properties":{"slug":"fernald-preserve","name":"Fernald Preserve","state":"OH","acreage":"1,050","geology":"~450 Mya Ordovician limestone and shale.","epoch":"Late Ordovician (Cincinnatian Series).","hydrology":"Paddys Run watershed; Paddys Run, a 9-mile tributary of the Great Miami River, flows through the western preserve and drains approximately 16 square miles before joining the Great Miami at Crosby Township; a losing stream that recharges the Great Miami Buried Valley Aquifer directly below the site; uranium contamination in the aquifer confirmed; active groundwater pump-and-treat system ongoing.","native_lands":"Myaamia (Miami) · Shawnee (Shawanwaki) · Fort Ancient culture (900-1650 CE); Great Miami River valley a core Myaamia territory, river named for the nation; Fort Ancient people, widely regarded as Shawnee ancestors, occupied bluffs above the river; Shawnee and Miami among signatories who ceded southwestern Ohio via Treaty of Greene Ville 1795 following Battle of Fallen Timbers 1794; Myaamia removed to Kansas then Indian Territory (present-day Oklahoma) by 1846.","displacement_tenure":"Cession 11: Treaty of Greene Ville (1795); Atomic Energy Commission condemned and acquired the 1,050-acre Fernald tract in 1951 from eleven private landowners at $375-$652 per acre; three owners who refused sale were dispossessed via federal court condemnation decree April 24, 1951; AEC transferred management to the Department of Energy; site decommissioned 1989; cleanup completed 2006; transferred to DOE Office of Legacy Management November 17, 2006; opened as Fernald Preserve 2007.","shadow_history":"From 1951 to 1989 the site operated as the Fernald Feed Materials Production Center (FMPC), a classified uranium metal refining plant processing ore for the U.S. nuclear weapons program under the Atomic Energy Commission and later the Department of Energy; operated by National Lead Company of Ohio 1951-1986, then Westinghouse; produced approximately 170,000 metric tons of uranium metal products over 38 years. DOE and its contractors concealed ongoing contamination from residents for decades: uranium dust was released into air and groundwater throughout the 1950s-1980s; DOE knew by 1980 that private wells near the site were contaminated with uranium but did not disclose this to residents for four years. In 1984 a broken filtration system released approximately 275 pounds of uranium oxide dust off-site. K-65 silos on the site's western end stored radium-226-contaminated waste from uranium ore residues, a persistent source of radon gas; NIOSH documented elevated lung cancer risk among workers exposed to the K-65 radon plume. In 1984 Lisa Crawford, a renter on adjacent property who discovered her well was contaminated, founded Fernald Residents for Environmental Safety and Health (FRESH) and sued the Department of Energy that same year. Also in 1984, pipefitter David Bocks, 39, disappeared during a night shift; his remains were found in a uranium oxide furnace operating at 1,350 degrees; OSHA investigation ruled the death accidental, but coworkers and family disputed this, alleging he had documented plant emissions violations before his death; the case was cited in federal congressional testimony on contractor conduct at DOE weapons facilities. A class-action lawsuit (In re Fernald Litigation, Case No. C-1-85-149) produced a 1989 settlement of $78 million for 9,764 residents within five miles, covering emotional distress, property value loss, and an 18-year medical monitoring program (1990-2008); documented outcomes in the cohort included elevated rates of kidney and urinary tract cancers, lupus, and renal disease. In 1994, plant workers won a separate $20 million settlement for emotional distress and lifetime medical monitoring. EPA designated Fernald a Superfund priority in 1989; cleanup cost $4.4 billion over fifteen years, entombing more than 925,000 cubic yards of low-level radioactive waste under eight capped on-site disposal cells beneath a permanent mound. Uranium contamination of the Great Miami Buried Valley Aquifer was confirmed; pump-and-treat groundwater remediation begun in 1993 continues, with monitoring expected into the late 2030s. The site is permanently restricted from residential use by institutional controls.","ecology":"Restored tallgrass prairie, wetlands, and upland forest on reclaimed nuclear weapons production land; 360 acres of prairie and savanna supporting Dickcissel, Bobolink, Grasshopper Sparrow, and Eastern Meadowlark; 400 acres of shingle oak and sycamore-cottonwood forest; 140 acres of wetlands including three open-water lakes supporting migratory waterfowl and shorebirds; more than 250 bird species recorded since 2008.","conservation_status":"DOE Office of Legacy Management (long-term stewardship under CERCLA and RCRA); Fernald Natural Resource Trustees: DOE, USFWS, and Ohio EPA; EPA Superfund National Priorities List, listed 1989, remediation complete 2006.","endangered_species":"none confirmed.","gps":"39.2922° N, 84.6878° W","primary_nation":"Myaamia","agency_type":"DOE legacy site"}},{"type":"Feature","geometry":{"type":"Point","coordinates":[-85.4188,38.7608]},"properties":{"slug":"clifty-falls-state-park","name":"Clifty Falls State Park","state":"IN","acreage":"1,416","geology":"~445 Mya Ordovician limestone and shale.","epoch":"Late Ordovician; Dillsboro Formation (shale and limestone) on lower canyon slopes; Saluda Formation (limestone and dolomite) capping waterfall crests and upper cliffs.","hydrology":"Clifty Creek drains through a 300-foot-deep canyon to the Ohio River; four major waterfalls including Tunnel Falls (83 ft) and Hoffman Falls (78 ft); drainage pattern established during Pleistocene glaciation when streams were redirected southward to the newly formed Ohio River valley.","native_lands":"Shawandasse Tula (Shawnee) · Myaamia (Miami); Ohio River valley ancestral Shawnee homeland; Shawnee displaced from the Ohio valley following the American Revolution; Treaty of Greenville 1795 ceded southeastern Indiana to the United States; Shawnee, Miami, and allied nations removed from Indiana under the Indian Removal Act 1830.","displacement_tenure":"Cession 56: Treaty with the Delawares, Pottawatimies, Miames, Eel River, and Weas (1805); 570-acre core acquired October 27, 1920 via joint purchase by Jefferson County citizens and the State of Indiana, initiated by state parks director Richard Lieber; Madison State Hospital transferred adjacent farm fields to the park in 1965, expanding total acreage to approximately 1,416 acres.","shadow_history":"Madison State Hospital (opened 1910 as Southeastern Indiana Hospital for the Insane) operated the adjacent farm fields under a patient-labor model in which psychiatric patients grew food, ran a dairy, and built roads without compensation; the Indiana legislature determined in the 1960s that this constituted indentured servitude, leading the hospital to discontinue farming rather than pay patients; the farm fields transferred to the park in 1965 were worked under this system for at least four decades; an institutional cemetery on hospital grounds holds an estimated 300 to 400 burials, the majority marked only with metal crosses bearing patient numbers rather than names.","ecology":"Mixed deciduous forest with chestnut oak, post oak, and black oak on dry canyon rim slopes; beech and sycamore in canyon bottoms; Clifty Canyon State Nature Preserve protects one of Indiana's finest gorge ecosystems.","conservation_status":"Indiana State Park; Clifty Canyon State Nature Preserve.","endangered_species":"Indiana bat, northern long-eared bat.","gps":"38.7608° N, 85.4188° W","primary_nation":"Shawnee","agency_type":"State park"}},{"type":"Feature","geometry":{"type":"Point","coordinates":[-84.4233,39.1991]},"properties":{"slug":"french-park","name":"French Park","state":"OH","acreage":"275","geology":"~450 Mya Ordovician limestone and shale.","epoch":"Late Ordovician (Cincinnatian Series).","hydrology":"Amberley Creek flows through the park, a tributary of Mill Creek, which drains 166 square miles of Hamilton County to the Ohio River; creek bed exposes fossiliferous Ordovician limestone.","native_lands":"Hopewell tradition · Shawnee (Shawanwaki) · Myaamia (Miami); Benham Mound, an 8-foot Hopewell burial mound within the park with recovered mica indicating long-distance trade networks, listed on the National Register of Historic Places 1974; Adena culture earthworks documented throughout Hamilton County; Shawnee and Miami held the Ohio River valley at European contact; ceded Ohio lands via Treaty of Greenville 1795 following Battle of Fallen Timbers 1794.","displacement_tenure":"Cession 11: Treaty of Greene Ville (1795); former 275-acre estate of Herbert Greer French, bequeathed to the Cincinnati Park Board upon French's death in 1942, including the brick manor house; land was part of the John Cleves Symmes Congressional land purchase of the 1790s.","shadow_history":"The Benham Mound within the park, a Hopewell burial mound listed on the National Register of Historic Places in 1974, was excavated by local residents in the late 19th century; the diggings recovered mica deposits, stone tools, axes, scrapers, chisels, and flint projectile points; no institutional repository for the recovered material and no record of human remains from these excavations have been identified in accessible records; Herbert Greer French, who bequeathed the estate to the Cincinnati Park Board in 1942, was a vice president of Procter and Gamble.","ecology":"Mixed mesophytic forest with oak-hickory woodlands, beech-maple slopes, and pawpaw thickets; meadow and prairie patches support pollinators; creek corridor hosts sycamore and tulip-poplar with exposed Ordovician fossil beds.","conservation_status":"Cincinnati Park Board property; Benham Mound listed on the National Register of Historic Places (1974).","endangered_species":"none documented.","gps":"39.1991° N, 84.4233° W","primary_nation":"Hopewell","agency_type":"Municipal park"}},{"type":"Feature","geometry":{"type":"Point","coordinates":[-84.7025,36.5072]},"properties":{"slug":"big-south-fork-national-river-and-recreation-area","name":"Big South Fork National River and Recreation Area","state":"TN","acreage":"125,000","geology":"~310 Mya Pennsylvanian sandstone and conglomerate.","epoch":"Pennsylvanian.","hydrology":"Cumberland River watershed via the Big South Fork of the Cumberland River, a 76-mile free-flowing river formed by the confluence of the New River and Clear Fork in Scott County, Tennessee; the gorge system features steep-walled sandstone canyons, waterfalls, and seeps across 472+ miles of streams.","native_lands":"Cherokee (Aniyunwiya) held the Cumberland Plateau as ancestral hunting territory, with rockshelter camps documented throughout the gorge zone; Yuchi (Tsoyaha) occupied the plateau prior to Cherokee dominance; Shawnee (Shawanwaki) used the region as hunting grounds following the Beaver Wars in the 1660s; Cherokee ceded adjacent plateau lands via the First Treaty of Tellico 1798 and remaining Cumberland Plateau territory via the Third Treaty of Tellico 1805; Cherokee removed to Oklahoma via the Trail of Tears 1838-1839.","displacement_tenure":"Cession 57: Treaty with the Cherokee (1805); established by the Water Resources Development Act of 1974 (P.L. 93-251); Army Corps of Engineers began acquisition in 1979 across approximately 125,000 acres; Stearns Coal and Lumber Company had conveyed surface rights on 46,842 acres to the United States by deed in 1937 while retaining mineral rights; litigation over whether retained mineral rights authorized strip mining on federal surface produced United States v. Stearns Coal and Lumber Co., 816 F.2d 279 (6th Cir. 1987), affirming that the 1937 deed's silence on strip mining did not permit destruction of the conveyed surface.","shadow_history":"Abandoned surface and deep coal mines throughout the park, the highest concentration of any NPS unit in the region, produce ongoing acid mine drainage; Roaring Paunch Creek and multiple tributaries carry contamination the NPS characterizes as potentially harmful to humans, with remediation underway under the Infrastructure Investment and Jobs Act; when word spread that the Army Corps of Engineers was authorized to acquire land under the 1974 act, large private landholders including Stearns Coal and Lumber accelerated logging and mining operations on their holdings before condemnation could proceed, extracting maximum value from land they knew would be taken; Blue Heron, the last Stearns company town in the gorge, was abandoned in 1962 after coal reserves were exhausted, leaving residents to relocate independently before Corps acquisition began in 1979.","ecology":"Mixed mesophytic and oak-hickory forest dominates the upland plateau, with hemlock ravine forest and floodplain forest in the gorge zone; mountain laurel and rhododendron are prominent understory species, and sandstone cliffs host rare endemics including Cumberland cliff sedge and Appalachian shoestring fern.","conservation_status":"National River and Recreation Area; Kentucky Wild River (Blue Heron section).","endangered_species":"Cumberland elktoe, Cumberlandian combshell, tan riffleshell, little-wing pearly mussel, Cumberland bean pearly mussel, duskytail darter, palezone shiner, blackside dace.","gps":"36.5072° N, 84.7025° W","primary_nation":"Cherokee","agency_type":"NPS"}},{"type":"Feature","geometry":{"type":"Point","coordinates":[-86.1,37.1877]},"properties":{"slug":"mammoth-cave-national-park","name":"Mammoth Cave National Park","state":"KY","acreage":"54,012 acres","geology":"~340 million years ago (limestone bedrock); cave passages formed over last 10 million years.","epoch":"Mississippian period; St. Louis and Ste. Genevieve limestone formations; karst dissolution ongoing since Pliocene.","hydrology":"Green River and Nolin River; vast karst aquifer; 400+ miles of surveyed passages; Echo River flows underground.","native_lands":"Shawnee (Shawanwaki) · Cherokee · Chickasaw · Osage; cave known to indigenous peoples 4,000+ years; mummified remains recovered from deep passages; forced removal from Kentucky by early 19th century.","displacement_tenure":"Cherokee, Shawnee, and Yuchi territory; no federal cession treaty identified for this location; saltpeter mined by enslaved African American men, many leased from neighboring states, under ownership of Charles Wilkins and Fleming Gatewood during the War of 1812 era, producing approximately 115,000 pounds of saltpeter in 1814; Stephen Bishop, Mat Bransford, and Nicholas Bransford, all enslaved, served as the cave's primary guides beginning in 1838, mapping its passages and building its national reputation; Congress authorized the park in 1926, triggering eminent domain proceedings against more than 600 farming families; park formally established July 1, 1941.","shadow_history":"In 1842, cave owner Dr. John Croghan moved 16 tuberculosis patients into the cave believing its constant temperature would cure consumption; enslaved workers built two stone cottages and eight wooden huts inside the cave; five patients died inside the cave, their bodies laid on what became known as Corpse Rock; Croghan died of tuberculosis in 1849; CCC Company 510, an all-Black company and the first CCC camp established in Kentucky (May 22, 1933), was placed at Mammoth Cave specifically because of its remoteness from white communities; when the Decree of Eminent Domain was issued against 507 families on 54,000 acres, Black families who had lived and worked the land were displaced without provision for resettlement, while white men retained their positions as guides; landowners widely reported receiving below-market compensation, and more than 70 cemeteries remain within park boundaries today; a pre-Columbian man now called Lost John was displayed publicly in the cave until the mid-1970s; a mummified woman known as Fawn Hoof, recovered in 1811, was exhibited at the 1876 and 1893 World's Fairs and transferred to the Smithsonian where the remains are held today.","ecology":"Temperate deciduous forest above; cave ecosystem with endemic troglobitic species; endangered Indiana bat and Kentucky cave shrimp; Green River corridor.","conservation_status":"National Park; UNESCO World Heritage Site; UNESCO International Biosphere Reserve; International Dark Sky Park; Kentucky Wild River (Green River).","endangered_species":"Indiana bat, gray bat, northern long-eared bat, Kentucky cave shrimp, Eggert's sunflower.","gps":"37.1877° N, 86.1000° W","primary_nation":"Shawnee","agency_type":"NPS"}},{"type":"Feature","geometry":{"type":"Point","coordinates":[-93.9308,29.6776]},"properties":{"slug":"sea-rim-state-park","name":"Sea Rim State Park","state":"TX","acreage":"15,109 acres","geology":"~11,700 years ago - present.","epoch":"Holocene (Meghalayan age); Quaternary period.","hydrology":"Gulf of Mexico shoreline; Sabine Lake; Intracoastal Waterway; tidal marsh drainage.","native_lands":"Ishak (Atakapa-Ishak) · Akokisa (Eastern Atakapa) peoples; Gulf coastal territory occupied continuously since the end of the last Ice Age.","displacement_tenure":"No federal cession treaty identified for Atakapa-Ishak territory in coastal southeast Texas; the Atakapa-Ishak hold no ratified treaty with the United States and are not federally recognized; park site purchased by the State of Texas in 1972 from the Planet Oil and Mineral Corporation and Horizon Sales Corporation; the park opened in 1977 and was closed following Hurricane Rita (2005) and Hurricane Ike (2008), reopening in 2010.","shadow_history":"The park was purchased in 1972 from the Planet Oil and Mineral Corporation; active oil rigs remain visible from the park beach, and the site lies within Jefferson County, where the Spindletop salt dome discovery of 1901 launched the modern petroleum industry; the park's tidal marsh system is hydrologically connected to multiple federal hazardous waste sites in the Port Arthur-Beaumont corridor, including the Star Lake Canal Superfund site and contaminated wetlands from a former Chevron refinery; Hurricane Rita (2005) closed the park for nearly five years -- Hurricane Ike (2008) struck during the closure, compounding damage -- with the park partially reopening April 2010 and reaching full restoration by June 2014; during the closure, regional refinery and tank farm spills totaling approximately 8 million gallons contaminated the coastal zone; the site was formally designated as experiencing natural resource damages from the 2010 Deepwater Horizon blowout, receiving NOAA Gulf Spill Restoration funding for coastal dune restoration as a documented injured resource.","ecology":"Tidal salt marsh; chenier ridge; Gulf beach; critical migratory bird corridor (Central Flyway).","conservation_status":"Texas State Park.","endangered_species":"piping plover.","gps":"29.6776° N, 93.9308° W","primary_nation":"Ishak (Atakapa-Ishak)","agency_type":"State park"}},{"type":"Feature","geometry":{"type":"Point","coordinates":[-101.0578,33.9778]},"properties":{"slug":"caprock-canyon","name":"Caprock Canyon State Park","state":"TX","acreage":"15,313 acres","geology":"~299-2.6 million years ago (surface strata).","epoch":"Permian through Pliocene; Quartermaster Formation (Permian, ~280 Mya); caliche caprock (Pliocene, ~5 Mya).","hydrology":"South Prong Little Red River; Lake Theo (reservoir); playa lakes; intermittent canyon streams.","native_lands":"Comanche (Nʉmʉnʉʉ) · Kiowa · Apache; territory of the Comancheria; Caprock Canyons part of the southern Comanche range; forced removal to Oklahoma reservations 1874-75.","displacement_tenure":"Cession 478: Treaty with the Comanche and Kiowa (Little Arkansas Treaty, 1865); Cession 511: Agreement with the Comanche, Kiowa, and Apache (Jerome Agreement, 1892, ratified 1900); Comanche and Kiowa bands used the canyon breaks as a refuge until Col. Ranald Mackenzie's Fifth Cavalry swept through during the Red River War campaign of 1874, forcing their return to the Fort Sill reservation; state purchased approximately 13,961 acres from the estate of rancher Theodore Geisler in May 1975; the park opened in 1982.","shadow_history":"The Texas State Bison Herd at Caprock Canyons descends from calves captured by Charles Goodnight beginning in 1878, immediately after the systematic extermination campaign of 1874 to 1878 reduced the southern plains bison population from an estimated tens of millions to fewer than 1,000 animals continent-wide; Folsom- and Archaic-period archaeological sites are documented throughout the canyon, and Texas Parks and Wildlife acknowledges that most have been disturbed, with many artifacts removed, though no specific prosecution for looting at this site appears in public records.","ecology":"Shortgrass prairie; canyon riparian; home to the official Texas State Bison Herd ; last free-ranging southern plains bison lineage.","conservation_status":"Texas State Park; International Dark Sky Park.","endangered_species":"lesser prairie-chicken.","gps":"33.9778° N, 101.0578° W","primary_nation":"Comanche","agency_type":"State park"}},{"type":"Feature","geometry":{"type":"Point","coordinates":[-101.6713,34.8873]},"properties":{"slug":"palo-duro-canyon","name":"Palo Duro Canyon State Park","state":"TX","acreage":"29,182 acres","geology":"~252-201 million years ago (exposed strata).","epoch":"Triassic (Carnian-Norian); Tecovas Formation (~225 Mya) and Trujillo Formation (~218 Mya); canyon incision began Pliocene (~5 Mya).","hydrology":"Prairie Dog Town Fork of the Red River; ephemeral tributaries; canyon springs.","native_lands":"Comanche (Nʉmʉnʉʉ) · Kiowa · Southern Cheyenne · Arapaho; earlier Apache; canyon occupied 12,000+ years; Battle of Palo Duro Canyon 1874 ended Comanche and Kiowa presence on the Southern Plains.","displacement_tenure":"Cession 478: Treaty with the Comanche and Kiowa (Little Arkansas Treaty, 1865); Cession 511: Agreement with the Comanche, Kiowa, and Apache (Jerome Agreement, 1892, ratified 1900); on September 28, 1874, Col. Ranald Mackenzie's troops entered Palo Duro Canyon at dawn, destroyed the winter encampments of Kiowa, Comanche, and Cheyenne bands, and slaughtered approximately 1,000 captured horses, breaking organized resistance; the canyon passed to private ranching, most prominently the JA Ranch established by Charles Goodnight and John Adair in 1876; approximately 15,000 acres purchased in 1933 from Fred A. Emery using a Federal Reconstruction Finance Corporation loan; the park was developed 1933 to 1937 by seven companies of the Civilian Conservation Corps.","shadow_history":"CCC Companies 2875 and 2876, composed of African American enrollees transferred from East Texas, arrived at Palo Duro in August 1935 and performed the same construction labor as four white companies already on site; the Texas State Parks Board chairman selected Palo Duro specifically for Black enrollees because its canyon location 13 miles from Amarillo made geographic isolation easier to enforce; Black Texans were legally barred from entering the park they built until the Texas State Parks system was desegregated under federal pressure in 1964; Texas Parks and Wildlife acknowledges that most of the canyon's archaeological sites have been picked over and many artifacts removed.","ecology":"Chihuahuan Desert transition; juniper-mesquite canyon scrub; cottonwood riparian corridor; pronghorn, mule deer, aoudad sheep.","conservation_status":"Texas State Park; National Natural Landmark.","endangered_species":"none documented.","gps":"34.8873° N, 101.6713° W","primary_nation":"Comanche","agency_type":"State park"}},{"type":"Feature","geometry":{"type":"Point","coordinates":[-90.848,37.553]},"properties":{"slug":"johnsons-shut-ins-state-park","name":"Johnson's Shut-Ins State Park","state":"MO","acreage":"8,916 acres","geology":"~1.47 billion years ago (bedrock).","epoch":"Proterozoic eon; Rhyacian period; St. Francois Mountains rhyolite and granite among the oldest exposed rock in Missouri; river incision Quaternary.","hydrology":"East Fork Black River; Taum Sauk Reservoir (upstream); shut-in pools and cascades; 2005 reservoir breach reshaped lower park terrain.","native_lands":"Osage Nation (Wazhazhe) · earlier Paleo-Indian peoples; Osage hunted throughout the St. Francois Mountains; ceded territory via 1808 treaty under duress.","displacement_tenure":"Cession 67: Treaty with the Osage (1808); on December 14, 2005, the Taum Sauk upper reservoir owned by AmerenUE failed, releasing approximately 1.4 billion gallons of water that destroyed the lower park; AmerenUE pled no contest to a federal Clean Water Act violation; a 2009 settlement awarded $102.3 million for park restoration, completed in 2010.","shadow_history":"The park was assembled over 17 years by Joseph Desloge, heir to a St. Louis lead-mining family whose wealth derived from mineral extraction in the same regional belt as the park's Precambrian geology, and donated to the state in 1955; a 2006 to 2007 USGS study following the 2005 reservoir breach documented elevated turbidity, dissolved aluminum, dissolved iron, and a blue-green surface coloration in the East Fork Black River attributed to rock flour and an alum-based flocculant used by AmerenUE; the East Fork Black River corridor has documented Paleo-Indian occupation extending to approximately 12,000 years BP, and whether the flood disturbed intact subsurface deposits has not been publicly assessed.","ecology":"Ozark Highland; dolomite glades; dry chert woodland; rare endemic species in igneous glade communities.","conservation_status":"Missouri State Park; Missouri State Natural Areas (Johnson's Shut-Ins Natural Area, Johnson's Shut-Ins Dolomite Glade Natural Area, Johnson's Shut-Ins Fen Natural Area); Missouri Wild Areas (East Fork Wild Area, Goggins Mountain Wild Area).","endangered_species":"none documented.","gps":"37.5530° N, 90.8480° W","primary_nation":"Osage","agency_type":"State park"}},{"type":"Feature","geometry":{"type":"Point","coordinates":[-90.726,37.637]},"properties":{"slug":"elephant-rocks-state-park","name":"Elephant Rocks State Park","state":"MO","acreage":"132 acres","geology":"~1.47 billion years ago (granite intrusion).","epoch":"Proterozoic eon; Rhyacian period; Graniteville Granite pluton emplaced during Midcontinent Rift precursor activity; spheroidal weathering forms developed over millions of subsequent years.","hydrology":"Headwaters of Stout Creek; ephemeral drainage between boulder fields.","native_lands":"Osage Nation (Wazhazhe) · earlier Archaic and Woodland period peoples; Osage ancestral domain included all of southern Missouri; forced removal 1825.","displacement_tenure":"Cession 67: Treaty with the Osage (1808); Iron County granite quarried commercially from 1869 under the Iron Mountain and Southern Railroad and successors, producing Missouri Red paving granite for the Eads Bridge piers and St. Louis streets; Dr. John Stafford Brown purchased the site and deeded 134 acres to the Missouri Department of Natural Resources in 1966, with a deed clause prohibiting commercial granite extraction for 99 years; the park opened in 1970.","shadow_history":"The Graniteville quarry operated beginning in 1869 as a company town with approximately 700 residents at peak; the company owned the hotel, post office, store, railroad depot, and workers' homes; the quarry supplied paving granite for the Eads Bridge piers and St. Louis streets; silica dust exposure in granite quarrying was a nationally documented occupational hazard by the 1890s, producing silicosis in quarry workers, though no site-specific injury or fatality records for Graniteville appear in accessible public records; two abandoned quarry pits remain within the park without documented environmental remediation.","ecology":"Igneous glade and savanna; rare lichen communities on granite surfaces; St. Francois Mountains endemic flora.","conservation_status":"Missouri State Park; Missouri State Natural Area (Elephant Rocks Natural Area).","endangered_species":"none documented.","gps":"37.6370° N, 90.7260° W","primary_nation":"Osage","agency_type":"State park"}},{"type":"Feature","geometry":{"type":"Point","coordinates":[-98.688,34.726]},"properties":{"slug":"charons-garden-wilderness-area","name":"Charon's Garden Wilderness Area","state":"OK","acreage":"5,723 acres","geology":"~525 million years ago (bedrock).","epoch":"Cambrian period; Furongian epoch; among the oldest exposed rock in the southern Great Plains; basement exhumed through erosion of overlying Paleozoic and Mesozoic cover.","hydrology":"Ephemeral streams draining granite uplands; vernal pools in boulder depressions; no permanent surface water.","native_lands":"Comanche (Nʉmʉnʉʉ) · Kiowa · Wichita (Kitikiti'sh) · Apache; Wichita Mountains used as refuge and gathering ground; Comanche and Kiowa held this territory until Kiowa-Comanche-Apache Reservation established 1867.","displacement_tenure":"Cession 510: Treaty with the Kiowa, Comanche, and Apache (Medicine Lodge Creek, 1867); Cession 485: Agreement with the Comanche, Kiowa, and Apache (Jerome Agreement, 1892, ratified 1900); Congress carved 61,500 acres directly out of the Kiowa-Comanche-Apache Reservation as the Wichita Forest Reserve on July 4, 1901; the 5,723-acre wilderness was designated under the Wilderness Act of 1964; the broader 8,570-acre Wichita Mountains Wilderness designated by Congress in 1970.","shadow_history":"The Wichita Mountains formed the core of Comancheria; after the Red River War of 1874-75, in which Colonel Ranald Mackenzie destroyed the last major Comanche winter camp at Palo Duro Canyon (September 28, 1874) and slaughtered approximately 1,400 horses, all surviving Comanche bands were confined to the Kiowa-Comanche-Apache Reservation surrounding Fort Sill; Quanah Parker's band, among the last holdouts, surrendered June 2, 1875; 74 men identified as war leaders were imprisoned at Fort Marion, Florida; the Jerome Agreement (negotiated 1892, ratified June 6, 1900) extracted approximately 2.5 million acres of KCA surplus lands over sustained Kiowa opposition; on July 4, 1901 -- the same day President McKinley proclaimed the KCA surplus land lottery open -- McKinley issued Proclamation 459 establishing the 57,120-acre Wichita Forest Reserve on those ceded lands, making the conservation of these mountains directly contingent on the dispossession of the Comanche and Kiowa. Charon's Garden Wilderness Area was established by Public Law 91-504 (October 23, 1970), making it one of the first wilderness areas designated within a National Wildlife Refuge under the FWS system; a companion North Mountain Unit was designated simultaneously but carries heavily restricted public access.","ecology":"Mixed-grass prairie; post oak savanna; granite outcrop community; federally listed black-capped vireo habitat; no mechanized access.","conservation_status":"Federal Wilderness Area (within Wichita Mountains National Wildlife Refuge).","endangered_species":"none documented.","gps":"34.7260° N, 98.6880° W","primary_nation":"Comanche","agency_type":"USFWS"}},{"type":"Feature","geometry":{"type":"Point","coordinates":[-98.673,34.769]},"properties":{"slug":"wichita-mountains-national-wildlife-refuge","name":"Wichita Mountains National Wildlife Refuge","state":"OK","acreage":"59,020 acres","geology":"~525 million years ago (bedrock); mountains re-exhumed ~300 Mya.","epoch":"Cambrian bedrock (Furongian); Wichita Mountains uplifted during Pennsylvanian Ouachita Orogeny (~300 Mya), then buried and re-exhumed ; one of the most geologically complex mountain histories in the U.S.","hydrology":"Parallel streams draining east; Lake Elmer Thomas; Quanah Parker Lake; Comanche County watershed.","native_lands":"Comanche (Nʉmʉnʉʉ) · Kiowa · Wichita (Kitikiti'sh) · Apache · Fort Sill Apache; Quanah Parker (Comanche) called the Wichitas home; mountains set aside from Kiowa-Comanche-Apache Reservation lands in 1901.","displacement_tenure":"Cession 510: Treaty with the Kiowa, Comanche, and Apache (Medicine Lodge Creek, 1867); Cession 485: Agreement with the Comanche, Kiowa, and Apache (Jerome Agreement, 1892, ratified 1900); Congress carved 61,500 acres directly out of the Kiowa-Comanche-Apache Reservation and proclaimed the Wichita Forest Reserve on July 4, 1901; President Roosevelt redesignated the area a game preserve in 1905; the New York Zoological Park shipped fifteen bison by rail to the refuge on October 10, 1907, at the invitation of Quanah Parker's Comanche delegation; retitled Wichita Mountains Wildlife Refuge in 1936.","shadow_history":"The refuge occupies land ceded by the Kiowa-Comanche-Apache under the Jerome Agreement (negotiated 1892, ratified June 6, 1900), which extracted approximately 2.5 million acres of KCA surplus lands over sustained Kiowa opposition; President McKinley established the Wichita Forest Reserve on those ceded lands by Proclamation 459 on July 4, 1901 -- the same day he opened the KCA land lottery; the refuge was reorganized under the FWS in 1936. Three CCC camps and multiple WPA projects operated at the refuge through the 1930s; by March 1938, CCC labor had constructed 46 concrete dams, 14 rubble masonry dams, 50 miles of improved roads, 46 miles of big-game fencing, and a hydroelectric system; the WPA built the Holy City of the Wichitas between 1935 and 1936 at a cost of $147,000; Roosevelt's April 1905 wolf hunt in the adjacent Big Pasture, which included Quanah Parker as a participant, is documented as a direct political catalyst for the congressional appropriation that created the preserve; the Quanah Artillery Range (15,850 acres) has been operational along the refuge's southern boundary since 1957, with a 3,800-acre strip between the refuge and Fort Sill closed to the public.","ecology":"Mixed-grass and shortgrass prairie; cross timbers; American bison herd (reintroduced 1907, ~650 animals); longhorn cattle; Rocky Mountain elk; prairie dogs.","conservation_status":"National Wildlife Refuge; Federal Wilderness Area (Wichita Mountains Wilderness, Charon's Garden Unit and North Mountain Unit).","endangered_species":"none documented.","gps":"34.7690° N, 98.6730° W","primary_nation":"Comanche","agency_type":"USFWS"}},{"type":"Feature","geometry":{"type":"Point","coordinates":[-83.831,39.796]},"properties":{"slug":"john-bryan-state-park","name":"John Bryan State Park","state":"OH","acreage":"752 acres (park); 268 acres (Clifton Gorge SNP)","geology":"~430-420 million years ago (bedrock); gorge carved ~12,000-14,000 years ago.","epoch":"Silurian period (Llandovery-Wenlock); dolomite formed in shallow tropical sea; gorge incised during Late Pleistocene and early Holocene by glacial meltwater drainage.","hydrology":"Little Miami River (Ohio State Scenic River; National Wild & Scenic River); Yellow Spring iron-rich seep; Jacoby Creek tributary.","native_lands":"Shawnee (Shawanwaki) · Miami · Adena and Hopewell cultures (500 BCE-500 CE); Little Miami River corridor a major Shawnee territory; Shawnee ceded Ohio lands via Treaty of Greene Ville 1795.","displacement_tenure":"Cession 11: Treaty of Greene Ville (1795); Clifton Gorge corridor industrialized through the 19th century as a water-power district with textile mills, gristmills, and sawmills; John Bryan purchased 335 acres as Riverside Farm in 1896 and bequeathed it to the State of Ohio in 1918 for use as a forestry, botanic, and wildlife reserve; designated a state forest park in 1925.","shadow_history":"The Little Miami River corridor through Clifton Gorge supported at least six mills within one mile by the early 19th century, including a woolen mill, sawmill, paper mill, barrel mill, and two grist mills, all operating before workplace safety or child labor laws; most were abandoned by the late 19th century as water power became uneconomical; no records of worker injuries or labor litigation from the Clifton mill district appear in accessible archives, though the pre-regulatory context makes the absence of documentation unsurprising.","ecology":"Gorge microclimate supporting relict northern plant communities; Canadian yew, white cedar, walking fern ; species absent from surrounding landscape; National Natural Landmark.","conservation_status":"Ohio State Park; National Wild and Scenic River (Little Miami River); Ohio State Scenic River (Little Miami River).","endangered_species":"none documented.","gps":"39.7960° N, 83.8310° W","primary_nation":"Shawnee","agency_type":"State park"}},{"type":"Feature","geometry":{"type":"Point","coordinates":[-82.5408,39.4354]},"properties":{"slug":"hocking-hills","name":"Hocking Hills State Park","state":"OH","acreage":"2,356 acres (park); adjacent 9,267-acre Hocking State Forest","geology":"~330 million years ago (sandstone); caves and gorges carved ~14,000-18,000 years ago.","epoch":"Mississippian period (Osagean-Meramecian); Black Hand sandstone deposited in deltaic system; recess caves and gorges formed by Pleistocene periglacial weathering and glacial meltwater during Wisconsin glaciation.","hydrology":"Old Man's Creek; Queer Creek; Cedar Fork; multiple seasonal waterfalls; cave seeps maintaining year-round moisture; Cedar Falls (50 ft wide).","native_lands":"Shawnee (Shawanwaki) · Delaware (Lenape) · Wyandot (Wendat) · Adena (700 BCE-100 CE) · Hopewell (100 BCE-500 CE); 'Hockhocking' a Shawnee/Delaware place name; all tribes removed from Ohio by 1843.","displacement_tenure":"Cession 11: Treaty of Greene Ville (1795); the Hocking Valley underwent intensive coal extraction and old-growth clear-cutting during the 1870s; Ohio's Division of Forestry purchased the first 146 acres including Old Man's Cave in 1924 to restore fire- and farm-damaged land; CCC labor constructed trails, bridges, and stone steps through the 1930s.","shadow_history":"Two racially segregated CCC companies built the park's infrastructure in the 1930s: Company 505 (white enrollees) was based at Camp Hocking near Conkle's Hollow, while Company 526 (Black enrollees) was based at Camp Logan from approximately 1934 to 1937, improving over 2,000 acres including Cantwell Cliffs, Rock House, and Rockbridge; by July 1935 all CCC camps nationally were formally segregated under an order from CCC director Robert Fechner; acid mine drainage from abandoned coal operations in the broader Hocking watershed is well-documented, with Monday Creek and its tributaries largely devoid of fish due to sulfuric acid and settled iron and aluminum particles.","ecology":"Hemlock-dominated gorge; Canadian hemlock at southern range limit; rock shelter communities; old-growth hemlock remnants; high biodiversity microclimate.","conservation_status":"Ohio State Park; Ohio State Nature Preserve (Conkle's Hollow State Nature Preserve, within park complex).","endangered_species":"none documented.","gps":"39.4354° N, 82.5408° W","primary_nation":"Shawnee","agency_type":"State park"}},{"type":"Feature","geometry":{"type":"Point","coordinates":[-83.54,38.82]},"properties":{"slug":"arc-of-appalachia","name":"Arc of Appalachia","state":"OH","acreage":"7,000+ acres across preserve system","geology":"~485-420 million years ago (bedrock).","epoch":"Ordovician and Silurian periods; limestone and dolomite deposited in shallow Iapetus Ocean; terrain never covered by Pleistocene glaciation ; landscape continuity extending back millions of years.","hydrology":"Brush Creek watershed; Rocky Fork Creek; numerous limestone seeps and springs; Serpent Mound crypto-explosion structure (nearby).","native_lands":"Shawnee (Shawanwaki) · Adena and Hopewell mound-building cultures; unglaciated Adams County at southern edge of Shawnee territory; proximity to Serpent Mound (Adena/Fort Ancient, ~300 BCE-1200 CE).","displacement_tenure":"Cession 11: Treaty of Greene Ville (1795); co-founded by Nancy Stranahan in 1995, beginning with a 47-acre purchase at Rocky Fork Gorge in Highland County; the system has grown to approximately 5,000 acres across five southern Ohio counties through more than 100 individual real estate transactions, funded in part by Ohio's Clean Ohio program; operates independently of The Nature Conservancy, which separately manages the adjacent Edge of Appalachia Preserve System established 1959.","shadow_history":"Frederic Ward Putnam of the Harvard Peabody Museum excavated Serpent Mound from 1887 to 1889, placing trenches in the effigy and excavating two nearby conical mounds; the excavations yielded pipes, points, earspools, gorgets, and multiple human burials with associated grave goods; Putnam raised funds to have Harvard purchase the site in 1887 -- making it the first privately funded archaeological preserve in the United States -- and the Peabody held the site until 1900; whether Serpent Mound skeletal material and grave goods remain in the Peabody collections or have been subject to NAGPRA repatriation has not been confirmed in publicly available records.","ecology":"One of the most biodiverse landscapes in Ohio; 114 rare or endangered species; dry limestone prairie (Lynx Prairie); eastern red cedar savanna; unglaciated forest; relict Appalachian flora.","conservation_status":"Private nature preserve system; National Natural Landmark (Lynx Prairie, Buzzardroost Rock, Red Rock, and Wilderness units).","endangered_species":"Indiana bat.","gps":"38.8200° N, 83.5400° W","primary_nation":"Shawnee","agency_type":"Private preserve"}},{"type":"Feature","geometry":{"type":"Point","coordinates":[-84.587,39.168]},"properties":{"slug":"mount-airy-forest","name":"Mount Airy Forest","state":"OH","acreage":"1,459 acres","geology":"~450 million years ago (Ordovician bedrock); surface soils entirely reworked by 19th-century agricultural erosion and 20th-century reforestation.","epoch":"Ordovician period (Cincinnatian); overlain by Wisconsin glacial till; original forest cleared by 1900 through farming and grazing; reforestation begun 1911 ; one of the first municipal reforestation projects in the United States.","hydrology":"West Fork Mill Creek headwaters; steep ravine drainage; historically severe sheet erosion prior to reforestation; upland watershed now stabilized by forest canopy.","native_lands":"Shawnee (Shawanwaki) · Fort Ancient culture (900-1650 CE); upland forest ridge a known hunting and travel corridor; Shawnee ceded Hamilton County lands via Treaty of Greene Ville 1795.","displacement_tenure":"Cession 11: Treaty of Greene Ville (1795); by the early 20th century the land comprised small, failing farms eroded by decades of poor agricultural and grazing practices; Cincinnati Park Board purchased the initial 168 acres of barren farmland in 1911, planting over 1.2 million trees through 1920 in what became the first municipal reforestation project in the United States.","shadow_history":"CCC Company 1505-C, an all-Black unit, arrived at Mount Airy in May 1935 and logged 51,414 man-hours building forest infrastructure; its encampment was constructed by the enrollees themselves on land Cincinnati Parks describes as unsuccessful farmland; Cincinnati maintained formal racial segregation of public recreational facilities through the 1950s, with the Sunlite Pool at Coney Island not desegregated until 1961 following NAACP litigation; whether Mount Airy Forest operated under a formal segregation policy for visitors during this period has not been confirmed in accessible public records.","ecology":"Reforested mixed hardwood and evergreen; 700 acres hardwoods, 200 acres evergreens, 269 acres native woodland; 120-acre arboretum with 1,600+ species; CCC plantings 1935-42; National Register of Historic Places 2010.","conservation_status":"Municipal forest (City of Cincinnati); National Register of Historic Places.","endangered_species":"none documented.","gps":"39.1680° N, 84.5870° W","primary_nation":"Shawnee","agency_type":"Municipal park"}},{"type":"Feature","geometry":{"type":"Point","coordinates":[-83.8328,39.7993]},"properties":{"slug":"clifton-gorge-state-nature-preserve","name":"Clifton Gorge State Nature Preserve","state":"OH","acreage":"268 acres","geology":"~445-430 million years ago (bedrock); gorge carved ~15,000 years ago.","epoch":"Silurian period (Llandovery-Wenlock); Cedarville Dolomite, Springfield Dolomite, and interbedded shale; gorge cut by Wisconsin glacial meltwater; National Natural Landmark 1968.","hydrology":"Little Miami River (Ohio’s first State Scenic River, 1968; National Wild & Scenic River); cascading falls and rapids through dolomite narrows; Steamboat Rock slump block; slump cave.","native_lands":"Shawnee (Shawanwaki) · Miami · Adena and Hopewell cultures; Little Miami River a principal Shawnee waterway and travel corridor; Shawnee ceded Ohio lands via Treaty of Greene Ville 1795.","displacement_tenure":"Cession 11: Treaty of Greene Ville (1795); core land donated to the State of Ohio in 1937 by Hugh Taylor Birch, who acquired approximately 160 acres adjacent to John Bryan State Park; upper gorge designated a State Nature Preserve in 1973; eight acres listed as a National Natural Landmark in 1967.","shadow_history":"The gorge corridor supported six operating mills within one mile by the early 19th century, all functioning before child labor and workplace safety laws; Hugh Taylor Birch, who donated 160 acres to the state in 1937 and also donated the initial parcel of Glen Helen to Antioch College in 1929, was an attorney and real estate speculator who assembled multiple large tracts in the Little Miami corridor; no records of displaced tenants in either acquisition appear in accessible archives.","ecology":"Gorge microclimate; relict northern flora including red baneberry, walking fern, Canadian yew; old-growth forest remnants; cool moist conditions maintain species absent from surrounding landscape.","conservation_status":"Ohio State Nature Preserve; National Natural Landmark; National Wild and Scenic River (Little Miami River); Ohio State Scenic River (Little Miami River).","endangered_species":"none documented.","gps":"39.7993° N, 83.8328° W","primary_nation":"Shawnee","agency_type":"State nature preserve"}},{"type":"Feature","geometry":{"type":"Point","coordinates":[-84.5348,39.1709]},"properties":{"slug":"parker-woods","name":"Parker Woods","state":"OH","acreage":"~63 acres","geology":"~450 Mya Ordovician shale and limestone (Kope Formation).","epoch":"Late Ordovician (Cincinnatian Series).","hydrology":"Mill Creek watershed; drains to West Fork Mill Creek, a tributary flowing through Northside Cincinnati to Mill Creek and the Ohio River; steep ravine topography characteristic of Kope Formation hillsides.","native_lands":"Shawnee (Shawanwaki) · Myaamia (Miami) · Adena and Hopewell moundbuilder cultures; Cincinnati area a major nexus of Shawnee and Miami territory; Fort Washington established 1789 as U.S. military base on Shawnee lands; Shawnee and Miami among signatories ceding southern Ohio via Treaty of Greenville 1795 following Battle of Fallen Timbers 1794.","displacement_tenure":"Cession 11: Treaty of Greene Ville (1795); the Langland family held the property from their original 266-acre farm purchase in 1822; Margaret Parker and her children sold the initial 27.5 acres to the City of Cincinnati in 1911 for $41,233.50, with the park named for Alexander Langland Parker; a second parcel added in 1953.","shadow_history":"The park sits adjacent to the Mill Creek watershed, which a 1996 assessment found to contain three Superfund sites on its banks, 31 other hazardous waste sites, and 158 combined sewer overflow outflows; EPA conducted a buried-drum hazardous waste removal on the West Fork Mill Creek in South Cumminsville in 2004; no contamination record specific to the Parker Woods parcel has been located, though the Mill Creek corridor has been among the most industrially contaminated urban streams in the Midwest.","ecology":"Mature mixed mesophytic forest dominated by sugar maple, white oak, and American beech; spring ephemeral wildflowers; active removal of invasive bush honeysuckle and Tree-of-Heaven underway.","conservation_status":"Cincinnati Parks nature preserve (City of Cincinnati).","endangered_species":"none documented.","gps":"39.1709° N, 84.5348° W","primary_nation":"Shawnee","agency_type":"Municipal park"}},{"type":"Feature","geometry":{"type":"Point","coordinates":[-83.891,39.803]},"properties":{"slug":"glen-helen-nature-preserve","name":"Glen Helen Nature Preserve","state":"OH","acreage":"1,147 acres","geology":"~445-430 million years ago (bedrock); gorge and ravine system formed by glacial meltwater ~15,000 years ago.","epoch":"Silurian period (Llandovery-Wenlock); same dolomite and limestone formations as Clifton Gorge; Holocene iron precipitation at Yellow Spring actively ongoing ; visible as orange mineral staining on rock surfaces.","hydrology":"Little Miami River (2.5 miles; National Wild & Scenic River); Yellow Spring Creek; Birch Creek; iron-rich Yellow Spring seep; beaver impoundment; Cascades waterfall.","native_lands":"Shawnee (Shawanwaki) · Miami · Adena culture; Orators Mound (Adena burial mound) within preserve boundaries; Yellow Spring a known Shawnee waypoint; Little Miami River a principal Shawnee waterway.","displacement_tenure":"Cession 11: Treaty of Greene Ville (1795); attorney Hugh Taylor Birch donated the initial 700-acre parcel to Antioch College in 1929 as a memorial to his daughter Helen Birch Bartlett; Glen Helen Association assumed operational ownership from Antioch College in 2020 via a $2.5 million agreement over ten years.","shadow_history":"Frank Van Wort partially excavated the Orators Mound within the preserve in 1953 to 1954, finding five skeletons (two adults, three infants) and placing seven skeletons along with artifacts in the Dayton Museum of Natural History; Van Wort published no reports; the current location or repatriation status of this material is not confirmed in available sources; a 1971 Antioch College excavation under archaeologist Wolfgang Marschall identified the mound as Hopewellian; the Neff family's 246-room hotel at the Yellow Spring, built in 1869 at a cost of approximately $250,000 and targeting Southern vacationers, failed financially within 13 years.","ecology":"Mixed mesophytic gorge forest; 400-year-old trees; regionally significant old-growth stands; beaver wetland; Raptor Center (Ohio’s first raptor rehabilitation facility); 20+ miles of trail connecting to John Bryan State Park and Clifton Gorge.","conservation_status":"Private nature preserve (Antioch College); National Natural Landmark; National Wild and Scenic River (Little Miami River); Ohio State Scenic River (Little Miami River).","endangered_species":"none documented.","gps":"39.8030° N, 83.8910° W","primary_nation":"Shawnee","agency_type":"Private preserve"}},{"type":"Feature","geometry":{"type":"Point","coordinates":[-84.428,39.102]},"properties":{"slug":"otto-armleder-memorial-park","name":"Otto Armleder Memorial Park","state":"OH","acreage":"347 acres","geology":"~450 million years ago (Ordovician bedrock); floodplain deposits Holocene.","epoch":"Ordovician period (Cincinnatian); overlain by Quaternary glacial outwash and Holocene alluvium; site lies on Little Miami River floodplain shaped by Wisconsin glaciation meltwater.","hydrology":"Little Miami River floodplain; subject to periodic inundation; adjacent to Lunken Airfield oxbow; Mill Creek watershed confluence nearby.","native_lands":"Shawnee (Shawanwaki) · Fort Ancient culture (900-1650 CE); Little Miami River a principal Shawnee corridor; Shawnee ceded Ohio lands via Treaty of Greene Ville 1795.","displacement_tenure":"Cession 11: Treaty of Greene Ville (1795); the Little Miami floodplain site remained largely undeveloped due to periodic flooding; the park was funded through the Otto Armleder Trust, established by the 1935 will of Cincinnati businessman Otto Armleder (1862 to 1935), directing his estate toward charitable and civic projects in Hamilton County.","shadow_history":"Ohio EPA and USGS assessments of the Little Miami basin have documented elevated trace elements and synthetic organic compounds including organochlorine insecticides and PCBs in streambed sediments downstream of Cincinnati's industrial corridor; no Superfund listing specific to the Armleder floodplain section appears in EPA records; the park's floodplain location, which prevented prior development and made acquisition relatively inexpensive, reflects the same industrial contamination history that kept the land undeveloped.","ecology":"Floodplain wetland; bottomland hardwood forest; willow, cottonwood, silver maple, boxelder; critical migratory bird stopover on the Ohio flyway; 76+ documented bird species.","conservation_status":"Municipal park (City of Cincinnati / Great Parks of Hamilton County).","endangered_species":"none documented.","gps":"39.1020° N, 84.4280° W","primary_nation":"Shawnee","agency_type":"Municipal park"}},{"type":"Feature","geometry":{"type":"Point","coordinates":[-84.62,39.11]},"properties":{"slug":"bender-mountain-nature-preserve","name":"Bender Mountain Nature Preserve","state":"OH","acreage":"130+ acres","geology":"~450 million years ago (Ordovician bedrock); ridge morphology shaped by Illinoian glaciation ~400,000 years ago.","epoch":"Ordovician period (Cincinnatian); Ohio River rerouted during Illinoian glaciation created oversteepened valley walls; Pleistocene colluvium mantles bedrock slopes.","hydrology":"Rapid Run Creek drainage to the north; Ohio River corridor to the south; steep slope hydrology with seasonal seeps.","native_lands":"Shawnee (Shawanwaki) · earlier Adena and Hopewell peoples; Ohio River ridge a known travel and hunting corridor; Shawnee ceded Hamilton County lands via Treaty of Greene Ville 1795.","displacement_tenure":"Cession 11: Treaty of Greene Ville (1795); established in 2003 through Clean Ohio conservation program funds and Great Parks of Hamilton County ForeverGreen funding; in 2023 the Sisters of Charity of Cincinnati donated 73 acres to the Western Wildlife Corridor, the largest single gift in that organization's history.","shadow_history":"Prior land use included grazing, hog foraging, fruit growing, and selective logging; no quarrying, industrial use, or documented forced removal has been identified for this Ohio River bluff site in accessible records; the Western Wildlife Corridor began managing the site in 2003 and describes it as degraded agricultural and silvicultural land undergoing active restoration.","ecology":"Mixed mesophytic forest; steep south-facing Ohio River bluff; 390+ vascular plant species; described as best site in Hamilton County for native wildflowers; invasive honeysuckle removal ongoing since 2003.","conservation_status":"Private nature preserve (Western Wildlife Corridor / Delhi Township).","endangered_species":"none documented.","gps":"39.1100° N, 84.6200° W","primary_nation":"Shawnee","agency_type":"Municipal park"}}]};
