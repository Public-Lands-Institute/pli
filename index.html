<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root { --sand: #f2ede6; --ink: #1a1a18; --moss: #4a5e3a; --stone: #8a8478; --panel-w: 440px; }
html, body { height: 100%; font-family: 'Inter', sans-serif; background: var(--ink); }
#map { position: fixed; inset: 0; }
#wordmark { position: fixed; top: 28px; left: 32px; z-index: 10; pointer-events: none; }
#wordmark h1 { font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 300; letter-spacing: 0.2em; text-transform: uppercase; color: var(--sand); opacity: 0.85; line-height: 1; }
#site-count { position: fixed; top: 28px; right: 32px; z-index: 10; color: rgba(242,237,230,0.3); font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; font-weight: 300; }
#layers { position: fixed; bottom: 32px; left: 32px; z-index: 10; display: flex; flex-direction: column; gap: 6px; }
.layer-btn { background: rgba(26,26,24,0.72); border: 1px solid rgba(242,237,230,0.2); color: var(--sand); font-family: 'Inter', sans-serif; font-size: 11px; font-weight: 200; letter-spacing: 0.1em; text-transform: uppercase; padding: 6px 12px; cursor: pointer; backdrop-filter: blur(8px); transition: border-color 0.2s; text-align: left; }
.layer-btn:hover { border-color: rgba(242,237,230,0.5); }
.layer-btn.active { color: #c8ddb8; border-color: #c8ddb8; background: rgba(26,26,24,0.9); }
#legend { position: fixed; bottom: 32px; right: 32px; z-index: 10; background: rgba(26,26,24,0.85); backdrop-filter: blur(8px); border: 1px solid rgba(242,237,230,0.15); padding: 14px 16px; min-width: 200px; display: none; }
#legend.visible { display: block; }
#legend-title { font-size: 10px; font-weight: 500; letter-spacing: 0.14em; text-transform: uppercase; color: rgba(242,237,230,0.45); margin-bottom: 10px; }
.legend-item { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; font-size: 11px; font-weight: 300; color: rgba(242,237,230,0.75); }
.legend-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
#panel { position: fixed; top: 0; right: 0; width: var(--panel-w); height: 100%; background: var(--sand); z-index: 20; transform: translateX(100%); transition: transform 0.4s cubic-bezier(0.16,1,0.3,1); overflow-y: auto; overflow-x: hidden; }
#panel.open { transform: translateX(0); }
#panel-close { position: sticky; top: 0; z-index: 5; display: flex; justify-content: flex-end; padding: 16px 20px 0; background: var(--sand); }
#panel-close button { background: none; border: none; cursor: pointer; color: var(--stone); font-size: 20px; line-height: 1; padding: 4px; }
#panel-close button:hover { color: var(--ink); }
#panel-body { padding: 8px 32px 48px; }

.panel-state { font-size: 11px; font-weight: 400; letter-spacing: 0.12em; text-transform: uppercase; color: var(--stone); margin-bottom: 20px; }
.panel-acreage { font-size: 11px; font-weight: 300; letter-spacing: 0.1em; text-transform: uppercase; color: var(--stone); margin-bottom: 20px; }

.photo-thumb { background: #ccc8c0; cursor: pointer; overflow: hidden; }
.photo-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; opacity: 0; transition: opacity 0.25s; }
.photo-thumb img.loaded { opacity: 1; }
.photo-thumb:hover img { opacity: 0.75; }
.photo-grid-more { font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--stone); margin-bottom: 20px; text-align: right; }
.photo-grid-more a { color: var(--moss); text-decoration: none; border-bottom: 1px solid var(--moss); }
.panel-section { margin-bottom: 20px; border-top: 1px solid rgba(26,26,24,0.12); padding-top: 16px; }
.panel-section-label { font-size: 10px; font-weight: 500; letter-spacing: 0.16em; text-transform: uppercase; color: var(--stone); margin-bottom: 8px; }
.panel-section p { font-size: 13.5px; font-weight: 300; line-height: 1.7; color: #2e2e2a; }
.nation-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
.nation-tag { font-size: 10px; font-weight: 400; letter-spacing: 0.06em; background: rgba(74,94,58,0.12); color: var(--moss); padding: 3px 8px; border: 1px solid rgba(74,94,58,0.3); }

#lb-img-wrap { flex: 1; display: flex; align-items: center; justify-content: center; min-height: 0; padding: 56px 72px 0; position: relative; }

#lb-spinner { position: absolute; color: rgba(242,237,230,0.3); font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; }

#lb-filename { font-size: 12px; font-weight: 300; color: rgba(242,237,230,0.55); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 3px; }
#lb-date { font-size: 11px; font-weight: 300; letter-spacing: 0.1em; text-transform: uppercase; color: rgba(242,237,230,0.3); }
#lb-actions { display: flex; gap: 8px; flex-shrink: 0; }
.lb-action { font-size: 11px; font-weight: 300; letter-spacing: 0.1em; text-transform: uppercase; text-decoration: none; padding: 5px 12px; border: 1px solid rgba(242,237,230,0.3); color: rgba(242,237,230,0.65); transition: border-color 0.15s, color 0.15s; white-space: nowrap; }
.lb-action:hover { border-color: rgba(242,237,230,0.75); color: var(--sand); }
#lb-close { position: fixed; top: 18px; right: 24px; z-index: 101; background: none; border: none; cursor: pointer; color: rgba(242,237,230,0.4); font-size: 22px; line-height: 1; transition: color 0.15s; }
#lb-close:hover { color: var(--sand); }
#lb-prev, #lb-next { position: fixed; top: 50%; transform: translateY(-50%); z-index: 101; background: none; border: none; cursor: pointer; color: rgba(242,237,230,0.3); font-size: 36px; padding: 16px; transition: color 0.15s; line-height: 1; }
#lb-prev { left: 8px; } #lb-next { right: 8px; }
#lb-prev:hover, #lb-next:hover { color: var(--sand); }
#lb-counter { position: fixed; top: 22px; left: 50%; transform: translateX(-50%); font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; color: rgba(242,237,230,0.25); }
.maplibregl-popup-content { background: var(--ink); color: var(--sand); font-family: 'Inter', sans-serif; font-size: 12px; font-weight: 300; padding: 8px 12px; border-radius: 0; box-shadow: none; }
.maplibregl-popup-tip { border-top-color: var(--ink) !important; }
.maplibregl-ctrl-attrib { font-size: 9px; opacity: 0.4; }
</style>

chiopods in Mississippian layer", "hydrology": "Clifty Creek and Indian Creek drain the preserve before joining Sugar Creek within adjacent Shades State Park; Sugar Creek is a 93-mile Wabash River tributary; springs emerge throughout the preserve at the junction of Pennsylvanian and Mississippian bedrock; within the Deer Creek-Sugar Creek sub-watershed of the Upper Wabash River basin", "native_lands": "Miami (Myaamiaki) and Wea held the west-central Indiana Sugar Creek corridor; Wea established at Ouiatenon near present Lafayette to the north; Potawatomi (Neshnabe) oral tradition records a battle fought in the Clifty Creek and Indian Creek ravines of Pine Hills in the 1770s, when Potawatomi forces and Miami warriors contested control of the Wabash Valley, with the legend claiming nearly 600 warriors killed on both sides and the account possibly giving rise to the 'Shades of Death' name for the surrounding terrain; Miami and Wea ceded the Sugar Creek territory through Treaty of Grouseland (August 21, 1805) and Treaty with the Miami (October 6, 1818)", "native_lands_api": "[\"Kaskaskia\", \"Kiikaapoi (Kickapoo)\", \"Myaamia\"]", "shadow_history": "The Mill Cut Backbone takes its name from an 1868 cut made through a sandstone ridge by the Pine Hill Woolen Mill Company, which dammed Clifty Creek and notched the hillside to channel water to a woolen mill built in 1870; the mill operated approximately three years before being moved, leaving the notch permanently inscribed in the bedrock topography; historic carvings on cliff faces dating to the 1800s, including forms speculated to represent passenger pigeons, are documented on rock surfaces within the preserve", "conservation_status": "Indiana State Nature Preserve No. 1 (designated October 6, 1969); National Natural Landmark (107th, designated 1968); managed by Indiana Division of State Parks and Reservoirs", "photo_count": 6}}, {"type": "Feature", "geometry": {"type": "Point", "coordinates": [-86.8425, 40.4973]}, "properties": {"slug": "prophetstown-state-park", "name": "Prophetstown State Park", "state": "IN", "acreage": "2,000", "ecology": "Restored tallgrass prairie dominated by big bluestem (Andropogon gerardii), Indian grass (Sorghastrum nutans), little bluestem (Schizachyrium scoparium), and sideoats grama with forbs including black-eyed Susan; wetland fens fed by hillside seeps, bottomland sycamore and cottonwood forest along the Wabash and Tippecanoe floodplains, and open woodland savanna; over 180 bird species documented including state-significant Henslow's sparrow", "geology": "~375 Mya Devonian New Albany Shale and Mississippian Borden Group siltstone and crinoidal limestone forming the bedrock subcrop; landscape sculpted by Pleistocene Wabash Torrent (~14,000 BP) as glacial Lake Maumee breached the Fort Wayne moraine, depositing glacial outwash terraces above the Wabash-Tippecanoe confluence", "hydrology": "Wabash River drainage; Tippecanoe River (180 miles, watershed 1,947 sq mi) confluences with the Wabash within the park near Battle Ground; Harrison Creek flows through the park interior forming fen ponds; park occupies three Wabash terraces shaped by the Pleistocene Wabash Torrent; 317-acre wetland restoration zone adjacent to the confluence; Tippecanoe River supports the most diverse mussel fauna in Indiana including eight federally listed species", "native_lands": "Miami (Myaamiaki) and Wea held the Wabash-Tippecanoe confluence as core territory; Potawatomi (Neshnabe) occupied lands north of the Wabash; Shawnee (Shawanwaki) brothers Tecumseh and Tenskwatawa established Prophetstown at the confluence in 1808 as a multiethnic confederacy stronghold drawing Potawatomi, Kickapoo, Lenape (Delaware), Winnebago (Ho-Chunk), Wea, Wyandot, Ottawa, Ojibwe, Menominee, Sauk, Fox, Creek, and an estimated 14 nations totaling up to 3,000 people; Woodland-period peoples occupied the river terraces at least 3,000 years prior; Harrison's forces burned Prophetstown November 8, 1811 following the Battle of Tippecanoe (November 7, 1811); Tecumseh continued organizing until his death at the Battle of the Thames (October 5, 1813)", "native_lands_api": "[\"Peoria\", \"Bodw\\u00e9wadmi (Potawatomi)\", \"Kaskaskia\", \"Kiikaapoi (Kickapoo)\", \"Myaamia\"]", "shadow_history": "Tenskwatawa (Lalawethika, The Prophet) launched a pan-Indian spiritual revival beginning in 1805 and in April 1808 led his followers from Greenville, Ohio to the Tippecanoe-Wabash confluence, establishing Prophetstown on land claimed by the Miami and Wea over the explicit objection of Miami war chief Little Turtle; his brother Tecumseh (Crouching Tiger) transformed the religious movement into a political and military confederacy, recruiting an estimated 14 nations including Potawatomi, Kickapoo, Lenape, Winnebago, Wyandot, Ottawa, Ojibwe, Menominee, Sauk, Fox, and Creek; at its peak Prophetstown was the largest multi-tribal settlement in the Great Lakes region, housing an estimated 3,000 people; Harrison's forces burned Prophetstown on November 8, 1811, one day after the Battle of Tippecanoe, destroying the village and stored provisions after non-combatants had evacuated across the Wabash; the village's precise location remained unknown for nearly two centuries and was not archaeologically documented at park establishment in 2004; investigations at Site 12-T-59 and adjacent locations recovered 3,000-year-old flake tools, stone points, and shell-reinforced potsherds; archaeologist Christopher Moore (University of Indianapolis) identified multiple dispersed occupation zones separated by cornfields rather than a single centralized village; documentation of tribal consultation in early excavations is absent from public record", "conservation_status": "Indiana State Park (established 2004); adjacent to Tippecanoe Battlefield National Historic Landmark (separate property, Tippecanoe County Historical Association)", "photo_count": 8}}, {"type": "Feature", "geometry": {"type": "Point", "coordinates": [-87.0748, 39.9326]}, "properties": {"slug": "shades-state-park", "name": "Shades State Park", "state": "IN", "acreage": "3,082", "ecology": "Old-growth and second-growth beech-maple and oak-hickory hardwood forest covers the uplands; relict populations of eastern hemlock, white pine, and Canada yew on north-facing canyon walls and ravine floors; rare ferns and wildflowers on shaded cliff faces throughout the Sugar Creek ravine system", "geology": "~310 Mya Pennsylvanian sandstone over ~340 Mya Mississippian Borden Group siltstone and limestone; deep sandstone ravines carved by Sugar Creek drainage", "hydrology": "Sugar Creek, a 93-mile Wabash River tributary, runs the length of the park; Indian Creek drains the northern ravines before joining Sugar Creek within the park; numerous named ravines including Frisz, Kintz, Pearl, and Red Fox carry seasonal flows; Silver Cascade waterfall; abundant springs where Pennsylvanian and Mississippian bedrock layers meet; park lies within the Deer Creek-Sugar Creek sub-watershed of the Upper Wabash River basin", "native_lands": "Miami (Myaamiaki) and Wea held the west-central Indiana Sugar Creek corridor; Wea settled along the middle Wabash near present-day Lafayette; Sugar Creek is a Wabash tributary draining the park; Shawnee bands present in the region prior to European contact; Potawatomi oral tradition documents a battle between Potawatomi and Miami in the Pine Hills canyons in the 1770s during conflict over control of the Wabash Valley; Treaty of Grouseland (August 21, 1805, Royce Cession 56) ceded Miami, Eel River, and Wea southern Indiana lands; Treaty with the Miami (October 6, 1818, St. Mary's, Royce Cession 15) ceded central Indiana south of the Wabash, covering the Shades area; Treaty with the Wea (October 2, 1818) ceded all remaining Wea Indiana claims; Wea removed west to Missouri after 1820; Miami largely removed to Kansas in October 1846", "native_lands_api": "[\"Kaskaskia\", \"Kiikaapoi (Kickapoo)\", \"Myaamia\", \"O\\u010dh\\u00e9thi \\u0160ak\\u00f3wi\\u014b\"]", "shadow_history": "Government surveys in the early 1800s documented the Sugar Creek springs, and by the late 19th century the Garland Dells Mineral Springs Association had acquired the land and built a 40-room inn in 1887, operating it as a health resort called The Shades; the wellness commerce model (mineral springs, curative air, outdoor exposure) preceded and enabled the eventual conservation purchase; Joseph Frisz acquired the resort property in the 1930s to protect it from timber interests, and CCC enrollees built shelter houses and trail infrastructure on the land during this period while it was still privately held; the park was not formally state-owned until 1948, placing it outside the Indiana DNR's official CCC company assignment records despite documented CCC presence on site; the specific CCC company designation has not been located in publicly available records", "conservation_status": "Indiana State Park", "photo_count": 13}}, {"type": "Feature", "geometry": {"type": "Point", "coordinates": [-83.4063, 39.1131]}, "properties": {"slug": "fort-hill-state-memorial", "name": "Fort Hill State Memorial", "state": "OH", "acreage": "1,300", "ecology": "Mixed mesophytic old-growth forest among the highest tree-diversity forest types in temperate North America, with oak-hickory, beech-maple, and riverine communities; over 800 vascular plant species documented, including state-threatened Wherry's catchfly (Silene caroliniana var. wherryi); cerulean and worm-eating warblers nest in the contiguous forest block.", "geology": "~443-323 Mya Silurian through Mississippian dolomite, shale, and sandstone; Peebles Dolomite (Silurian Wenlockian-Ludlovian) forms the plateau upland; Ohio Shale and Berea Sandstone exposed in gorge section; site on unglaciated Allegheny Plateau with natural bridge.", "hydrology": "Headwaters of Middle Fork Ohio Brush Creek and Paint Creek on the unglaciated Allegheny Plateau; Baker Fork borders the limestone gorge; Ohio Brush Creek flows 59.9 miles to the Ohio River; hilltop stands approximately 500 feet above creek level; natural bridge feature on Gorge Trail.", "native_lands": "Hopewell (Middle Woodland, ~100 BC-AD 500) built the 1.5-mile hilltop ceremonial enclosure and a village and ceremonial buildings in the Brush Creek valley; Adena culture (c. 500 BC-100 AD) antecedent; obsidian from Yellowstone-area sources and mica recovered from the site reflect Hopewell Interaction Sphere trade networks; Shawnee (Shawanwaki) held Paint Creek and Scioto watershed territories through the 18th century; Shawnee chiefs Blue Jacket and Black Hoof signed the Treaty of Greenville (August 3, 1795) following the Battle of Fallen Timbers (August 20, 1794), ceding Ohio territory south of the treaty line; final Ohio Shawnee removal to Kansas under Treaty with the Shawnee (1831).", "native_lands_api": "[\"\\ud801\\udccf\\ud801\\udcb0\\ud801\\udcd3\\ud801\\udcb0\\ud801\\udcd3\\ud801\\udcb7  \\ud801\\udcbc\\ud801\\udcc2\\ud801\\udcca\\ud801\\udcbb  \\ud801\\udcc6\\ud801\\udcbb\\ud801\\udcbf\\ud801\\udcb7  \\ud801\\udcc0\\ud801\\udcb0^\\ud801\\udcd3\\ud801\\udcb0^(Osage)\", \"Shawandasse Tula (Shawanwaki/Shawnee)\", \"Kaskaskia\", \"Myaamia\"]", "shadow_history": "Amateur antiquarians Ephraim George Squier, a journalist and later diplomat, and Edwin Hamilton Davis, a physician, excavated Fort Hill in 1846 for the Smithsonian, surveying the enclosure and removing artifacts; their survey was published in Ancient Monuments of the Mississippi Valley (1848), the first Smithsonian publication, with no artifact-provenience recording by modern standards; Ohio Historical Society archaeologist Raymond Baby re-excavated the circular enclosure in 1952, discovering a 174-foot-diameter double post ring before tribal consultation standards existed; CCC Company 1505 (Sinking Spring, 1934) constructed site infrastructure under the New Deal labor program.", "conservation_status": "National Register of Historic Places (1970); National Natural Landmark (1974); Ohio State Memorial managed by Ohio History Connection; inducted into Old Growth Forest Network (2015).", "photo_count": 7}}, {"type": "Feature", "geometry": {"type": "Point", "coordinates": [-81.5497, 41.2417]}, "properties": {"slug": "cuyahoga-valley-national-park", "name": "Cuyahoga Valley National Park", "state": "OH", "acreage": "32,950", "ecology": "Mixed deciduous forest with American beech and sugar maple dominant on upland ridges; eastern hemlock and yellow birch in cool north-facing ravines; cottonwood, sycamore, and black walnut in Cuyahoga River floodplain; more than 900 plant species; approximately 1,700 acres of wetlands in 1,500 discrete patches; bald eagle, peregrine falcon, river otter, and beaver reestablished through habitat restoration.", "geology": "~360 Mya Upper Devonian shale and sandstone (Bedford Shale, Berea Sandstone, Chagrin Shale, Ohio Shale); overlain by Mississippian Cuyahoga Formation and Pennsylvanian Sharon Conglomerate; valley carved by Pleistocene glaciation with glacial drift to 400-foot depth.", "hydrology": "Cuyahoga River 26-mile corridor through park, dropping 600 feet between Akron and Cleveland and creating steep ravines and waterfalls including Brandywine Falls (65 ft); Berea Sandstone caprock over softer Bedford Shale creates differential erosion waterfalls throughout the valley; glacial drift fills valley to 400-foot depth; approximately 1,700 acres of wetlands in 1,500 discrete patches provide significant water filtration and flood attenuation; river largely recovered from industrial contamination following Clean Water Act enforcement.", "native_lands": "Hopewell culture (c. 100 BC-500 AD) constructed burial mounds within current park boundaries, including the Everett Mound in northern Summit County; Erie (Eriehronon), an Iroquoian-speaking nation, held the region before the Beaver Wars (1640s-1650s) dispersed the Erie confederacy; Wendat (Wyandot/Huron) confederacy, incorporating survivors of the Erie and Petun (Tionontati) nations, designated the Cuyahoga Valley as communal hunting ground shared among nations; Lenape (Delaware; Lenapehoking) held refugee presence in the 18th century; Shawandasse Tula (Shawnee) and Haudenosaunee Seneca held shared hunting access; Treaty of Fort McIntosh (January 21, 1785) defined the Cuyahoga River mouth as the eastern boundary of Indian territory; Treaty of Greenville (August 3, 1795) ceded all land south and east of the Cuyahoga River following the Battle of Fallen Timbers (August 20, 1794); Seneca removed November 1831 via steamboat from Cincinnati, suffering starvation and disease en route to Kansas; Shawnee ceded Ohio lands and removed to Kansas 1831; Wyandot, the last nation in Ohio, resisted removal until 1843; approximately 664 Wyandot removed to Kansas July 1843 via Treaty with the Wyandots (1842), arriving to find no land available and forced to purchase 44,000 acres from the Delaware; Wyandotte Nation now headquartered in Wyandotte, Oklahoma.", "native_lands_api": "[\"Erie\", \"Kaskaskia\"]", "shadow_history": "The Cuyahoga River caught fire at least 13 documented times between 1868 and 1969; the June 22, 1969 fire, ignited by a train flare on an oil slick trapped under railroad bridges near Republic Steel, burned for less than 30 minutes causing approximately $100,000 in damage to railroad bridges; the 1952 fire caused more than $1 million in damage; by 1951 the Ohio Department of Natural Resources documented the river as biologically dead from petroleum derivatives, solvents, and industrial effluent discharged by steel mills, rubber plants, and paint factories in Akron and Cleveland; the 1969 fire catalyzed passage of the Clean Water Act amendments (1972), the Great Lakes Water Quality Agreement (1972), and the establishment of the U.S. EPA (1970) and Ohio EPA (1971); the Krejci Dump, a private hazardous waste facility operating 1948-1980 on 47 acres within current park boundaries in Boston Township, was acquired by NPS in 1985 as a routine junkyard purchase, with contamination discovered only after a person fell ill collecting scrap in 1986; the Everett Mound (Hopewell) was destructively excavated during schoolhouse construction in 1856 before professional salvage by archaeologist David Brose in 1974; the Phillis Wheatley Association operated Camp Mueller in the Cuyahoga Valley in the 1930s to provide African American children access to overnight camping, excluded by segregation from white-only recreational facilities including Euclid Beach Park; racial exclusion from Cuyahoga Valley communities continued through restrictive covenants and mortgage redlining from the 1920s through the 1960s.", "conservation_status": "Cuyahoga Valley National Park (established December 27, 1974 as Cuyahoga Valley National Recreation Area; redesignated national park October 11, 2000); Cuyahoga River designated National Heritage River.", "photo_count": 8}}, {"type": "Feature", "geometry": {"type": "Point", "coordinates": [-81.5449, 41.272]}, "properties": {"slug": "krejci-dump", "name": "Krejci Dump, Cuyahoga Valley National Park", "state": "OH", "acreage": "200", "ecology": "Restored seasonal wetland and wet meadow habitat; 3.5 acres of native sedge, grass, and wildflower communities established post-remediation; Jefferson salamander (Ambystoma jeffersonianum), American toad, woodcock, and diverse migratory birds documented; site classified as NPS Sentinel Wetland within the Lower Cuyahoga wetlands monitoring program in partnership with The Nature Conservancy; site supported almost no life during active contamination.", "geology": "~360 Mya Upper Devonian shale (Bedford Shale, Ohio Shale, Cleveland Shale); overlain by Pleistocene glacial till and clay deposits of the Wisconsinan glaciation.", "hydrology": "Cuyahoga River tributary drainage in Boston Township, Summit County; Pleistocene glacial till and clay deposits create layered hydrogeological conditions above Devonian shale bedrock; remediation included hydrological management systems to prevent residual contaminant migration; seasonal wetland hydrology restored post-cleanup.", "native_lands": "Wendat (Wyandot/Huron), Lenape (Delaware), Shawandasse Tula (Shawnee), Erie (Eriehronon), and Haudenosaunee Seneca nations held the Cuyahoga Valley and Boston Township; Treaty of Fort McIntosh (January 21, 1785) defined the Cuyahoga River mouth as the eastern boundary of Indian territory; Treaty of Greenville (August 3, 1795) extinguished Indigenous title to Summit County; final Wyandot removal to Kansas July 1843.", "native_lands_api": "[\"Erie\", \"Kaskaskia\", \"Mississauga\"]", "shadow_history": "The Krejci family operated an unregulated hazardous waste disposal facility on 47 acres in Boston Township from 1948 to 1980, accepting industrial waste from Ford Motor Company, General Motors, Chrysler, 3M, Chevron (Kewanee Industries), Federal Metal Company, and Waste Management of Ohio; waste was burned in open pits and buried in unlined trenches, allowing PCBs, dioxins, polyaromatic hydrocarbons, arsenic, cadmium, lead, benzene, and thousands of drums of 3M printing inks, solvents, and photographic emulsions to migrate into soil and groundwater; NPS acquired the property in 1985 as a routine junkyard purchase; contamination was discovered only after a person fell ill collecting scrap on the site in 1986; the site supported almost no life during the contamination period; the U.S. Department of Justice filed CERCLA suit against the responsible corporations in 1997; 3M refused settlement and went to trial, was found jointly and severally liable September 2001, and ordered to pay $15.5 million February 2002; Ford Motor Company served as lead remediation contractor under a 2002 settlement, removing 77,000 cubic yards of contaminated soil; total cleanup cost approximately $50 million, removing approximately 375,000-400,000 tons of contaminated material to depths of up to 20 feet; the site consists of two parcels separated by I-271, a 28-acre eastern parcel and a 19-acre western parcel comprising the 47-acre contaminated core; cleanup certified complete December 2020; 3.5 acres of seasonal wetland and wet meadow restored and opened to public access.", "conservation_status": "Unit of Cuyahoga Valley National Park; CERCLA enforcement site (EPA Site ID OHD981785074; not NPL-listed); cleanup certified complete December 2020; managed as restored wetland reserve open to public.", "photo_count": 5}}, {"type": "Feature", "geometry": {"type": "Point", "coordinates": [-82.2095, 39.9848]}, "properties": {"slug": "flint-ridge-state-memorial", "name": "Flint Ridge State Memorial", "state": "OH", "acreage": "533", "ecology": "Mature beech-maple-oak mixed hardwood forest; the Vanport chert layer 3-5 feet below the surface influences local drainage and root systems; approximately 14,000 years of quarrying activity has permanently altered local soil structure; ancient quarry pits have evolved into vernal pools supporting diverse amphibian and wetland plant communities; among the finest remaining examples of mature hardwood forest in Licking County.", "geology": "~320 Mya Pennsylvanian Vanport chert (Vanport Limestone Member, Allegheny Group); cryptocrystalline quartz (SiO2) formed through secondary silicification of a marine limestone by sponge-derived silica-rich fluids.", "hydrology": "South Fork Licking River drainage basin, Muskingum River watershed; local drainage influenced by the impermeable Vanport chert layer; ancient quarry pits function as vernal pools and seasonal wetlands; broader landscape affected by agricultural tile drainage.", "native_lands": "Archaic cultures quarried Flint Ridge chert beginning approximately 12,000 years ago; Adena culture (c. 500 BC-100 AD, Early Woodland) actively quarried and shaped tools here; Hopewell culture (c. 100 BC-500 AD, Middle Woodland) exploited Flint Ridge as a primary long-distance trade commodity, distributing the multicolored chert across the Hopewell Interaction Sphere as far west as present-day Kansas and Missouri, south to the Gulf Coast, and east to the Carolinas, exchanging flint for Michigan copper, Appalachian mica, and Gulf Coast marine shells; Flint Ridge served as a multi-tribal gathering and extraction place for millennia; Wyandot, Lenape (Delaware), Shawandasse Tula (Shawnee), Myaamia (Miami), Ottawa, Ojibwe, and Potawatomi held the Licking and Muskingum County region and were signatories to the Treaty of Greenville (August 3, 1795), which extinguished Indigenous title to this portion of Ohio.", "native_lands_api": "[\"Shawandasse Tula (Shawanwaki/Shawnee)\", \"Kaskaskia\", \"Ofo\"]", "shadow_history": "European settlers extracted Flint Ridge chert commercially from the late 18th century through approximately 1840 for gunflints, whetstones, and millstones, constituting unregulated exploitation of a 12,000-year-old Indigenous quarry landscape; the first formal study of the site appeared in the 1884 Smithsonian Institution annual report; William C. Mills, Curator of Archaeology at the Ohio Historical Society, conducted extensive excavations in 1920, removing artifacts from the quarry pits to institutional collections in Columbus; the Gilbert W. Dilley Museum was constructed in 1968 directly over an original quarry pit; uncontrolled 19th and 20th century artifact collection removed unknowable quantities of material from the surface and quarry pits; the broader Flint Ridge quarry complex spans more than 2,000 acres across Licking and Muskingum Counties, the vast majority outside memorial boundaries and unprotected from agricultural disturbance.", "conservation_status": "Ohio State Memorial (established 1933); National Register of Historic Places (listed 1970); Ohio flint (Vanport chert) designated official state gemstone of Ohio (1965).", "photo_count": 4}}, {"type": "Feature", "geometry": {"type": "Point", "coordinates": [-82.4278, 40.0403]}, "properties": {"slug": "octagon-earthworks", "name": "Octagon Earthworks", "state": "OH", "acreage": "70", "ecology": "Former golf course turf undergoing active restoration; Ohio History Connection converting fairways and roughs to native grassland and prairie species beginning 2025; pre-contact vegetation was oak-hickory forest on upland terraces adjacent to the Raccoon Creek floodplain.", "geology": "~385 Mya Devonian limestone (Columbus Limestone, Delaware Limestone); earthworks constructed on Pleistocene glacial outwash terraces above the Licking River system.", "hydrology": "Raccoon Creek drainage, Licking River basin; earthworks positioned on glacial outwash terrace; groundwater and soil conditions impacted by decades of golf course maintenance chemical applications.", "native_lands": "Hopewell culture (c. 100 BC-500 AD) constructed the Octagon Earthworks as a precision lunar observatory; eight walls are aligned to all eight lunar standstill moonrise and moonset extremes of the 18.6-year lunar cycle, demonstrated by Earlham College physicists Hively and Horn (1982) with Monte Carlo analysis placing the odds of accidental alignment at less than 1 in 40 million; the Octagon and its attached Observatory Circle together comprise the largest geometric earthwork in the Americas by enclosed area; Lenape (Delaware; Lenapehoking), Shawandasse Tula (Shawanwaki/Shawnee), Myaamia (Miami), Wyandot, Ottawa, and Ojibwe held the Ohio Valley in the historic period; Treaty of Greenville (August 3, 1795) extinguished Indigenous title to Licking County.", "native_lands_api": "[\"Shawandasse Tula (Shawanwaki/Shawnee)\", \"Kaskaskia\", \"Ofo\"]", "shadow_history": "The Moundbuilders Country Club operated a private golf course on the Octagon Earthworks from 1910 to 2025, blocking public and scholarly access to the largest geometric earthwork in the Americas for 115 years; Tom Bendelow designed the original nine-hole course, which opened June 1911 and expanded to 18 holes by 1923; decades of golf course maintenance required repeated applications of pesticides, herbicides, fungicides, and arsenic-based compounds on the earthwork surfaces; Ohio History Connection began removal of sand traps, tee boxes, cart paths, and golf infrastructure beginning January 2025, with multi-year soil remediation required; UNESCO World Heritage inscription criteria required unrestricted public access to the site, making termination of the golf lease a prerequisite to the 2023 inscription; the 1982 discovery of the Octagon's precise lunar alignments came more than 70 years after the golf course was established over them.", "conservation_status": "Octagon State Memorial (Ohio State Memorial); National Historic Landmark (1964, jointly with Great Circle Earthworks); Official Prehistoric Monument of Ohio (2006); UNESCO World Heritage Site (Hopewell Ceremonial Earthworks, list no. 1689, inscribed September 19, 2023, criteria i and iii).", "photo_count": 4}}, {"type": "Feature", "geometry": {"type": "Point", "coordinates": [-82.4301, 40.0422]}, "properties": {"slug": "newark-earthworks", "name": "Newark Earthworks", "state": "OH", "acreage": "206", "ecology": "Artificially maintained open grassland within earthwork enclosures, dominated by non-native turfgrass from former golf course management; Ohio History Connection implementing transition to native prairie species beginning 2025; pollen evidence indicates pre-contact oak-hickory climax forest on surrounding uplands; riparian corridors along Raccoon Creek support native floodplain woodland.", "geology": "~385 Mya Devonian limestone (Columbus Limestone, Delaware Limestone) and shale (Olentangy Shale, Ohio Shale); earthworks constructed on Pleistocene glacial outwash terraces above the Licking River system.", "hydrology": "Licking River drainage basin; Raccoon Creek (683 sq mi watershed) and tributaries flow adjacent to the earthwork complex; earthworks positioned on elevated glacial outwash terraces above the Raccoon Creek floodplain in Licking County; rapid urban development in northwestern Licking County has increased flood frequency and impervious surface runoff.", "native_lands": "Hopewell culture (c. 100 BC-500 AD) constructed the Newark Earthworks complex; the original complex covered more than 4 square miles and included interconnected geometric enclosures, parallel-walled roads, and ceremonial plazas; the Hopewell Interaction Sphere distributed Newark flint and prestige goods from this site across North America from the Great Lakes to the Gulf Coast; Lenape (Delaware; Lenapehoking), Shawandasse Tula (Shawanwaki/Shawnee), Myaamia (Miami), Wyandot, Ottawa, and Ojibwe held the Ohio Valley in the historic period; Treaty of Greenville (August 3, 1795) extinguished Indigenous title to Licking County, displacing Delaware, Shawnee, Wyandot, Miami, and allied nations; Indian Removal Act (1830) forced remaining Delaware, Shawnee, Seneca, and Ottawa west of the Mississippi.", "native_lands_api": "[\"Shawandasse Tula (Shawanwaki/Shawnee)\", \"Kaskaskia\", \"Ofo\"]", "shadow_history": "The original Newark Earthworks complex covered more than 4 square miles; 19th-century canal construction, railroad development, urban expansion, and agricultural clearing destroyed more than 90% of the complex, reducing it to three surviving fragments; in 1827, workers excavating an Ohio and Erie Canal lock destroyed a mound of the Cherry Valley Ellipse and found 14 human skeletons buried with large quantities of mica, one completely covered in mica sheets and described as carbonized; the remains were dispersed or lost during construction and never repatriated; the canal and Central Ohio Railroad construction (1852-1855) destroyed the entire Cherry Valley Ellipse, which originally contained 11 conical burial mounds and a large central mound, and the railroad bisected the pond north of the Great Circle and leveled eastern embankment structures; the Wright Earthworks, originally a geometrically precise square enclosure of approximately 20 acres, was almost entirely destroyed by canal construction, railroad grading, and Newark street and residential development before surviving fragments were donated to the Ohio Historical Society in 1934; Licking County Agricultural Society purchased the Great Circle in 1853 and used it as county fairgrounds for 80 years; Bureau of American Ethnology director W.H. Holmes warned in 1892 that continued fairground use would cause practical demolition within a few generations; the warning was ignored for another 40 years; the Great Circle was converted to Idlewilde Park in 1897, with a Ferris wheel, roller coaster, casino, racetrack, and recreational facilities installed inside the earthwork walls; Idlewilde Park operated until 1924; Squier and Davis surveyed the full complex for the Smithsonian Institution in the 1840s and published their findings in Ancient Monuments of the Mississippi Valley (1848), documenting that the scale of destruction already underway was irreversible; Emerson Greenman excavated Eagle Mound at the Great Circle in 1928, recovering copper ornaments and mica fragments; in 1860, Licking County surveyor David Wyrick excavated burial mounds at Newark and produced the disputed Newark Holy Stones, inscribed stones bearing Hebrew text allegedly found in Hopewell context, which most scholars consider 19th-century fabrications but which generated decades of fraudulent claims about pre-Columbian Hebrew presence in Ohio.", "conservation_status": "Ohio State Memorial (Great Circle Earthworks, Wright Earthworks); National Historic Landmark (1964); Official Prehistoric Monument of Ohio (2006); UNESCO World Heritage Site (Hopewell Ceremonial Earthworks, list no. 1689, inscribed September 19, 2023, criteria i and iii).", "photo_count": 9}}, {"type": "Feature", "geometry": {"type": "Point", "coordinates": [-82.8395, 41.5039]}, "properties": {"slug": "magee-marsh-wildlife-area", "name": "Magee Marsh Wildlife Area", "state": "OH", "acreage": "2,202", "ecology": "Coastal Lake Erie emergent freshwater marsh, beach ridge woodland, and submergent aquatic habitat; dominant communities include cattail (Typha spp.), bulrush (Schoenoplectus spp.), arrowhead (Sagittaria latifolia), and pickerelweed (Pontederia cordata) in the marsh, with oak-hickory beach ridge woodland on elevated sandy ridges; the 1.3-mile boardwalk through beach ridge and marsh edge is among the world's premier spring warbler migration watchpoints, with 26+ warbler species recorded during late April-early May migration; piping plover and bald eagle documented nesting on adjacent Lake Erie beaches.", "geology": "~380 Mya Middle Devonian limestone (Columbus Limestone, Delaware Limestone); bedrock overlain by Pleistocene glacial lake plain deposits from proglacial Lake Maumee (~14,000 ya).", "hydrology": "Lake Erie (southwestern shore, Ottawa County); Crane Creek drains through the wildlife area to Lake Erie; Ottawa River and Portage River drain adjacent watershed; site occupies the lake plain of proglacial Lake Maumee, which preceded Lake Erie and deposited clay-rich glacial till forming the water-retaining substrate of the coastal marsh complex; Maumee River (largest tributary of Lake Erie by discharge, draining 6,620 sq mi across Ohio, Indiana, and Michigan) enters Lake Erie approximately 20 miles west at Toledo.", "native_lands": "Ottawa (Odawa/Anishinaabe), Wyandot (Wendat), Potawatomi (Bod\u00e9wadmi), and Erie (Eriehronon); Ottawa County named for the Odawa nation who held the Lake Erie shore from the Maumee to the Cuyahoga; Roche de Boeuf and Wolf Rapids on the Maumee River served as principal Ottawa settlement sites; Erie nation dispersed by Haudenosaunee after 1656; Treaty of Greene Ville (August 3, 1795) ceded northwestern Ohio including Ottawa County; Treaty of Maumee Rapids (September 29, 1817) forced additional Wyandot cessions; Treaty with the Ottawa (February 18, 1833) extinguished remaining Ottawa title in Ohio; Ottawa of the Roche de Boeuf and Wolf Rapids bands relocated west 1833-1837, approximately 300 of 600 Odawa dying within two years of Kansas resettlement; Wyandot removed to Kansas July 1843 in final forced removal from Upper Sandusky.", "native_lands_api": "[\"Erie\", \"Kaskaskia\", \"Wyandot\", \"Myaamia\"]", "shadow_history": "The Great Black Swamp, a 5,000+ square mile glacial wetland complex occupying the Maumee valley and southwestern Lake Erie plain, was systematically drained for agriculture between the 1850s and 1920s using hand-dug ditches and subsurface tile drainage; elimination of this wetland complex destroyed the filtration and water retention function of the largest coastal marsh on Lake Erie, contributing directly to the western basin hypoxia and algal bloom crises of the 1950s-1970s; before state acquisition in 1951, the entire 30,000-acre Lake Erie marsh from Toledo to Sandusky was held by private hunting clubs, excluding public access and permitting intensive unregulated waterfowl harvest that severely depleted breeding and migratory populations; Davis-Besse Nuclear Power Station, located approximately 10 miles southwest on the Lake Erie shore in Oak Harbor (Ottawa County), was commissioned in 1977 and in March 2002 was found to have a football-sized void in its reactor pressure vessel head caused by boric acid corrosion from a decade-long borated water leak, the most severe corrosion damage to a U.S. nuclear reactor pressure vessel head ever recorded; thermal discharge from the plant affects near-shore Lake Erie temperature regimes adjacent to the wildlife area.", "conservation_status": "Ohio State Wildlife Area (Ohio DNR, established 1951); adjacency with Ottawa National Wildlife Refuge (USFWS, established 1961); Important Bird Area (IBA, Lake Erie Western Basin IBA); Western Hemisphere Shorebird Reserve Network Site of Regional Importance.", "photo_count": 8}}, {"type": "Feature", "geometry": {"type": "Point", "coordinates": [-83.8518, 41.5545]}, "properties": {"slug": "oak-openings-metropark", "name": "Oak Openings Metropark", "state": "OH", "acreage": "5,000", "ecology": "Globally rare oak savanna and Midwest sand barren with more than 1,200 native plant species; dominant communities include black oak savanna, twig-rush wet prairie, and tallgrass sand prairie with little bluestem (Schizachyrium scoparium), big bluestem (Andropogon gerardii), and Pennsylvania sedge (Carex pensylvanica); wild lupine (Lupinus perennis), obligate larval host of the federally endangered Karner blue butterfly, documented in significant colonies; one-third of Ohio's endangered plant species occur in the region.", "geology": "~390 Mya Middle Devonian dolomite and limestone (Lucas Dolomite, Silica Formation) buried beneath Pleistocene glacial drift; surface dominated by glacial outwash sand deposited from glacial Lake Warren (~13,000 ya) and aeolian dune formation 13,000-8,000 ya.", "hydrology": "Maumee River watershed (8,316 sq mi); Oak Openings sits on a glacial lake plain between Maumee tributaries; Tiffin River to the north; Swan Creek drains through the Toledo urban area to the Maumee; historic glacial Lake Warren deposited the outwash sands ~13,000 ya and drained northeast through what is now the Lake Erie basin.", "native_lands": "Wyandot (Wendat/Tionnontate), Ottawa (Odawa/Anishinaabe), Potawatomi (Bodw\u00e9wadmi), Shawnee (\u0160awanwaki), Miami (Myaamia), Kaskaskia, Kickapoo (Kiiakapoi), and Me\u0161kwahki (Fox); lower Maumee River valley a principal corridor between Lake Erie and interior Ohio; Wyandot and Ottawa held the Maumee territory; Treaty of Greene Ville (August 3, 1795) ceded northwestern Ohio; Treaty with the Wyandot et al. (September 29, 1817) secured remaining Maumee valley land reservations; Wyandot community departed Sandusky, Ohio July 20, 1843 in final forced removal to Wyandot County, Kansas, then relocated to Oklahoma Indian Territory.", "native_lands_api": "[\"Peoria\", \"Bodw\\u00e9wadmi (Potawatomi)\", \"Kaskaskia\", \"Kiikaapoi (Kickapoo)\", \"Myaamia\"]", "shadow_history": "Oak savanna ecosystem reduced from historic regional extent of approximately 130 square miles to fewer than 300 high-quality remnant acres through 19th- and 20th-century logging, agricultural conversion, and decades of fire suppression; silica sand mining at the Toledo Stone and Glass Sand Quarry in adjacent Sylvania Township extracted the distinctive glacial outwash deposits that define the ecosystem; Civilian Conservation Corps conducted work at Oak Openings during the Depression era (1933-1942); Maumee Area of Concern (AOC) designated by U.S. EPA and IJC in 1985 covering the Maumee River corridor, citing sediment contamination by PCBs, PAHs, and heavy metals from industrial discharges by Toledo-area refineries, foundries, and chemical plants; prescribed fire restoration of oak savanna began 1988 after decades of suppression degraded understory composition.", "conservation_status": "Metroparks Toledo Preserve; Important Bird Area (IBA, Audubon Ohio, 230+ bird species); critical habitat for federally endangered Karner blue butterfly (Lycaeides melissa samuelis); The Nature Conservancy Last Great Places recognition; Kitty Todd Nature Preserve (Ohio State Nature Preserve, 1,017 acres, managed by The Nature Conservancy); Maumee AOC restoration partnership (U.S. EPA Great Lakes program).", "photo_count": 9}}, {"type": "Feature", "geometry": {"type": "Point", "coordinates": [-83.3412, 41.8977]}, "properties": {"slug": "ford-marsh-unit", "name": "Ford Marsh Unit, Detroit River International Wildlife Refuge", "state": "MI", "acreage": "485", "ecology": "Coastal Great Lakes emergent and submergent marsh at the River Raisin mouth; American lotus (Nelumbo lutea, Michigan state-threatened, Michigan's official clean waterways symbol) prominent in open water; swamp rose-mallow (Hibiscus moscheutos) in marsh margins; habitat supports bald eagle, osprey, peregrine falcon, and diverse waterfowl; lake sturgeon (Acipenser fulvescens), walleye, and burrowing mayfly documented as water quality improves following AOC remediation; 300+ bird species recorded across the DRIWR corridor.", "geology": "~385 Mya Middle Devonian dolomite and limestone (Detroit River Group); bedrock overlain by Pleistocene Wisconsin glacial clay, silt, and lacustrine deposits; site occupies the western Lake Erie lake plain at the mouth of the River Raisin.", "hydrology": "River Raisin (135-mile Lake Erie tributary, 1,072 sq mi drainage basin, 92% agricultural land use) enters Lake Erie at the western boundary of the site; Clearwater Drain runs between Ford Marsh Unit and Sterling State Park; Sandy Creek (18.5-mile Lake Erie tributary) enters the lake approximately 2 miles south; western Lake Erie basin (shallowest, warmest, most productive of the Great Lakes).", "native_lands": "Ottawa (Odawa/Anishinaabek), Potawatomi (Bod\u00e9wadmik), Wyandot (Wendat/Huron), and Ojibwe (Anishinaabek); River Raisin mouth and western Lake Erie shore a principal corridor in the Great Lakes Anishinaabe territory; Potawatomi established trade relations with French settlers at Frenchtown c. 1780; Potawatomi warriors allied with British and Canadian forces at the Battle of Frenchtown (January 1813); Treaty of Detroit (November 17, 1807) ceded ~5.6 million acres of southeastern Michigan including Monroe County, signed by Ottawa, Chippewa, Wyandot, and Potawatomi; Potawatomi removed via Treaty of Chicago (1833) and forced relocation 1838-1840 (Potawatomi Trail of Death); Wyandot ceded remaining Michigan lands via treaty 1842, removed to Kansas 1843.", "native_lands_api": "[\"Peoria\", \"Bodw\\u00e9wadmi (Potawatomi)\", \"Wyandot\", \"Me\\u0161kwahki\\u00b7a\\u0161a\\u00b7hina (Fox)\", \"Myaamia\"]", "shadow_history": "The River Raisin mouth and adjacent wetland corridor is the site of the Battle of Frenchtown (January 18 and 22, 1813), the worst American defeat of the War of 1812; of approximately 934 American soldiers engaged in the Second Battle of Frenchtown, only 33 escaped; following the January 22 battle, between 30 and 100 wounded American prisoners unable to travel were killed by Native warriors while under British guard in an event known as the River Raisin Massacre; the political aftermath was weaponized to justify Indian Removal, accelerating the forced relocation of Potawatomi, Wyandot, Ottawa, and Ojibwe from the Great Lakes; River Raisin National Battlefield Park (NPS) preserves the primary battle site approximately 1.5 miles north; River Raisin designated a Great Lakes Area of Concern (AOC) by U.S. EPA and IJC due to PCB contamination from a century of industrial discharges from paper mills, foundries, and automotive manufacturing; 2012-2013 Great Lakes Legacy Act remediation project removed 106,000 cubic yards of PCB-contaminated sediment from the river mouth and turning basin in a $44.2 million cost-shared project between EPA, Michigan EGLE, and Ford Motor Company; contaminated dredge material permanently disposed in a Confined Disposal Facility within Sterling State Park; Ford River Raisin Warehouse (3200 East Elm Avenue, Monroe), immediately adjacent to the river, operated as a steel mill, ALCOA WWII munitions facility (1943-1947), and Kelsey-Hayes wheel plant before Ford acquisition in 1949; PFAS contamination discovered in monitoring wells at the Ford warehouse site in May 2019, linked to historical chrome plating operations, with Michigan PFAS Action Response Team (MPART) managing ongoing migration risk to the River Raisin; Monroe Power Plant (DTE Energy, approximately 5 miles north) releases more arsenic into Lake Erie than any other U.S. coal-fired plant and produced more than half of Michigan's coal combustion residuals; Ford Motor Company's 2010 wetland donation borders the contaminated Ford warehouse site; River Raisin watershed is 92% agricultural land use with 3,000 miles of man-made drainage infrastructure, having lost the vast majority of historic wetland cover to 19th-century ditching.", "conservation_status": "Detroit River International Wildlife Refuge (USFWS, established December 21, 2001), first international wildlife refuge in North America; Ford Marsh Unit (242 acres, donated by Ford Motor Company/ACH 2010); Eagle Island Marsh Unit (243 acres, DRIWR cooperative management since 2005); River Raisin Area of Concern (EPA/Great Lakes Legacy Act active restoration zone).", "photo_count": 4}}, {"type": "Feature", "geometry": {"type": "Point", "coordinates": [-83.3335, 41.9156]}, "properties": {"slug": "william-c-sterling-state-park", "name": "William C. Sterling State Park", "state": "MI", "acreage": "1,300", "ecology": "Great Lakes emergent and submergent marsh, restored lake plain prairie, and Lake Erie sandy beach habitat; dominant vegetation includes narrow-leaved cattail (Typha angustifolia), arrowhead (Sagittaria latifolia), and pondweeds in four managed lagoons; restored prairie community established on former agricultural land; American lotus (Nelumbo lutea) found in selected Lake Erie embayments; common reed (Phragmites australis) actively managed as invasive species; only Michigan state park on Lake Erie.", "geology": "~385 Mya Middle Devonian dolomite and limestone (Detroit River Group); bedrock overlain by Pleistocene Wisconsin glacial clay, silt, and sand deposits.", "hydrology": "Lake Erie shoreline (southeastern Michigan); Sandy Creek (18.5-mile Lake Erie tributary, rises London Township, Monroe County, drains to Lake Erie at park entrance in Frenchtown Charter Township); River Raisin (135-mile Lake Erie tributary, 1,072 sq mi drainage basin) enters Lake Erie approximately 3 miles north at Monroe; four man-made lagoons within park provide sheltered aquatic habitat.", "native_lands": "Ottawa (Odawa/Anishinaabek), Potawatomi (Bod\u00e9wadmik), Wyandot (Wendat/Huron), and Ojibwe (Anishinaabek); Sandy Creek mouth and Lake Erie shore a key corridor in the Great Lakes Anishinaabe territory; Treaty of Detroit (November 17, 1807) ceded approximately 5.6 million acres of southeastern Michigan including Monroe County to the United States, signed by Ottawa, Chippewa, Wyandot, and Potawatomi; Potawatomi received $400 annual annuity and separate payments for communities on the River Raisin and Lake Erie tributaries; Odawa forced removal to Iowa then Kansas 1830s-1840s, more than 300 of approximately 600 Odawa dying within two years of resettlement; Wyandot removed to Kansas via treaty 1842-1843.", "native_lands_api": "[\"Peoria\", \"Bodw\\u00e9wadmi (Potawatomi)\", \"Wyandot\", \"Me\\u0161kwahki\\u00b7a\\u0161a\\u00b7hina (Fox)\", \"Myaamia\"]", "shadow_history": "Monroe Power Plant (DTE Energy, commissioned 1970-1974, four coal-fired units, ~3,300 MW), located approximately 5 miles north of the park on Lake Erie, withdraws approximately 600 million gallons per day via once-through cooling causing large-scale fish larval entrainment and impingement; produces more than 800,000 tons per year of coal combustion residuals containing arsenic, mercury, lead, and selenium; 2025 data identified Monroe as the highest-discharging U.S. power plant for arsenic; EPA issued Notice of Violation June 2010; DOJ filed civil enforcement action 2013 over unpermitted Unit 2 modifications; River Raisin designated a TMDL-impaired waterbody due to agricultural runoff, failing Home Sewage Treatment Systems, and elevated E. coli concentrations; piping plover breeding absent from Lake Erie from 1977 until 2017 re-colonization, in part due to regional shoreline disturbance; 106,000 cubic yards of PCB-contaminated sediment dredged from the River Raisin mouth (2012-2013) permanently disposed in a Confined Disposal Facility within park boundaries.", "conservation_status": "Michigan State Park (established 1934); Detroit River International Wildlife Refuge co-management boundary (USFWS, 2001); Detroit-Western Lake Erie Coastal Wetland Management Area (CWMA) partnership for invasive Phragmites eradication.", "photo_count": 7}}, {"type": "Feature", "geometry": {"type": "Point", "coordinates": [-83.315, 40.7158]}, "properties": {"slug": "killdeer-plains-wildlife-area", "name": "Killdeer Plains Wildlife Area", "state": "OH", "acreage": "9,054", "ecology": "Restored wetland and native grassland complex on former Sandusky Plains wet prairie; habitat mosaic includes managed impoundments (over 100 ponds from less than 1 acre to 50 acres), a 360-acre green tree reservoir, native grasslands, grain crop fields maintained for wildlife, and oak-hickory woodlands; one of the premier sandhill crane (Antigone canadensis) migration staging areas in Ohio with 10,000+ cranes observed in fall as part of the mid-continent population of 660,000+; 275 documented bird species including grassland breeders bobolink (Dolichonyx oryzivorus), dickcissel (Spiza americana), upland sandpiper (Bartramia longicauda), Henslow's sparrow (Centronyx henslowii), and loggerhead shrike (Lanius ludovicianus); northern harrier and short-eared owl regular in fall migration.", "geology": "~390 Mya Middle Devonian limestone (Columbus Limestone); bedrock overlain by Pleistocene glacial till and outwash from the Wisconsin glaciation.", "hydrology": "Sandusky River watershed (1,825+ sq mi drainage); Broken Sword Creek (95 sq mi drainage, 82.6% agricultural land use) primary stream corridor through the wildlife area; over 100 managed ponds and impoundments provide shallow water habitat for migratory shorebirds and waterfowl; legacy agricultural tile drainage systems partially removed during restoration; historically part of the 30,000-acre Sandusky Plains wet prairie drained 1850s-1880s.", "native_lands": "Wyandot (Wendat/wa\u207fd\u00e1t), Shawnee (\u0160awanwaki), and Delaware (Lenape); Wyandot County named for the Wyandot nation who held the Sandusky Plains and upper Sandusky River corridor; Cranberry Swamp at Broken Sword Creek, a named Wyandot wetland outside the current wildlife area boundary, was reserved as a 1 square-mile parcel in Article 4 of the Treaty of Maumee Rapids (September 29, 1817); Treaty of Greene Ville (August 3, 1795) ceded northwestern Ohio including Wyandot County; Treaty of Maumee Rapids (1817) ceded 4.6 million acres of northwestern Ohio and Indiana while reserving 12 square miles at Upper Sandusky and the Cranberry Swamp parcel on Broken Sword Creek; Wyandot signed 19 treaties with the United States before final removal; more than 600 Wyandot departed Upper Sandusky on foot in July 1843, traveling to Cincinnati then by steamboat west, arriving in Kansas to find no land available, and subsequently removed again to Oklahoma Indian Territory.", "native_lands_api": "[\"Kaskaskia\", \"Myaamia\"]", "shadow_history": "Cranberry Swamp at Broken Sword Creek, reserved by Article 4 of the Treaty of Maumee Rapids (1817) as a named Wyandot wetland parcel of 1 square mile, was extinguished by subsequent treaty cessions and converted to agricultural use following the forced removal of the Wyandot nation in July 1843; the July 1843 removal from Upper Sandusky of more than 600 Wyandot -- the last American Indian nation to leave Ohio -- was precipitated by sustained pressure from Ohio settlers and state government despite the Wyandot being among the most acculturated nations in the region; arriving in Kansas to find their promised lands unavailable, the Wyandot were subsequently removed again to Oklahoma; Killdeer Plains lies within the former 30,000-acre Sandusky Plains wet prairie, which was systematically drained for agriculture between the 1850s and 1880s through hand-dug ditches and clay tile drainage; land was farmed as row crops through the mid-20th century before state acquisition beginning in 1952; legacy agricultural tile drainage infrastructure was largely reversed during wetland restoration, but Broken Sword Creek (82.6% agricultural land use in watershed) remains designated as impaired under Ohio EPA criteria.", "conservation_status": "Ohio State Wildlife Area (Ohio DNR Division of Wildlife, acquired 1952-2007); Killdeer Plains-Big Island Important Bird Area (IBA, Ohio IBA Program, 13,659 combined acres with adjacent Big Island Wildlife Area); designated sandhill crane migration staging area for the mid-continent population.", "photo_count": 4}}, {"type": "Feature", "geometry": {"type": "Point", "coordinates": [-83.198, 42.0117]}, "properties": {"slug": "pointe-mouillee-state-game-area", "name": "Pointe Mouillee State Game Area", "state": "MI", "acreage": "4,040", "ecology": "One of the largest freshwater coastal marsh restoration projects in the Great Lakes; managed diked cell system supporting emergent cattail (Typha spp.) marsh, open water impoundments, wet meadow, and shrub swamp; more than 295 bird species documented with up to 300,000 diving ducks during fall migration; designated International Shorebird Importance Area (2001) supporting 10,000-20,000 shorebirds annually including globally significant concentrations of Lesser Yellowlegs and Short-billed Dowitcher; bald eagle, osprey, sandhill crane, black-crowned night heron, glossy ibis, and whimbrel regularly observed.", "geology": "~375 Mya Late Devonian shale and carbonate (Famennian); bedrock overlain by Pleistocene Wisconsin glacial and lacustrine deposits; site occupies the Lake Erie lake plain formed by the drainage of glacial Lake Maumee ~14,500 ya.", "hydrology": "Western Lake Erie basin, Monroe and Wayne counties; Huron River (126-mile main stem, 908 sq mi watershed draining Oakland, Livingston, Washtenaw, Wayne, and Monroe counties) enters Lake Erie at the northern margin; River Raisin enters Lake Erie approximately 8 miles southwest; mechanical pump system with artificial dike cells controls water levels across discrete marsh units, replacing natural hydrologic cycling disrupted by Huron River dam and lake level management.", "native_lands": "Ottawa (Odawa/Anishinaabek), Potawatomi (Bod\u00e9wadmik), Wyandot (Wendat/Huron), and Ojibwe (Anishinaabek); Lake Erie shore and Huron River mouth a key resource corridor in Anishinaabe territory; Treaty of Detroit (November 17, 1807) ceded ~5.6 million acres of southeastern Michigan including Monroe County; Potawatomi received $400 annual annuity for communities on River Raisin and Lake Erie tributaries; Potawatomi removed via Treaty of Chicago (1833) and forced relocation 1838-1840 (Potawatomi Trail of Death); Wyandot ceded remaining Michigan and Ohio lands via treaty 1842, removed to Kansas 1843.", "native_lands_api": "[\"Peoria\", \"Bodw\\u00e9wadmi (Potawatomi)\", \"Wyandot\", \"Me\\u0161kwahki\\u00b7a\\u0161a\\u00b7hina (Fox)\", \"Myaamia\"]", "shadow_history": "U.S. Army Corps of Engineers Confined Disposal Facility (Big Banana), a 700-acre crescent-shaped dike structure 3.5 miles long and 1,400 feet wide constructed 1974-1979, contains contaminated dredge spoil from the Detroit River and Rouge River carrying PCBs, heavy metals, and PAHs; designed to replace open-lake dredge disposal that spread industrial pollutants across Lake Erie sediments; facility projected to reach capacity by 2029 with no replacement site identified as of 2025; historic loss of approximately 95% of western Lake Erie emergent marsh through 19th- and 20th-century agricultural drainage; Huron River dam disrupted natural hydrology and required mechanical pumping to restore wetland water levels; invasive hybrid cattail (Typha x glauca) has colonized large portions of the managed marsh, reducing fish diversity and suppressing native plant communities.", "conservation_status": "Michigan State Game Area (established 1945, Michigan DNR Wildlife Division); Important Bird Area (IBA, National Audubon Society); Western Hemisphere Shorebird Reserve Network Site of Regional Importance; International Shorebird Importance Area (2001); North American Wetlands Conservation Act grant recipient.", "photo_count": 12}}, {"type": "Feature", "geometry": {"type": "Point", "coordinates": [-83.384, 38.7924]}, "properties": {"slug": "edge-of-appalachia", "name": "Edge of Appalachia Preserve", "state": "OH", "acreage": "21,000", "ecology": "Mixed mesophytic forest, dry limestone prairies, and cedar barrens on thin Silurian dolomite soils along the Appalachian Escarpment; 30 ecological communities, 8 globally rare; over 1,200 plant species including American bluehearts (Buchnera americana), rattlesnake master (Eryngium yuccifolium), and gladecress; holds the only Allegheny woodrat (Neotoma magister) population in Ohio; green salamander (Aneides aeneus, Ohio-listed Endangered) documented; among the most biologically diverse areas in the Midwestern United States", "geology": "~430 Mya Silurian dolomite (Peebles Dolomite, Wenlockian stage); underlying Ordovician shale and limestone exposed in stream valley bottoms", "hydrology": "Ohio Brush Creek watershed; Ohio Brush Creek, a 59.9-mile tributary of the Ohio River draining 435 square miles, flows through the preserve with canoe access at Creek's Bend; Cedar Run gorge feeds Cedar Falls, a 15-foot waterfall over Silurian limestone ledges", "native_lands": "Adena (c. 1000 BC-AD 100) and Hopewell (c. 200 BC-500 AD) cultures with sustained presence in Adams County; Serpent Mound, a 1,348-foot effigy mound whose authorship is debated between Adena (~300 BCE, radiocarbon 2014/2019) and Fort Ancient (c. AD 1000-1550, charcoal 1991), sits on a bluff directly above Ohio Brush Creek 7 miles northeast of the preserve; both the Shawnee Tribe and Eastern Shawnee Tribe of Oklahoma hold formal ancestral connection to the site; the Warrior's Path, a major north-south Indigenous corridor linking the Great Lakes to the Carolinas, passed through the Ohio River corridor here; Shawandasse Tula (Shawanwaki/Shawnee) and Myaamia (Miami) held south-central Ohio; ceded via Treaty of Greene Ville (August 3, 1795); remaining Ohio Shawnee removed west via Treaty with the Shawnee 1831", "native_lands_api": "[\"\\ud801\\udccf\\ud801\\udcb0\\ud801\\udcd3\\ud801\\udcb0\\ud801\\udcd3\\ud801\\udcb7  \\ud801\\udcbc\\ud801\\udcc2\\ud801\\udcca\\ud801\\udcbb  \\ud801\\udcc6\\ud801\\udcbb\\ud801\\udcbf\\ud801\\udcb7  \\ud801\\udcc0\\ud801\\udcb0^\\ud801\\udcd3\\ud801\\udcb0^(Osage)\", \"Shawandasse Tula (Shawanwaki/Shawnee)\", \"Kaskaskia\", \"Myaamia\"]", "shadow_history": "Killen Generating Station (closed 2018), situated within the Ohio Brush Creek drainage basin upstream from the Ohio River confluence, discharged coal ash slurry directly into the Ohio River during 2020 ash pond dewatering in more than 30 documented incidents; unlined ash ponds at Killen and J.M. Stuart Station continue to leach arsenic, boron, cobalt, lithium, and molybdenum into the regional aquifer above drinking-water standards; a 1977-79 archaeological survey documented prehistoric occupation at the Ohio Brush Creek-Ohio River confluence at the Killen site before the area was committed to ash disposal", "conservation_status": "National Natural Landmark (component preserves Lynx Prairie, Buzzardroost Rock, Red Rock, and The Wilderness designated 1967); Ohio's largest privately owned nature preserve", "photo_count": 16}}, {"type": "Feature", "geometry": {"type": "Point", "coordinates": [-84.3708, 39.0343]}, "properties": {"slug": "st-annes-woods-and-wetlands", "name": "St. Anne's Woods and Wetlands", "state": "KY", "acreage": "165", "ecology": "Old-growth American beech (Fagus grandifolia) forest and Ohio River floodplain depression wetlands; one of the last undisturbed wetland remnants along the Ohio River in Northern Kentucky, documented by botanist E. Lucy Braun (University of Cincinnati) in 1916 as \"the best depression forest on the Ohio River floodplain\"; 451 total plant and animal species recorded including Jefferson's salamander (Ambystoma jeffersonianum), wood frog (Lithobates sylvaticus), spinulose woodfern (Dryopteris carthusiana), and American copper butterfly", "geology": "~450 Mya Upper Ordovician shale and fossiliferous limestone (Kope Formation, Cincinnatian Series); Ohio River alluvium at site", "hydrology": "Ohio River floodplain; site drains directly to the Ohio River; seasonal depression wetlands (vernal pools) fill from snowmelt and spring precipitation and dry by summer; no named tributary creek within the preserve boundaries", "native_lands": "Adena (c. 1000 BC-100 AD) and Hopewell (c. 200 BC-500 AD) cultures present in Ohio River valley; Fort Ancient culture (c. 1000-1650 AD) maintained villages along the Ohio River and major Northern Kentucky tributaries; Shawandasse Tula (Shawanwaki/Shawnee) ranged through Northern Kentucky as hunting territory in the historic period; Ohio River corridor a contested boundary zone between multiple nations through the mid-18th century; Shawnee ceded regional lands via Treaty of Greene Ville (August 3, 1795)", "native_lands_api": "[\"\\u13e3\\u13b3\\u13ab\\u13ea\\u13d8\\u13f1 Tsalaguwetiyi (Cherokee, East)\", \"\\ud801\\udccf\\ud801\\udcb0\\ud801\\udcd3\\ud801\\udcb0\\ud801\\udcd3\\ud801\\udcb7  \\ud801\\udcbc\\ud801\\udcc2\\ud801\\udcca\\ud801\\udcbb  \\ud801\\udcc6\\ud801\\udcbb\\ud801\\udcbf\\ud801\\udcb7  \\ud801\\udcc0\\ud801\\udcb0^\\ud801\\udcd3\\ud801\\udcb0^(Osage)\", \"Shawandasse Tula (Shawanwaki/Shawnee)\", \"Kaskaskia\", \"Myaamia\"]", "shadow_history": "The land was donated in 1909 by Catholic layman Peter O'Shaughnessy to the Sisters of Divine Providence; the prior ownership chain and any antebellum land history remain undocumented in public records.", "conservation_status": "Perpetual conservation easement held by Commonwealth of Kentucky (Kentucky Heritage Land Conservation Fund); managed by Campbell County Conservation District", "photo_count": 11}}, {"type": "Feature", "geometry": {"type": "Point", "coordinates": [-83.6078, 37.8339]}, "properties": {"slug": "red-river-gorge-geological-area", "name": "Red River Gorge Geological Area", "state": "KY", "acreage": "29,000", "ecology": "Mixed mesophytic forest on Pennsylvanian sandstone with diverse rock shelter microhabitats; Solidago albopilosa (white-haired goldenrod), an endemic found nowhere else on Earth, grows exclusively on sandstone ledges and rock shelter floors within the gorge; Canadian-origin relict flora in sheltered canyons includes purple fringed orchid (Platanthera grandiflora), Canada yew (Taxus canadensis), and Canada lily (Lilium canadense); black bear, timber rattlesnake (Crotalus horridus), and copperhead documented.", "geology": "~310 Mya Pennsylvanian Corbin Sandstone (Grundy Formation, Pottsville Escarpment); deposited in marine and deltaic river delta environments beginning ~340 Mya; prominent iron-oxide Liesegang banding; over 100 natural sandstone arches, highest concentration east of the Mississippi River.", "hydrology": "Red River drains the gorge through Powell, Wolfe, and Menifee counties before joining the Kentucky River; 19.4-mile section designated National Wild and Scenic River (December 3, 1993) and Kentucky Wild River; Swift Camp Creek and unnamed tributaries upstream of the gorge listed as impaired by Kentucky Division of Water due to sedimentation and loss of riparian vegetation.", "native_lands": "Paleoindian peoples first documented in gorge rock shelters c. 10,000 BC; continuous occupation through Archaic and Woodland periods (~12,000 years total); 664 known prehistoric and historic sites including some of the earliest evidence of plant domestication in eastern North America; Tsalagi (Cherokee) held eastern Kentucky as territorial range in the historic period; Shawandasse Tula (Shawanwaki/Shawnee) ranged throughout central Kentucky as a shared hunting corridor; Kentucky was contested hunting ground, not permanently settled by any single nation in the historic period; Cherokee ceded eastern Kentucky via Treaty of Hard Labor (October 1768) and Treaty of Lochaber (October 18, 1770); Shawnee resistance continued through the 1790s, with territorial claims extinguished via Treaty of Greene Ville (August 3, 1795).", "native_lands_api": "[\"\\u13e3\\u13b3\\u13ab\\u13ea\\u13d8\\u13f1 Tsalaguwetiyi (Cherokee, East)\", \"\\ud801\\udccf\\ud801\\udcb0\\ud801\\udcd3\\ud801\\udcb0\\ud801\\udcd3\\ud801\\udcb7  \\ud801\\udcbc\\ud801\\udcc2\\ud801\\udcca\\ud801\\udcbb  \\ud801\\udcc6\\ud801\\udcbb\\ud801\\udcbf\\ud801\\udcb7  \\ud801\\udcc0\\ud801\\udcb0^\\ud801\\udcd3\\ud801\\udcb0^(Osage)\", \"S\\u2019atsoyaha (Yuchi)\", \"Shawandasse Tula (Shawanwaki/Shawnee)\"]", "shadow_history": "Congress authorized an Army Corps of Engineers dam project on the Red River in 1962 following that year's Great Flood of Clay City; the proposed dam would have flooded 2,100 acres, covering two-thirds of the gorge and destroying more than half of its plant and animal life; Sierra Club-organized opposition mounted a November 18, 1967 Dam Protest Hike through Clifty Wilderness led by Supreme Court Justice William O. Douglas with over 600 participants that drew national press coverage; two separate dam sites were proposed over the following decades; archaeological looting of rock shelters throughout the 20th century destroyed stratigraphic context at sites containing some of the earliest evidence of plant domestication in eastern North America; by 1990 all rock shelters in the gorge containing both white-haired goldenrod and Indian artifacts had been pillaged by looters; Solidago albopilosa was federally listed as threatened in part because looting-related disturbance uprooted the plant's stolons and seeds; the logging-era Nada Tunnel (1910-1912), a 900-foot passage blasted through sandstone for a narrow-gauge railroad, killed at least one worker during construction; the dam controversy concluded December 3, 1993 when President Clinton signed the Red River into the National Wild and Scenic River system.", "conservation_status": "National Natural Landmark (1975); National Archaeological District, National Register of Historic Places (2003); Clifty Wilderness Area (13,379 acres); Red River designated National Wild and Scenic River (19.4 miles, December 3, 1993) and Kentucky Wild River; within Daniel Boone National Forest (USDA Forest Service).", "photo_count": 11}}, {"type": "Feature", "geometry": {"type": "Point", "coordinates": [-83.2214, 39.2417]}, "properties": {"slug": "seip-earthworks", "name": "Seip Earthworks", "state": "OH", "acreage": "121", "ecology": "Restored native tallgrass prairie within earthwork enclosures featuring big bluestem (Andropogon gerardii), switchgrass (Panicum virgatum), and Indiangrass (Sorghastrum nutans); reconstructed mound maintained as managed turf; riparian floodplain woodland edge along Paint Creek; 438 vascular plant species in 281 genera and 93 families documented across Hopewell Culture NHP units, representing 17% of Ohio's total flora; Ohio state-listed Spiranthes ovalis (oval ladies'-tresses) and Eleocharis ovata (ovate spike-rush) documented within the park.", "geology": "~425 Mya Silurian dolomite (Peebles Dolomite, Tymochtee Dolomite); earthworks constructed on Pleistocene glacial outwash terrace above Paint Creek at the maximum extent of both the Illinoian and Wisconsinan glacial advances.", "hydrology": "North bank of Paint Creek, a 94.7-mile tributary of the Scioto River draining 1,143 sq mi of south-central Ohio; site situated on Pleistocene glacial outwash terrace immediately adjacent to the Paint Creek floodplain near Bainbridge in Paxton Township, Ross County; LiDAR analysis has documented erosion of earthwork boundaries by old Paint Creek channels; Paint Creek Lake upstream moderates downstream flooding; Paint Creek and Rocky Fork Creek designated Ohio State Scenic Rivers 2021.", "native_lands": "Adena (c. 1000 BC-100 AD) and Hopewell (c. 200 BC-500 AD) cultures; Seip lies within the densest 20-mile corridor of Hopewell monumental earthworks on the continent, running from Bainbridge to Chillicothe along the Paint Valley; Chalahgawtha (principal-town) division of the Shawandasse Tula (Shawanwaki/Shawnee) held the Paint Creek valley as the principal Shawnee territorial corridor; documented Chalahgawtha town at Frankfort on Paint Creek in Ross County; Myaamia (Miami) co-held south-central Ohio; Shawnee and Miami lands ceded via Treaty of Greene Ville (August 3, 1795), Article 3 boundary and Article 4 relinquishment; Shawnee removed west via Treaty with the Shawnee 1831 under Indian Removal Act 1830.", "native_lands_api": "[\"\\ud801\\udccf\\ud801\\udcb0\\ud801\\udcd3\\ud801\\udcb0\\ud801\\udcd3\\ud801\\udcb7  \\ud801\\udcbc\\ud801\\udcc2\\ud801\\udcca\\ud801\\udcbb  \\ud801\\udcc6\\ud801\\udcbb\\ud801\\udcbf\\ud801\\udcb7  \\ud801\\udcc0\\ud801\\udcb0^\\ud801\\udcd3\\ud801\\udcb0^(Osage)\", \"Shawandasse Tula (Shawanwaki/Shawnee)\", \"Kaskaskia\", \"Myaamia\"]", "shadow_history": "William Mills (Ohio Historical Society) excavated three conjoined mounds at Seip 1906-1909, removing 48 burials and artifacts including copper, mica, bone, shell, and pearl objects to the Ohio State Museum in Columbus; Henry Shetrone and Emerson Greenman (Ohio Historical Society) excavated the main Seip Mound over three field seasons 1925-1928, removing 122 burials and elaborate grave goods including Isle Royale copper objects, Carolina mica sheets, five Tennessee effigy pipes known as the Great Pipes, woven milkweed-fiber textiles with preserved geometric designs, and thousands of freshwater pearl beads from a log-lined crypt, all transferred to museum collections in Columbus; farming throughout the 19th and early 20th centuries leveled embankment walls to approximately 10% of their original height before Ohio Historical Society acquisition; earthworks not under full federal protection until NPS deed transfer in 2014; LiDAR analysis has documented old stream channels cutting into original earthwork boundaries, indicating centuries of unmitigated flood erosion.", "conservation_status": "Hopewell Culture National Historical Park component (Public Law 102-294, May 27, 1992); National Register of Historic Places (NRIS 74001611, listed August 13, 1974); UNESCO World Heritage Site (Hopewell Ceremonial Earthworks, list no. 1689, inscribed September 19, 2023, criteria i and iii).", "photo_count": 8}}, {"type": "Feature", "geometry": {"type": "Point", "coordinates": [-83.472, 39.1861]}, "properties": {"slug": "rocky-fork-state-park", "name": "Rocky Fork State Park", "state": "OH", "acreage": "3,464", "ecology": "Mixed mesophytic forest on Silurian dolomite uplands, with alkaline-loving rare plant communities on gorge cliff faces; Sullivantia sullivantii (Sullivant's coolwort, Saxifragaceae) grows profusely on moist seeping dolomite cliffs in the gorge, blooming mid-summer; extremely rare in Ohio and known from only ten midwestern states; snow trillium (Trillium nivale), American Columbo (Frasera caroliniensis, requiring up to 30 years to produce its 5-ft flowering stalk), royal catchfly, queen-of-the-prairie, and prairie dock documented at the gorge preserve; fine-rayed pocketbook mussel (Ohio state-threatened) and 118 fish species documented in the Rocky Fork and Paint Creek watershed; river otter, bald eagle, osprey, cerulean warbler, and Louisiana waterthrush among 230+ bird species; Rocky Fork Creek and Paint Creek jointly rated Exceptional Warmwater Habitat by Ohio EPA.", "geology": "~425 Mya Silurian dolomite (Peebles Dolomite, Ludlovian); 75-ft gorge incised more than 12,000 years ago when retreating Wisconsin glacier ice blocked Rocky Fork Creek's original drainage outlet, reversing stream flow direction and rapidly cutting through dolomite bedrock; carbonate dissolution formed cave systems in the gorge walls; collapsed cave ceilings visible as large slump blocks in the streambed.", "hydrology": "Rocky Fork Creek drains 70,399 acres (~110 sq mi) before impoundment by Rocky Fork Lake; tributary of Paint Creek, which drains 1,143 sq mi to the Scioto River; gorge reach below the dam runs approximately 7.5 miles to confluence with Paint Creek near Bainbridge;
