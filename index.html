 Rocky Fork Creek reversed drainage direction approximately 25,000 years ago during Wisconsin glaciation; Rocky Fork Lake shoreline 31 miles, average depth approximately 15 ft, maximum depth approximately 40 ft; dam classified Class I by ODNR Division of Engineering; Paint Creek and Rocky Fork Creek proposed for Ohio State Scenic River designation (approximately 81.7 miles).", "native_lands": "Hopewell culture (c. 200 BC-500 AD) constructed at least two ceremonial earthwork complexes within current park boundaries: Rocky Fork Park Site (NRHP 73001479), a double-concentric circular enclosure with gateways on its eastern side, and the Rocky Fork Park Group (NRHP listed 1973), a separate mound group on an adjacent hilledge; both sites were never plowed, preserving their original earthwork profiles; Chalahgawtha (principal-town) division of the Shawandasse Tula (Shawanwaki/Shawnee) used the Paint Creek and Rocky Fork Creek corridors as principal travel routes and considered the Paint Valley home territory; Myaamia (Miami) co-held southern Ohio; Shawnee lands ceded via Treaty of Greene Ville (August 3, 1795), Article 3; remaining Shawnee removed west via Treaty with the Shawnee 1831 under Indian Removal Act 1830.", "native_lands_api": "[\"\\ud801\\udccf\\ud801\\udcb0\\ud801\\udcd3\\ud801\\udcb0\\ud801\\udcd3\\ud801\\udcb7  \\ud801\\udcbc\\ud801\\udcc2\\ud801\\udcca\\ud801\\udcbb  \\ud801\\udcc6\\ud801\\udcbb\\ud801\\udcbf\\ud801\\udcb7  \\ud801\\udcc0\\ud801\\udcb0^\\ud801\\udcd3\\ud801\\udcb0^(Osage)\", \"Shawandasse Tula (Shawanwaki/Shawnee)\", \"Kaskaskia\", \"Myaamia\"]", "shadow_history": "Rocky Fork Lake impounded 1951-1953, flooding the Rocky Fork Creek bottomland and requiring condemnation of valley-floor farm properties; the Blue Ribbon Road covered bridge was among the structures inundated; McCoppin's Mill (in continuous operation since 1829 using water turbines) survived \u2014 the dam was built upstream \u2014 and operated until the 1970s; Rocky Fork Gorge State Nature Preserve (86 acres, Miller Nature Sanctuary), the only state nature preserve in Highland County, was not dedicated until 1982, leaving the gorge corridor without formal protection for nearly 30 years after park establishment; two Hopewell earthwork complexes within park boundaries, Rocky Fork Park Site and Rocky Fork Park Group (NRHP listed 1973), remain without dedicated on-site archaeological interpretation; Rocky Fork Creek biological communities have performed as badly as or worse than at any time since the initial Ohio EPA study in 1991, impaired by agricultural runoff, failing Home Sewage Treatment Systems, and elevated E. coli concentrations.", "conservation_status": "Ohio State Park (established 1950); Rocky Fork Gorge State Nature Preserve (86 acres, Miller Nature Sanctuary, dedicated 1982, expanded 1986; sole state nature preserve in Highland County); Rocky Fork Park Site (NRHP 73001479) and Rocky Fork Park Group (NRHP listed 1973) within park boundaries; Paint Creek and Rocky Fork Creek proposed for Ohio State Scenic River designation.", "photo_count": 5}}, {"type": "Feature", "geometry": {"type": "Point", "coordinates": [-83.0064, 39.3758]}, "properties": {"slug": "hopewell-culture-national-historical-park", "name": "Hopewell Culture National Historical Park", "state": "OH", "acreage": "1,170", "ecology": "Mixed-grass meadow and early successional floodplain woodland on Scioto River glacial outwash terraces; Mound City unit comprises approximately 40 acres managed hay field, 40 acres mixed mesophytic forest, and reconstructed earthworks on managed turf; 438 vascular plant species in 281 genera and 93 families documented across all park units (17% of Ohio's total flora; 65 new county records); habitat for Henslow's Sparrow (species of conservation concern in Eastern Tallgrass Prairie region); Ohio state-listed Spiranthes ovalis (oval ladies'-tresses) and Eleocharis ovata (ovate spike-rush) documented within park.", "geology": "~375 Mya Devonian shale (Ohio Shale, Olentangy Shale); earthworks built on Pleistocene glacial outwash terraces.", "hydrology": "Scioto River watershed; Mound City Group on the west bank of the Scioto River north of Chillicothe, situated on Pleistocene glacial outwash terraces; Scioto River drains approximately 7,956 sq mi of central Ohio to the Ohio River; park units span Scioto River and Paint Creek drainages across Ross County.", "native_lands": "Adena (c. 1000 BC-100 AD) and Hopewell (c. 1 CE-400 AD) cultures constructed the Mound City earthworks; no direct genealogical link between Hopewell builders and any historically documented tribe has been established; Chalahgawtha (principal-town) division of the Shawandasse Tula (Shawanwaki/Shawnee) returned to the Scioto valley c. 1738 following Haudenosaunee dispersal of Shawnee from the region in the 1670s-80s; the Scioto River Chalahgawtha town (c. 1758-1787) stood on the Scioto west bank near Paint Creek approximately 2-3 miles from Mound City, housing approximately 1,200 people including Tecumseh (b. 1768); Chillicothe, meaning principal town of the Chalahgawtha sept, was the moving political capital of the Shawnee nation with multiple documented locations across southern Ohio; Myaamia (Miami) held the Miami River valleys to the west; Shawnee and Miami lands ceded via Treaty of Greene Ville (August 3, 1795), Article 3 boundary and Article 4 relinquishment, with Shawnee receiving $1,000 annual annuity goods; remaining Shawnee removed west via Treaty with the Shawnee 1831 under Indian Removal Act 1830.", "native_lands_api": "[\"\\ud801\\udccf\\ud801\\udcb0\\ud801\\udcd3\\ud801\\udcb0\\ud801\\udcd3\\ud801\\udcb7  \\ud801\\udcbc\\ud801\\udcc2\\ud801\\udcca\\ud801\\udcbb  \\ud801\\udcc6\\ud801\\udcbb\\ud801\\udcbf\\ud801\\udcb7  \\ud801\\udcc0\\ud801\\udcb0^\\ud801\\udcd3\\ud801\\udcb0^(Osage)\", \"Shawandasse Tula (Shawanwaki/Shawnee)\", \"Kaskaskia\", \"Ofo\", \"Myaamia\"]", "shadow_history": "Squier and Davis opened mounds at Mound City in 1846, recovering approximately 200 stone effigy cremation pipes from Mound 8 (Mound of Pipes), the majority of the collection sent to the British Museum in London where it remains today; Warren K. Moorehead excavated the Hopewell Mound Group using horses and scrapers 1891-1892, obliterating stratigraphic context to collect artifacts for display at the 1893 World's Columbian Exposition in Chicago, artifacts distributed among the Field Museum, the Robert S. Peabody Institute of Archaeology, and other institutions; U.S. Army construction at Camp Sherman 1917 demolished virtually all mounds at Mound City except the large central Mound 7 to grade barracks, roads, pipelines, and railroad lines; mounds #13 and #23 were specifically cut down; excavation of the destroyed Mound 13 base in 1921 recovered cremated remains of 20 Hopewell individuals and a mica-lined grave representing only what was preserved at the base level, with all upper-context material permanently destroyed; artifacts unearthed during Army construction were taken as military souvenirs; the 813th Pioneer Infantry and other African American segregated units of the 92nd Division trained at Camp Sherman under white officers per Army policy; 1,777 soldiers died of influenza at Camp Sherman during the 1918 pandemic, with 125 deaths in a single day on October 8, 1918, and approximately 60% of Chillicothe's civilian population infected; all leveled mounds were reconstructed by Ohio Historical Society from the 1846 Squier-Davis survey maps, the original fill and artifact context permanently destroyed.", "conservation_status": "National Historical Park via Public Law 102-294 (May 27, 1992); UNESCO World Heritage Site (Hopewell Ceremonial Earthworks, list no. 1689, inscribed September 19, 2023, criteria i and iii); National Register of Historic Places.", "photo_count": 9}}, {"type": "Feature", "geometry": {"type": "Point", "coordinates": [-81.0758, 38.07]}, "properties": {"slug": "new-river-gorge-national-park", "name": "New River Gorge National Park and Preserve", "state": "WV", "acreage": "72,808", "ecology": "Mixed Mesophytic forest with oak-hickory on xeric south-facing slopes and hemlock-hardwood (Tsuga canadensis, Fagus grandifolia) in cool mesic coves; understory of Rhododendron maximum and mountain laurel; 1,383 vascular plant species documented across 41 community types.", "geology": "~325 Mya Pennsylvanian and Mississippian sandstone, shale, and coal seams.", "hydrology": "New River drains into the Kanawha River and the Ohio River system; park corridor encompasses approximately 85 km (53 miles) of the New River; tributaries include the Bluestone and Greenbrier Rivers; gorge characterized by pools, shoals, riffles, and cascades.", "native_lands": "Shawnee (Shawanwaki) and Cherokee (Aniyvwiya) maintained hunting territories throughout the New River drainage; Shawnee forces under Chief Cornstalk fought Virginia militia at the Battle of Point Pleasant (October 10, 1774), a decisive engagement leading to the Treaty of Camp Charlotte (October 19, 1774), in which the Shawnee agreed to cease hunting south of the Ohio River and recognize Virginia's territorial claims; Seneca (On\u00f6ndowa'ga:') of the Haudenosaunee Confederacy maintained the Seneca Trail corridor (present US-219) through the region; Moneton peoples documented in pre-contact archaeological evidence; more than 400 archaeological sites along the New, Gauley, and Bluestone Rivers record at least 11,000 years of continuous Indigenous occupation; Shawnee removed to Kansas beginning 1831 under Treaty of Wapakoneta; Loyal Shawnee relocated to Indian Territory (Oklahoma) 1869-1871.", "native_lands_api": "[\"Moneton\", \"S\\u2019atsoyaha (Yuchi)\", \"Shawandasse Tula (Shawanwaki/Shawnee)\", \"Yesan (Tutelo)\"]", "shadow_history": "The gorge's coal company towns enforced a scrip economy in which workers were paid in currency redeemable only at company stores, with markups ensuring perpetual indebtedness; armed guards controlled movement in and out of gated communities. African American miners comprised more than 25% of West Virginia's mining workforce by 1909; Helen, WV (developed by East Gulf Coal Company) enforced strict residential and educational segregation above ground while Black and white workers received equal wages for equal work underground; NPS documents segregated housing, schools, and churches at Nuttallburg and Helen. Coal processing operations associated with the gorge's mines introduced heavy metals into New River tributaries, a pattern documented across the Appalachian coalfield. Segregated CCC companies operated in the region 1933-1942 following Director Robert Fechner's 1935 segregation order.", "conservation_status": "National Park and Preserve (designated December 27, 2020; formerly National River, established 1978).", "photo_count": 18}}, {"type": "Feature", "geometry": {"type": "Point", "coordinates": [-84.7474, 38.8838]}, "properties": {"slug": "big-bone-lick", "name": "Big Bone Lick State Historic Site", "state": "KY", "acreage": "525", "ecology": "Mixed mesophytic forest with oak-hickory overstory on surrounding uplands; active sulphur spring and mineralized salt lick complex creating a distinctive halophytic microhabitat; native grassland and savanna remnants along Discovery Trail; wetland and bog habitat in the spring-fed lowland supports running buffalo clover (Trifolium stoloniferum, delisted 2021) and rare bats.", "geology": "~450 Mya Ordovician limestone and shale (Kope Formation); Pleistocene fossil-bearing bog deposits (25,000-12,000 BP).", "hydrology": "Big Bone Creek drainage, a tributary of the Ohio River; sulphur-bearing mineral springs emerge from the Ordovician bedrock and discharge into the creek floodplain, forming the historic salt lick; Pleistocene fossil record owes its preservation to glacial meltwater drainage from the Laurentide ice sheet during the Wisconsinan Glaciation, which created standing-water conditions that trapped megafauna; Ohio River basin.", "native_lands": "Paleoindians from at least ~12,000 BP \u00b7 Shawnee (Shawanwaki) \u00b7 Delaware (Lenape); the salt springs drew Indigenous hunters for millennia; Shawnee used the lick as a salt source and hunting ground; Mary Draper Ingles, captured by Shawnee in 1755, was brought to Big Bone Lick and put to work boiling brine; Iroquois Confederacy ceded their Ohio River corridor claim to the British Crown via Treaty of Fort Stanwix 1768, a transaction the Shawnee disputed; Shawnee ceded rights south of the Ohio under duress via Treaty of Camp Charlotte 1774 ending Lord Dunmore's War; Cherokee ceded overlapping claims via Treaty of Sycamore Shoals 1775, a private purchase nullified by Virginia 1778; two prehistoric burial mounds and a cemetery documented by the 1932 Webb-Funkhouser survey; 2008 excavation found possible cut marks on Pleistocene bones suggesting Paleoindian butchering.", "native_lands_api": "[\"\\ud801\\udccf\\ud801\\udcb0\\ud801\\udcd3\\ud801\\udcb0\\ud801\\udcd3\\ud801\\udcb7  \\ud801\\udcbc\\ud801\\udcc2\\ud801\\udcca\\ud801\\udcbb  \\ud801\\udcc6\\ud801\\udcbb\\ud801\\udcbf\\ud801\\udcb7  \\ud801\\udcc0\\ud801\\udcb0^\\ud801\\udcd3\\ud801\\udcb0^(Osage)\", \"Shawandasse Tula (Shawanwaki/Shawnee)\"]", "shadow_history": "Big Bone Lick has been systematically stripped of paleontological material for nearly 300 years. In 1739, French-Canadian military commander Charles Le Moyne de Longueuil collected a tusk, femur, and molars and shipped them to Paris, where they entered Louis XV's Cabinet du Roi under Buffon's direction, initiating the first scientific attention to North American Pleistocene megafauna. In 1765-66, British Indian agent George Croghan extracted specimens on two expeditions; one collection was seized during an attack; the second was presented by Benjamin Franklin to the Royal Society of London. By the late 18th century, hundreds and possibly thousands of bones had been removed by collectors. President Thomas Jefferson, fixated on the site as a rebuttal to Buffon's theory of American animal degeneracy, dispatched Meriwether Lewis in October 1803 to collect specimens; those bones were loaded onto a keelboat and shipped south by river in early 1804 and the boat sank near Natchez, Mississippi, losing the entire collection. Jefferson then commissioned William Clark, who conducted a three-week excavation in fall 1807 with a ten-man crew, removing over 300 bones and teeth; Jefferson divided the collection among the Paris Museum of Natural History, the American Philosophical Society, and Monticello, where specimens were displayed in the Entrance Hall. Clark's 11-page description allowed naturalists to distinguish mammoths from mastodons for the first time, making this the first funded paleontological field excavation in North America. In 1962-67, University of Nebraska paleontologists recovered over 2,000 specimens now held at the University of Nebraska State Museum; four species were formally named from Big Bone Lick material. James Colquohoun operated a salt works at the site from approximately 1795 until 1812; Kentucky salt works of the era routinely used enslaved labor, and the 1800 Boone County census recorded 325 enslaved persons (21% of the county population), though direct documentary evidence tying enslaved workers to Colquohoun's operation has not yet been confirmed in available records. The Clay House hotel opened at Big Bone Lick in 1815 and operated until approximately 1845, serving planter families including the Clays and Breckinridges for mineral spring bathing; enslaved domestic service workers almost certainly staffed the operation, but no named records have been located.", "conservation_status": "Kentucky State Historic Site (established 1960); National Register of Historic Places (1972); National Natural Landmark (January 2009); National Historic Landmark (2024); Lewis and Clark Heritage Trail Site (2002).", "photo_count": 10}}, {"type": "Feature", "geometry": {"type": "Point", "coordinates": [-84.8153, 38.9989]}, "properties": {"slug": "dinsmore-woods", "name": "Dinsmore Woods State Nature Preserve", "state": "KY", "acreage": "107", "ecology": "Old-growth mixed hardwood forest unlogged since at least the 1830s, dominated by sugar maple, white oak, hackberry, and walnut; understory of pawpaw thickets and rich spring ephemerals including trillium, bloodroot, dwarf larkspur, wood poppy, and trout lily on deep glacially influenced soils.", "geology": "~450 Mya Ordovician limestone and shale.", "hydrology": "Ridgetop and slope site draining to Middle Creek, a direct tributary of the Ohio River; glacial outwash deposits underlie the site, producing deep, moisture-retentive soils unusual for Kentucky; Ohio River basin.", "native_lands": "Adena culture (500 BCE-200 CE) \u00b7 Shawnee (Shawanwaki) \u00b7 Cherokee (Tsalagi); Adena moundbuilding culture occupied the Ohio River valley with documented sites in Boone County; Kentucky's interior served as contested hunting ground at the time of European contact; Iroquois Confederacy ceded their Ohio River corridor claim to the British Crown via Treaty of Fort Stanwix 1768; Cherokee ceded approximately 20 million acres including present-day Kentucky to the Transylvania Company via Treaty of Sycamore Shoals March 1775, opposed by Cherokee leader Dragging Canoe who called the cession a betrayal and withdrew to form the Chickamauga; Shawnee recognized the Ohio River as their southern boundary under Treaty of Camp Charlotte 1774, though many Shawnee rejected this cession; Shawnee and allied nations formally ceded remaining Ohio Valley claims via Treaty of Greenville 1795.", "native_lands_api": "[\"\\ud801\\udccf\\ud801\\udcb0\\ud801\\udcd3\\ud801\\udcb0\\ud801\\udcd3\\ud801\\udcb7  \\ud801\\udcbc\\ud801\\udcc2\\ud801\\udcca\\ud801\\udcbb  \\ud801\\udcc6\\ud801\\udcbb\\ud801\\udcbf\\ud801\\udcb7  \\ud801\\udcc0\\ud801\\udcb0^\\ud801\\udcd3\\ud801\\udcb0^(Osage)\", \"Shawandasse Tula (Shawanwaki/Shawnee)\", \"Kaskaskia\"]", "shadow_history": "The 107-acre nature preserve is the forested portion of the original Dinsmore farm, a working plantation on which enslaved people lived and labored from 1842 onward. James Dinsmore brought approximately ten to fifteen enslaved individuals from his Mississippi and Louisiana holdings to Kentucky upon completing Dinsmore Homestead in 1842. Those documented by name include: Coah (ca. 1790-1862), born in West Africa and previously enslaved in Mississippi and Louisiana; Nancy McGruder (ca. 1809-1906), purchased by Dinsmore ca. 1825 in Mississippi; Sally Taylor (ca. 1810-?) and her children John, Daniel, David, Nannette, Judy, Angeline, and Isaac. Jilson Hawkins (ca. 1811-1879) and Eliza Hawkins (ca. 1819-1903) remained in Louisiana until approximately 1862-63, joining the Kentucky farm during the Civil War. Nancy McGruder left the farm after the Civil War's end, then returned to work as a free person, living on the property until her death in 1906. The Dinsmore Homestead, listed on the National Register of Historic Places, installed interpretive panels documenting the African American experience on the farm from 1840 through 1865. The woodland tract that became the nature preserve was inseparable from this farm landscape; no public interpretation at the preserve connects the old-growth forest to the labor history of the people who lived among it.", "conservation_status": "Kentucky State Nature Preserve (dedicated May 16, 1990; managed by Boone County Fiscal Court under Office of Kentucky Nature Preserves).", "photo_count": 5}}, {"type": "Feature", "geometry": {"type": "Point", "coordinates": [-84.0365, 39.5146]}, "properties": {"slug": "caesar-creek", "name": "Caesar Creek State Park", "state": "OH", "acreage": "7,530", "ecology": "Oak-hickory and beech-maple upland forests with northern floodplain forest in creek valleys; restored native prairie and wetland complexes support grassland-dependent birds including grasshopper sparrow, Eastern meadowlark, bald eagle, and osprey; over 200 bird species recorded.", "geology": "~447 Mya Ordovician limestone and shale.", "hydrology": "Caesar Creek is a tributary of the Little Miami River (a National Wild and Scenic River), draining a 237-square-mile watershed in Warren, Clinton, and Greene counties; the U.S. Army Corps of Engineers dam (completed 1978) impounds a 2,830-acre reservoir; Anderson Fork converges with Caesar Creek at the former site of New Burlington.", "native_lands": "Shawnee (Shawanwaki) \u00b7 Myaamia (Miami) \u00b7 Hopewell culture (300 BCE-600 CE) \u00b7 Fort Ancient culture (1200-1600 CE); Fort Ancient Earthworks, a UNESCO World Heritage Site, located in Warren County; creek named for Caesar, an enslaved Virginian who escaped bondage c. 1774, was adopted by the Shawnee, and used the valley as hunting grounds; Shawnee and Miami ceded southern Ohio via Treaty of Greenville 1795; remaining Ohio Shawnee removed west via Treaty of Wapakoneta 1831.", "native_lands_api": "[\"\\ud801\\udccf\\ud801\\udcb0\\ud801\\udcd3\\ud801\\udcb0\\ud801\\udcd3\\ud801\\udcb7  \\ud801\\udcbc\\ud801\\udcc2\\ud801\\udcca\\ud801\\udcbb  \\ud801\\udcc6\\ud801\\udcbb\\ud801\\udcbf\\ud801\\udcb7  \\ud801\\udcc0\\ud801\\udcb0^\\ud801\\udcd3\\ud801\\udcb0^(Osage)\", \"Shawandasse Tula (Shawanwaki/Shawnee)\", \"Kaskaskia\", \"Myaamia\"]", "shadow_history": "The creation of Caesar Creek Lake required the forced inundation of New Burlington, a functioning rural community straddling the Warren/Clinton County line at the confluence of Caesar Creek and Anderson Fork. Approximately 300 residents were displaced beginning in the mid-1960s when the Army Corps of Engineers began acquiring land under eminent domain; the last resident, 87-year-old Lawrence Mitchner, departed April 20, 1973, after refusing to meet with Corps appraisers. The community included a post office, Quaker meetinghouse, school, churches, a Masonic lodge, and farms. John Baskin documented the displacement in New Burlington: The Life and Death of an American Village (1976). The Caesar's Creek Quaker Meetinghouse was relocated rather than demolished. A 1976 archaeological reconnaissance conducted prior to inundation documented pre-contact sites in the reservoir footprint; earlier surveys had recorded a Hopewell-era village of 60-70 acres near the creek, featuring burial mounds up to 8 feet high with 79 documented burials; these and other sites were permanently inundated without preservation. The creek's name carries an additional layer: it memorializes Caesar, an enslaved Virginian who escaped bondage c. 1774 and was adopted into the Shawnee nation, a detail absent from most park signage.", "conservation_status": "Ohio State Park (ODNR, opened 1978, leased from U.S. Army Corps of Engineers); Caesar Creek Lake Wildlife Area (3,100 acres, ODNR Division of Wildlife); Caesar Creek Important Bird Area (Audubon Society of Ohio).", "photo_count": 4}}, {"type": "Feature", "geometry": {"type": "Point", "coordinates": [-84.8084, 39.1207]}, "properties": {"slug": "shawnee-lookout", "name": "Shawnee Lookout", "state": "OH", "acreage": "2,179", "ecology": "Upland deciduous ridge forest above the Ohio and Great Miami River confluence; pawpaw groves host the largest zebra swallowtail butterfly population in Hamilton County; spicebush understory; tallgrass prairie remnants along trail corridors; bottomland forest along the Great Miami; more than 500 plant species documented; cerulean warbler, bald eagle, and fox squirrel present; adjacent Oxbow wetlands (914 acres) support 270+ bird species.", "geology": "~450 Mya Ordovician limestone and shale.", "hydrology": "Confluence of the Ohio River and Great Miami River at the park's southern and western margins; headwater streams drain west from the ridge to the Great Miami; more than 9,000 feet of headwater streams were buried in culverts during 1979 golf course construction and are being daylighted beginning 2025; Great Miami watershed.", "native_lands": "Adena culture \u00b7 Hopewell tradition \u00b7 Fort Ancient culture \u00b7 Shawnee (Shawanwaki) \u00b7 Myaamia (Miami); site occupied continuously for approximately 14,000 years; Hopewell builders constructed the Miami Fort earthwork complex approximately 2,000 years ago -- a water management and ceremonial enclosure nearly 6 km in extent, the largest of its kind in Ohio; Fort Ancient culture succeeded Hopewell occupation; Shawnee cultural continuity with the earthwork builders documented by University of Cincinnati archaeologists; the Treaty of Fort Finney (January 31, 1786) was signed at Fort Finney, a U.S. military post erected at the mouth of the Great Miami River directly below the Miami Fort earthwork; Shawnee delegates were coerced under military threat; the broader Shawnee nation repudiated the treaty, triggering the Northwest Indian War; full cession came via Treaty of Greene Ville 1795 following Battle of Fallen Timbers 1794.", "native_lands_api": "[\"\\ud801\\udccf\\ud801\\udcb0\\ud801\\udcd3\\ud801\\udcb0\\ud801\\udcd3\\ud801\\udcb7  \\ud801\\udcbc\\ud801\\udcc2\\ud801\\udcca\\ud801\\udcbb  \\ud801\\udcc6\\ud801\\udcbb\\ud801\\udcbf\\ud801\\udcb7  \\ud801\\udcc0\\ud801\\udcb0^\\ud801\\udcd3\\ud801\\udcb0^(Osage)\", \"Shawandasse Tula (Shawanwaki/Shawnee)\", \"Kaskaskia\", \"Myaamia\"]", "shadow_history": "The Shawnee Lookout Archaeological District was listed on the National Register of Historic Places in 1974 (NRHP #74001516), recognizing it as one of the most significant Native American hilltop sites in the eastern United States; the listing did not prevent the Hamilton County Park District from constructing the Shawnee Lookout Golf Course in 1979 directly over portions of the archaeological district, burying more than 9,000 feet of headwater streams in culverts and grading land across an active site of national significance; cart paths were laid across the earthwork landscape; the golf course operated until 2019. University of Cincinnati archaeologist Ken Tankersley's fieldwork in 2008-2009 revealed via LiDAR survey that the Miami Fort earthwork complex is approximately twice the size recorded by the standard 19th-century maps, suggesting that major portions of the site were unmapped, unprotected, and potentially altered for over 150 years. The foundational documentation of the site came from E.G. Squier and Edwin Davis's 1847-1848 survey, published as the Smithsonian's first monograph, Ancient Monuments of the Mississippi Valley (1848); in the course of that survey Squier and Davis collected more than 6,000 objects from Ohio Valley mounds and enclosures; Squier sold the collection to a British collector in 1864 for $10,000, and it was transferred to the British Museum in 1931, where it remains today; which objects originated at Miami Fort specifically has not been confirmed in accessible public records. Stream daylighting and archaeological district restoration began 2025 in partnership with The Nature Conservancy, with the Miami Tribe of Oklahoma's Tribal Historic Preservation Office actively consulted on the identification of intact sites and sacred areas.", "conservation_status": "Great Parks of Hamilton County; Shawnee Lookout Archaeological District, National Register of Historic Places (listed December 2, 1974).", "photo_count": 5}}, {"type": "Feature", "geometry": {"type": "Point", "coordinates": [-84.6878, 39.2922]}, "properties": {"slug": "fernald-preserve", "name": "Fernald Preserve", "state": "OH", "acreage": "1,050", "ecology": "Restored tallgrass prairie, wetlands, and upland forest on reclaimed nuclear weapons production land; 360 acres of prairie and savanna supporting Dickcissel, Bobolink, Grasshopper Sparrow, and Eastern Meadowlark; 400 acres of shingle oak and sycamore-cottonwood forest; 140 acres of wetlands including three open-water lakes supporting migratory waterfowl and shorebirds; more than 250 bird species recorded since 2008.", "geology": "~450 Mya Ordovician limestone and shale.", "hydrology": "Paddys Run watershed; Paddys Run, a 9-mile tributary of the Great Miami River, flows through the western preserve and drains approximately 16 square miles before joining the Great Miami at Crosby Township; a losing stream that recharges the Great Miami Buried Valley Aquifer directly below the site; uranium contamination in the aquifer confirmed; active groundwater pump-and-treat system ongoing.", "native_lands": "Myaamia (Miami) \u00b7 Shawnee (Shawanwaki) \u00b7 Fort Ancient culture (900-1650 CE); Great Miami River valley a core Myaamia territory, river named for the nation; Fort Ancient people, widely regarded as Shawnee ancestors, occupied bluffs above the river; Shawnee and Miami among signatories who ceded southwestern Ohio via Treaty of Greene Ville 1795 following Battle of Fallen Timbers 1794; Myaamia removed to Kansas then Indian Territory (present-day Oklahoma) by 1846.", "native_lands_api": "[\"\\ud801\\udccf\\ud801\\udcb0\\ud801\\udcd3\\ud801\\udcb0\\ud801\\udcd3\\ud801\\udcb7  \\ud801\\udcbc\\ud801\\udcc2\\ud801\\udcca\\ud801\\udcbb  \\ud801\\udcc6\\ud801\\udcbb\\ud801\\udcbf\\ud801\\udcb7  \\ud801\\udcc0\\ud801\\udcb0^\\ud801\\udcd3\\ud801\\udcb0^(Osage)\", \"Shawandasse Tula (Shawanwaki/Shawnee)\", \"Kaskaskia\", \"Myaamia\"]", "shadow_history": "From 1951 to 1989 the site operated as the Fernald Feed Materials Production Center (FMPC), a classified uranium metal refining plant processing ore for the U.S. nuclear weapons program under the Atomic Energy Commission and later the Department of Energy; operated by National Lead Company of Ohio 1951-1986, then Westinghouse; produced approximately 170,000 metric tons of uranium metal products over 38 years. DOE and its contractors concealed ongoing contamination from residents for decades: uranium dust was released into air and groundwater throughout the 1950s-1980s; DOE knew by 1980 that private wells near the site were contaminated with uranium but did not disclose this to residents for four years. In 1984 a broken filtration system released approximately 275 pounds of uranium oxide dust off-site. K-65 silos on the site's western end stored radium-226-contaminated waste from uranium ore residues, a persistent source of radon gas; NIOSH documented elevated lung cancer risk among workers exposed to the K-65 radon plume. In 1984 Lisa Crawford, a renter on adjacent property who discovered her well was contaminated, founded Fernald Residents for Environmental Safety and Health (FRESH) and sued the Department of Energy that same year. Also in 1984, pipefitter David Bocks, 39, disappeared during a night shift; his remains were found in a uranium oxide furnace operating at 1,350 degrees; OSHA investigation ruled the death accidental, but coworkers and family disputed this, alleging he had documented plant emissions violations before his death; the case was cited in federal congressional testimony on contractor conduct at DOE weapons facilities. A class-action lawsuit (In re Fernald Litigation, Case No. C-1-85-149) produced a 1989 settlement of $78 million for 9,764 residents within five miles, covering emotional distress, property value loss, and an 18-year medical monitoring program (1990-2008); documented outcomes in the cohort included elevated rates of kidney and urinary tract cancers, lupus, and renal disease. In 1994, plant workers won a separate $20 million settlement for emotional distress and lifetime medical monitoring. EPA designated Fernald a Superfund priority in 1989; cleanup cost $4.4 billion over fifteen years, entombing more than 925,000 cubic yards of low-level radioactive waste under eight capped on-site disposal cells beneath a permanent mound. Uranium contamination of the Great Miami Buried Valley Aquifer was confirmed; pump-and-treat groundwater remediation begun in 1993 continues, with monitoring expected into the late 2030s. The site is permanently restricted from residential use by institutional controls.", "conservation_status": "DOE Office of Legacy Management (long-term stewardship under CERCLA and RCRA); Fernald Natural Resource Trustees: DOE, USFWS, and Ohio EPA; EPA Superfund National Priorities List, listed 1989, remediation complete 2006.", "photo_count": 6}}, {"type": "Feature", "geometry": {"type": "Point", "coordinates": [-85.4188, 38.7608]}, "properties": {"slug": "clifty-falls-state-park", "name": "Clifty Falls State Park", "state": "IN", "acreage": "1,416", "ecology": "Mixed deciduous forest with chestnut oak, post oak, and black oak on dry canyon rim slopes; beech and sycamore in canyon bottoms; Clifty Canyon State Nature Preserve protects one of Indiana's finest gorge ecosystems.", "geology": "~445 Mya Ordovician limestone and shale.", "hydrology": "Clifty Creek drains through a 300-foot-deep canyon to the Ohio River; four major waterfalls including Tunnel Falls (83 ft) and Hoffman Falls (78 ft); drainage pattern established during Pleistocene glaciation when streams were redirected southward to the newly formed Ohio River valley.", "native_lands": "Shawandasse Tula (Shawnee) \u00b7 Myaamia (Miami); Ohio River valley ancestral Shawnee homeland; Shawnee displaced from the Ohio valley following the American Revolution; Treaty of Greenville 1795 ceded southeastern Indiana to the United States; Shawnee, Miami, and allied nations removed from Indiana under the Indian Removal Act 1830.", "native_lands_api": "[\"Shawandasse Tula (Shawanwaki/Shawnee)\", \"Myaamia\"]", "shadow_history": "Madison State Hospital (opened 1910 as Southeastern Indiana Hospital for the Insane) operated the adjacent farm fields under a patient-labor model in which psychiatric patients grew food, ran a dairy, and built roads without compensation; the Indiana legislature determined in the 1960s that this constituted indentured servitude, leading the hospital to discontinue farming rather than pay patients; the farm fields transferred to the park in 1965 were worked under this system for at least four decades; an institutional cemetery on hospital grounds holds an estimated 300 to 400 burials, the majority marked only with metal crosses bearing patient numbers rather than names.", "conservation_status": "Indiana State Park; Clifty Canyon State Nature Preserve.", "photo_count": 11}}, {"type": "Feature", "geometry": {"type": "Point", "coordinates": [-84.4233, 39.1991]}, "properties": {"slug": "french-park", "name": "French Park", "state": "OH", "acreage": "275", "ecology": "Mixed mesophytic forest with oak-hickory woodlands, beech-maple slopes, and pawpaw thickets; meadow and prairie patches support pollinators; creek corridor hosts sycamore and tulip-poplar with exposed Ordovician fossil beds.", "geology": "~450 Mya Ordovician limestone and shale.", "hydrology": "Amberley Creek flows through the park, a tributary of Mill Creek, which drains 166 square miles of Hamilton County to the Ohio River; creek bed exposes fossiliferous Ordovician limestone.", "native_lands": "Hopewell tradition \u00b7 Shawnee (Shawanwaki) \u00b7 Myaamia (Miami); Benham Mound, an 8-foot Hopewell burial mound within the park with recovered mica indicating long-distance trade networks, listed on the National Register of Historic Places 1974; Adena culture earthworks documented throughout Hamilton County; Shawnee and Miami held the Ohio River valley at European contact; ceded Ohio lands via Treaty of Greenville 1795 following Battle of Fallen Timbers 1794.", "native_lands_api": "[\"\\ud801\\udccf\\ud801\\udcb0\\ud801\\udcd3\\ud801\\udcb0\\ud801\\udcd3\\ud801\\udcb7  \\ud801\\udcbc\\ud801\\udcc2\\ud801\\udcca\\ud801\\udcbb  \\ud801\\udcc6\\ud801\\udcbb\\ud801\\udcbf\\ud801\\udcb7  \\ud801\\udcc0\\ud801\\udcb0^\\ud801\\udcd3\\ud801\\udcb0^(Osage)\", \"Shawandasse Tula (Shawanwaki/Shawnee)\", \"Kaskaskia\", \"Myaamia\"]", "shadow_history": "The Benham Mound within the park, a Hopewell burial mound listed on the National Register of Historic Places in 1974, was excavated by local residents in the late 19th century; the diggings recovered mica deposits, stone tools, axes, scrapers, chisels, and flint projectile points; no institutional repository for the recovered material and no record of human remains from these excavations have been identified in accessible records; Herbert Greer French, who bequeathed the estate to the Cincinnati Park Board in 1942, was a vice president of Procter and Gamble.", "conservation_status": "Cincinnati Park Board property; Benham Mound listed on the National Register of Historic Places (1974).", "photo_count": 12}}, {"type": "Feature", "geometry": {"type": "Point", "coordinates": [-84.7025, 36.5072]}, "properties": {"slug": "big-south-fork-national-river-and-recreation-area", "name": "Big South Fork National River and Recreation Area", "state": "TN", "acreage": "125,000", "ecology": "Mixed mesophytic and oak-hickory forest dominates the upland plateau, with hemlock ravine forest and floodplain forest in the gorge zone; mountain laurel and rhododendron are prominent understory species, and sandstone cliffs host rare endemics including Cumberland cliff sedge and Appalachian shoestring fern.", "geology": "~310 Mya Pennsylvanian sandstone and conglomerate.", "hydrology": "Cumberland River watershed via the Big South Fork of the Cumberland River, a 76-mile free-flowing river formed by the confluence of the New River and Clear Fork in Scott County, Tennessee; the gorge system features steep-walled sandstone canyons, waterfalls, and seeps across 472+ miles of streams.", "native_lands": "Cherokee (Aniyunwiya) held the Cumberland Plateau as ancestral hunting territory, with rockshelter camps documented throughout the gorge zone; Yuchi (Tsoyaha) occupied the plateau prior to Cherokee dominance; Shawnee (Shawanwaki) used the region as hunting grounds following the Beaver Wars in the 1660s; Cherokee ceded adjacent plateau lands via the First Treaty of Tellico 1798 and remaining Cumberland Plateau territory via the Third Treaty of Tellico 1805; Cherokee removed to Oklahoma via the Trail of Tears 1838-1839.", "native_lands_api": "[\"\\u13e3\\u13b3\\u13ab\\u13ea\\u13d8\\u13f1 Tsalaguwetiyi (Cherokee, East)\", \"S\\u2019atsoyaha (Yuchi)\", \"Shawandasse Tula (Shawanwaki/Shawnee)\"]", "shadow_history": "Abandoned surface and deep coal mines throughout the park, the highest concentration of any NPS unit in the region, produce ongoing acid mine drainage; Roaring Paunch Creek and multiple tributaries carry contamination the NPS characterizes as potentially harmful to humans, with remediation underway under the Infrastructure Investment and Jobs Act; when word spread that the Army Corps of Engineers was authorized to acquire land under the 1974 act, large private landholders including Stearns Coal and Lumber accelerated logging and mining operations on their holdings before condemnation could proceed, extracting maximum value from land they knew would be taken; Blue Heron, the last Stearns company town in the gorge, was abandoned in 1962 after coal reserves were exhausted, leaving residents to relocate independently before Corps acquisition began in 1979.", "conservation_status": "National River and Recreation Area; Kentucky Wild River (Blue Heron section).", "photo_count": 8}}, {"type": "Feature", "geometry": {"type": "Point", "coordinates": [-86.1, 37.1877]}, "properties": {"slug": "mammoth-cave-national-park", "name": "Mammoth Cave National Park", "state": "KY", "acreage": "54,012 acres", "ecology": "Temperate deciduous forest above; cave ecosystem with endemic troglobitic species; endangered Indiana bat and Kentucky cave shrimp; Green River corridor.", "geology": "~340 million years ago (limestone bedrock); cave passages formed over last 10 million years.", "hydrology": "Green River and Nolin River; vast karst aquifer; 400+ miles of surveyed passages; Echo River flows underground.", "native_lands": "Shawnee (Shawanwaki) \u00b7 Cherokee \u00b7 Chickasaw \u00b7 Osage; cave known to indigenous peoples 4,000+ years; mummified remains recovered from deep passages; forced removal from Kentucky by early 19th century.", "native_lands_api": "[\"\\u13e3\\u13b3\\u13ab\\u13ea\\u13d8\\u13f1 Tsalaguwetiyi (Cherokee, East)\", \"S\\u2019atsoyaha (Yuchi)\", \"Shawandasse Tula (Shawanwaki/Shawnee)\"]", "shadow_history": "In 1842, cave owner Dr. John Croghan moved 16 tuberculosis patients into the cave believing its constant temperature would cure consumption; enslaved workers built two stone cottages and eight wooden huts inside the cave; five patients died inside the cave, their bodies laid on what became known as Corpse Rock; Croghan died of tuberculosis in 1849; CCC Company 510, an all-Black company and the first CCC camp established in Kentucky (May 22, 1933), was placed at Mammoth Cave specifically because of its remoteness from white communities; when the Decree of Eminent Domain was issued against 507 families on 54,000 acres, Black families who had lived and worked the land were displaced without provision for resettlement, while white men retained their positions as guides; landowners widely reported receiving below-market compensation, and more than 70 cemeteries remain within park boundaries today; a pre-Columbian man now called Lost John was displayed publicly in the cave until the mid-1970s; a mummified woman known as Fawn Hoof, recovered in 1811, was exhibited at the 1876 and 1893 World's Fairs and transferred to the Smithsonian where the remains are held today.", "conservation_status": "National Park; UNESCO World Heritage Site; UNESCO International Biosphere Reserve; International Dark Sky Park; Kentucky Wild River (Green River).", "photo_count": 28}}, {"type": "Feature", "geometry": {"type": "Point", "coordinates": [-93.9308, 29.6776]}, "properties": {"slug": "sea-rim-state-park", "name": "Sea Rim State Park", "state": "TX", "acreage": "15,109 acres", "ecology": "Tidal salt marsh; chenier ridge; Gulf beach; critical migratory bird corridor (Central Flyway).", "geology": "~11,700 years ago - present.", "hydrology": "Gulf of Mexico shoreline; Sabine Lake; Intracoastal Waterway; tidal marsh drainage.", "native_lands": "Ishak (Atakapa-Ishak) \u00b7 Akokisa (Eastern Atakapa) peoples; Gulf coastal territory occupied continuously since the end of the last Ice Age.", "native_lands_api": "[\"Karankawa\", \"Ishak (Atakapa)\"]", "shadow_history": "The park was purchased in 1972 from the Planet Oil and Mineral Corporation; active oil rigs remain visible from the park beach, and the site lies within Jefferson County, where the Spindletop salt dome discovery of 1901 launched the modern petroleum industry; the park's tidal marsh system is hydrologically connected to multiple federal hazardous waste sites in the Port Arthur-Beaumont corridor, including the Star Lake Canal Superfund site and contaminated wetlands from a former Chevron refinery; Hurricanes Rita (2005) and Ike (2008) drove refinery and tank farm spills totaling approximately 8 million gallons across the region before the park reopened in 2010.", "conservation_status": "Texas State Park.", "photo_count": 4}}, {"type": "Feature", "geometry": {"type": "Point", "coordinates": [-101.0578, 33.9778]}, "properties": {"slug": "caprock-canyon", "name": "Caprock Canyon State Park", "state": "TX", "acreage": "15,313 acres", "ecology": "Shortgrass prairie; canyon riparian; home to the official Texas State Bison Herd ; last free-ranging southern plains bison lineage.", "geology": "~299-2.6 million years ago (surface strata).", "hydrology": "South Prong Little Red River; Lake Theo (reservoir); playa lakes; intermittent canyon streams.", "native_lands": "Comanche (N\u0289m\u0289n\u0289\u0289) \u00b7 Kiowa \u00b7 Apache; territory of the Comancheria; Caprock Canyons part of the southern Comanche range; forced removal to Oklahoma reservations 1874-75.", "native_lands_api": "[\"N\\u0289m\\u0289n\\u0289\\u0289 Sookobit\\u0289 (Comanche)\", \"Nd\\u00e9 K\\u00f3nits\\u0105\\u0105\\u00ed\\u00ed Gok\\u00edyaa (Lipan Apache)\"]", "shadow_history": "The Texas State Bison Herd at Caprock Canyons descends from calves captured by Charles Goodnight beginning in 1878, immediately after the systematic extermination campaign of 1874 to 1878 reduced the southern plains bison population from an estimated tens of millions to fewer than 1,000 animals continent-wide; Folsom- and Archaic-period archaeological sites are documented throughout the canyon, and Texas Parks and Wildlife acknowledges that most have been disturbed, with many artifacts removed, though no specific prosecution for looting at this site appears in public records.", "conservation_status": "Texas State Park; International Dark Sky Park.", "photo_count": 11}}, {"type": "Feature", "geometry": {"type": "Point", "coordinates": [-101.6713, 34.8873]}, "properties": {"slug": "palo-duro-canyon", "name": "Palo Duro Canyon State Park", "state": "TX", "acreage": "29,182 acres", "ecology": "Chihuahuan Desert transition; juniper-mesquite canyon scrub; cottonwood riparian corridor; pronghorn, mule deer, aoudad sheep.", "geology": "~252-201 million years ago (exposed strata).", "hydrology": "Prairie Dog Town Fork of the Red River; ephemeral tributaries; canyon springs.", "native_lands": "Comanche (N\u0289m\u0289n\u0289\u0289) \u00b7 Kiowa \u00b7 Southern Cheyenne \u00b7 Arapaho; earlier Apache; canyon occupied 12,000+ years; Battle of Palo Duro Canyon 1874 ended Comanche and Kiowa presence on the Southern Plains.", "native_lands_api": "[\"G\\u00e1uig\\u00fa (Kiowa)\", \"N\\u0289m\\u0289n\\u0289\\u0289 Sookobit\\u0289 (Comanche)\", \"Nd\\u00e9 K\\u00f3nits\\u0105\\u0105\\u00ed\\u00ed Gok\\u00edyaa (Lipan Apache)\"]", "shadow_history": "CCC Companies 2875 and 2876, composed of African American enrollees transferred from East Texas, arrived at Palo Duro in August 1935 and performed the same construction labor as four white companies already on site; the Texas State Parks Board chairman selected Palo Duro specifically for Black enrollees because its canyon location 13 miles from Amarillo made geographic isolation easier to enforce; Black Texans were legally barred from entering the park they built until the Texas State Parks system was desegregated under federal pressure in 1964; Texas Parks and Wildlife acknowledges that most of the canyon's archaeological sites have been picked over and many artifacts removed.", "conservation_status": "Texas State Park; National Natural Landmark.", "photo_count": 14}}, {"type": "Feature", "geometry": {"type": "Point", "coordinates": [-90.848, 37.553]}, "properties": {"slug": "johnsons-shut-ins-state-park", "name": "Johnson's Shut-Ins State Park", "state": "MO", "acreage": "8,916 acres", "ecology": "Ozark Highland; dolomite glades; dry chert woodland; rare endemic species in igneous glade communities.", "geology": "~1.47 billion years ago (bedrock).", "hydrology": "East Fork Black River; Taum Sauk Reservoir (upstream); shut-in pools and cascades; 2005 reservoir breach reshaped lower park terrain.", "native_lands": "Osage Nation (Wazhazhe) \u00b7 earlier Paleo-Indian peoples; Osage hunted throughout the St. Francois Mountains; ceded territory via 1808 treaty under duress.", "native_lands_api": "[\"\\ud801\\udccf\\ud801\\udcb0\\ud801\\udcd3\\ud801\\udcb0\\ud801\\udcd3\\ud801\\udcb7  \\ud801\\udcbc\\ud801\\udcc2\\ud801\\udcca\\ud801\\udcbb  \\ud801\\udcc6\\ud801\\udcbb\\ud801\\udcbf\\ud801\\udcb7  \\ud801\\udcc0\\ud801\\udcb0^\\ud801\\udcd3\\ud801\\udcb0^(Osage)\", \"O-ga-xpa Ma-zho\\u207f (O-ga-xpa) (Quapaw)\", \"Kaskaskia\", \"Kiikaapoi (Kickapoo)\", \"O\\u010dh\\u00e9thi \\u0160ak\\u00f3wi\\u014b\"]", "shadow_history": "The park was assembled over 17 years by Joseph Desloge, heir to a St. Louis lead-mining family whose wealth derived from mineral extraction in the same regional belt as the park's Precambrian geology, and donated to the state in 1955; a 2006 to 2007 USGS study following the 2005 reservoir breach documented elevated turbidity, dissolved aluminum, dissolved iron, and a blue-green surface coloration in the East Fork Black River attributed to rock flour and an alum-based flocculant used by AmerenUE; the East Fork Black River corridor has documented Paleo-Indian occupation extending to approximately 12,000 years BP, and whether the flood disturbed intact subsurface deposits has not been publicly assessed.", "conservation_status": "Missouri State Park; Missouri State Natural Areas (Johnson's Shut-Ins Natural Area, Johnson's Shut-Ins Dolomite Glade Natural Area, Johnson's Shut-Ins Fen Natural Area); Missouri Wild Areas (East Fork Wild Area, Goggins Mountain Wild Area).", "photo_count": 7}}, {"type": "Feature", "geometry": {"type": "Point", "coordinates": [-90.726, 37.637]}, "properties": {"slug": "elephant-rocks-state-park", "name": "Elephant Rocks State Park", "state": "MO", "acreage": "132 acres", "ecology": "Igneous glade and savanna; rare lichen communities on granite surfaces; St. Francois Mountains endemic flora.", "geology": "~1.47 billion years ago (granite intrusion).", "hydrology": "Headwaters of Stout Creek; ephemeral drainage between boulder fields.", "native_lands": "Osage Nation (Wazhazhe) \u00b7 earlier Archaic and Woodland period peoples; Osage ancestral domain included all of southern Missouri; forced removal 1825.", "native_lands_api": "[\"\\ud801\\udccf\\ud801\\udcb0\\ud801\\udcd3\\ud801\\udcb0\\ud801\\udcd3\\ud801\\udcb7  \\ud801\\udcbc\\ud801\\udcc2\\ud801\\udcca\\ud801\\udcbb  \\ud801\\udcc6\\ud801\\udcbb\\ud801\\udcbf\\ud801\\udcb7  \\ud801\\udcc0\\ud801\\udcb0^\\ud801\\udcd3\\ud801\\udcb0^(Osage)\", \"O-ga-xpa Ma-zho\\u207f (O-ga-xpa) (Quapaw)\", \"Kaskaskia\", \"Kiikaapoi (Kickapoo)\", \"O\\u010dh\\u00e9thi \\u0160ak\\u00f3wi\\u014b\"]", "shadow_history": "The Graniteville quarry operated beginning in 1869 as a company town with approximately 700 residents at peak; the company owned the hotel, post office, store, railroad depot, and workers' homes; the quarry supplied paving granite for the Eads Bridge piers and St. Louis streets; silica dust exposure in granite quarrying was a nationally documented occupational hazard by the 1890s, producing silicosis in quarry workers, though no site-specific injury or fatality records for Graniteville appear in accessible public records; two abandoned quarry pits remain within the park without documented environmental remediation.", "conservation_status": "Missouri State Park; Missouri State Natural Area (Elephant Rocks Natural Area).", "photo_count": 5}}, {"type": "Feature", "geometry": {"type": "Point", "coordinates": [-98.688, 34.726]}, "properties": {"slug": "charons-garden-wilderness-area", "name": "Charon's Garden Wilderness Area", "state": "OK", "acreage": "5,723 acres", "ecology": "Mixed-grass prairie; post oak savanna; granite outcrop community; federally listed black-capped vireo habitat; no mechanized access.", "geology": "~525 million years ago (bedrock).", "hydrology": "Ephemeral streams draining granite uplands; vernal pools in boulder depressions; no permanent surface water.", "native_lands": "Comanche (N\u0289m\u0289n\u0289\u0289) \u00b7 Kiowa \u00b7 Wichita (Kitikiti'sh) \u00b7 Apache; Wichita Mountains used as refuge and gathering ground; Comanche and Kiowa held this territory until Kiowa-Comanche-Apache Reservation established 1867.", "native_lands_api": "[\"G\\u00e1uig\\u00fa (Kiowa)\", \"\\ud801\\udccf\\ud801\\udcb0\\ud801\\udcd3\\ud801\\udcb0\\ud801\\udcd3\\ud801\\udcb7  \\ud801\\udcbc\\ud801\\udcc2\\ud801\\udcca\\ud801\\udcbb  \\ud801\\udcc6\\ud801\\udcbb\\ud801\\udcbf\\ud801\\udcb7  \\ud801\\udcc0\\ud801\\udcb0^\\ud801\\udcd3\\ud801\\udcb0^(Osage)\", \"O-ga-xpa Ma-zho\\u207f (O-ga-xpa) (Quapaw)\", \"Wichita\", \"N\\u0289m\\u0289n\\u0289\\u0289 Sookobit\\u0289 (Comanche)\", \"Kiowa-Comanche-Apache (Oklahoma)\", \"Kiikaapoi (Kickapoo)\"]", "shadow_history": "The Quanah Artillery Range (15,850 acres), operational since 1957 along the Wichita Mountains NWR's southern boundary and named for Quanah Parker, used weapons including Honest John missiles; a 3,800-acre buffer strip separating the refuge from Fort Sill remains closed to the public; a 1950s Army effort to annex 10,500 acres of the southern refuge as a missile range was resolved as a joint-use arrangement with title retained by the Department of the Interior; whether the artillery buffer zone borders the Charon's Garden sub-unit specifically has not been confirmed in accessible public sources.", "conservation_status": "Federal Wilderness Area (within Wichita Mountains National Wildlife Refuge).", "photo_count": 4}}, {"type": "Feature", "geometry": {"type": "Point", "coordinates": [-98.673, 34.769]}, "properties": {"slug": "wichita-mountains-national-wildlife-refuge", "name": "Wichita Mountains National Wildlife Refuge", "state": "OK", "acreage": "59,020 acres", "ecology": "Mixed-grass and shortgrass prairie; cross timbers; American bison herd (reintroduced 1907, ~650 animals); longhorn cattle; Rocky Mountain elk; prairie dogs.", "geology": "~525 million years ago (bedrock); mountains re-exhumed ~300 Mya.", "hydrology": "Parallel streams draining east; Lake Elmer Thomas; Quanah Parker Lake; Comanche County watershed.", "native_lands": "Comanche (N\u0289m\u0289n\u0289\u0289) \u00b7 Kiowa \u00b7 Wichita (Kitikiti'sh) \u00b7 Apache \u00b7 Fort Sill Apache; Quanah Parker (Comanche) called the Wichitas home; mountains set aside from Kiowa-Comanche-Apache Reservation lands in 1901.", "native_lands_api": "[\"G\\u00e1uig\\u00fa (Kiowa)\", \"\\ud801\\udccf\\ud801\\udcb0\\ud801\\udcd3\\ud801\\udcb0\\ud801\\udcd3\\ud801\\udcb7  \\ud801\\udcbc\\ud801\\udcc2\\ud801\\udcca\\ud801\\udcbb  \\ud801\\udcc6\\ud801\\udcbb\\ud801\\udcbf\\ud801\\udcb7  \\ud801\\udcc0\\ud801\\udcb0^\\ud801\\udcd3\\ud801\\udcb0^(Osage)\", \"O-ga-xpa Ma-zho\\u207f (O-ga-xpa) (Quapaw)\", \"Wichita\", \"N\\u0289m\\u0289n\\u0289\\u0289 Sookobit\\u0289 (Comanche)\", \"Kiowa-Comanche-Apache (Oklahoma)\", \"Kiikaapoi (Kickapoo)\"]", "shadow_history": "Three CCC camps and multiple WPA projects operated at the refuge through the 1930s; by March 1938, CCC labor had constructed 46 concrete dams, 14 rubble masonry dams, 50 miles of improved roads, 46 miles of big-game fencing, and a hydroelectric system; the WPA built the Holy City of the Wichitas between 1935 and 1936 at a cost of $147,000; Roosevelt's April 1905 wolf hunt in the adjacent Big Pasture, which included Quanah Parker as a participant, is documented as a direct political catalyst for the congressional appropriation that created the preserve; the Quanah Artillery Range (15,850 acres) has been operational along the refuge's southern boundary since 1957, with a 3,800-acre strip between the refuge and Fort Sill closed to the public.", "conservation_status": "National Wildlife Refuge; Federal Wilderness Area (Wichita Mountains Wilderness, Charon's Garden Unit and North Mountain Unit).", "photo_count": 18}}, {"type": "Feature", "geometry": {"type": "Point", "coordinates": [-83.831, 39.796]}, "properties": {"slug": "john-bryan-state-park", "name": "John Bryan State Park", "state": "OH", "acreage": "752 acres (park); 268 acres (Clifton Gorge SNP)", "ecology": "Gorge microclimate supporting relict northern plant communities; Canadian yew, white cedar, walking fern ; species absent from surrounding landscape; National Natural Landmark.", "geology": "~430-420 million years ago (bedrock); gorge carved ~12,000-14,000 years ago.", "hydrology": "Little Miami River (Ohio State Scenic River; National Wild & Scenic River); Yellow Spring iron-rich seep; Jacoby Creek tributary.", "native_lands": "Shawnee (Shawanwaki) \u00b7 Miami \u00b7 Adena and Hopewell cultures (500 BCE-500 CE); Little Miami River corridor a major Shawnee territory; Shawnee ceded Ohio lands via Treaty of Greene Ville 1795.", "native_lands_api": "[\"\\ud801\\udccf\\ud801\\udcb0\\ud801\\udcd3\\ud801\\udcb0\\ud801\\udcd3\\ud801\\udcb7  \\ud801\\udcbc\\ud801\\udcc2\\ud801\\udcca\\ud801\\udcbb  \\ud801\\udcc6\\ud801\\udcbb\\ud801\\udcbf\\ud801\\udcb7  \\ud801\\udcc0\\ud801\\udcb0^\\ud801\\udcd3\\ud801\\udcb0^(Osage)\", \"Shawandasse Tula (Shawanwaki/Shawnee)\", \"Kaskaskia\", \"Myaamia\"]", "shadow_history": "The Little Miami River corridor through Clifton Gorge supported at least six mills within one mile by the early 19th century, including a woolen mill, sawmill, paper mill, barrel mill, and two grist mills, all operating before workplace safety or child labor laws; most were abandoned by the late 19th century as water power became uneconomical; no records of worker injuries or labor litigation from the Clifton mill district appear in accessible archives, though the pre-regulatory context makes the absence of documentation unsurprising.", "conservation_status": "Ohio State Park; National Wild and Scenic River (Little Miami River); Ohio State Scenic River (Little Miami River).", "photo_count": 7}}, {"type": "Feature", "geometry": {"type": "Point", "coordinates": [-82.5408, 39.4354]}, "properties": {"slug": "hocking-hills", "name": "Hocking Hills State Park", "state": "OH", "acreage": "2,356 acres (park); adjacent 9,267-acre Hocking State Forest", "ecology": "Hemlock-dominated gorge; Canadian hemlock at southern range limit; rock shelter communities; old-growth hemlock remnants; high biodiversity microclimate.", "geology": "~330 million years ago (sandstone); caves and gorges carved ~14,000-18,000 years ago.", "hydrology": "Old Man's Creek; Queer Creek; Cedar Fork; multiple seasonal waterfalls; cave seeps maintaining year-round moisture; Cedar Falls (50 ft wide).", "native_lands": "Shawnee (Shawanwaki) \u00b7 Delaware (Lenape) \u00b7 Wyandot (Wendat) \u00b7 Adena (700 BCE-100 CE) \u00b7 Hopewell (100 BCE-500 CE); 'Hockhocking' a Shawnee/Delaware place name; all tribes removed from Ohio by 1843.", "native_lands_api": "[\"\\ud801\\udccf\\ud801\\udcb0\\ud801\\udcd3\\ud801\\udcb0\\ud801\\udcd3\\ud801\\udcb7  \\ud801\\udcbc\\ud801\\udcc2\\ud801\\udcca\\ud801\\udcbb  \\ud801\\udcc6\\ud801\\udcbb\\ud801\\udcbf\\ud801\\udcb7  \\ud801\\udcc0\\ud801\\udcb0^\\ud801\\udcd3\\ud801\\udcb0^(Osage)\", \"Shawandasse Tula (Shawanwaki/Shawnee)\", \"Kaskaskia\", \"Ofo\"]", "shadow_history": "Two racially segregated CCC companies built the park's infrastructure in the 1930s: Company 505 (white enrollees) was based at Camp Hocking near Conkle's Hollow, while Company 526 (Black enrollees) was based at Camp Logan from approximately 1934 to 1937, improving over 2,000 acres including Cantwell Cliffs, Rock House, and Rockbridge; by July 1935 all CCC camps nationally were formally segregated under an order from CCC director Robert Fechner; acid mine drainage from abandoned coal operations in the broader Hocking watershed is well-documented, with Monday Creek and its tributaries largely devoid of fish due to sulfuric acid and settled iron and aluminum particles.", "conservation_status": "Ohio State Park; Ohio State Nature Preserve (Conkle's Hollow State Nature Preserve, within park complex).", "photo_count": 14}}, {"type": "Feature", "geometry": {"type": "Point", "coordinates": [-83.54, 38.82]}, "properties": {"slug": "arc-of-appalachia", "name": "Arc of Appalachia", "state": "OH", "acreage": "7,000+ acres across preserve system", "ecology": "One of the most biodiverse landscapes in Ohio; 114 rare or endangered species; dry limestone prairie (Lynx Prairie); eastern red cedar savanna; unglaciated forest; relict Appalachian flora.", "geology": "~485-420 million years ago (bedrock).", "hydrology": "Brush Creek watershed; Rocky Fork Creek; numerous limestone seeps and springs; Serpent Mound crypto-explosion structure (nearby).", "native_lands": "Shawnee (Shawanwaki) \u00b7 Adena and Hopewell mound-building cultures; unglaciated Adams County at southern edge of Shawnee territory; proximity to Serpent Mound (Adena/Fort Ancient, ~300 BCE-1200 CE).", "native_lands_api": "[\"\\ud801\\udccf\\ud801\\udcb0\\ud801\\udcd3\\ud801\\udcb0\\ud801\\udcd3\\ud801\\udcb7  \\ud801\\udcbc\\ud801\\udcc2\\ud801\\udcca\\ud801\\udcbb  \\ud801\\udcc6\\ud801\\udcbb\\ud801\\udcbf\\ud801\\udcb7  \\ud801\\udcc0\\ud801\\udcb0^\\ud801\\udcd3\\ud801\\udcb0^(Osage)\", \"Shawandasse Tula (Shawanwaki/Shawnee)\", \"Kaskaskia\", \"Myaamia\"]", "shadow_history": "Frederic Ward Putnam of the Harvard Peabody Museum excavated Serpent Mound from 1887 to 1889, placing trenches in the effigy and excavating two nearby conical mounds; the excavations yielded pipes, points, earspools, gorgets, and multiple human burials with associated grave goods; Putnam raised funds to have Harvard purchase the site in 1887 -- making it the first privately funded archaeological preserve in the United States -- and the Peabody held the site until 1900; whether Serpent Mound skeletal material and grave goods remain in the Peabody collections or have been subject to NAGPRA repatriation has not been confirmed in publicly available records.", "conservation_status": "Private nature preserve system; National Natural Landmark (Lynx Prairie, Buzzardroost Rock, Red Rock, and Wilderness units).", "photo_count": 5}}, {"type": "Feature", "geometry": {"type": "Point", "coordinates": [-84.587, 39.168]}, "properties": {"slug": "mount-airy-forest", "name": "Mount Airy Forest", "state": "OH", "acreage": "1,459 acres", "ecology": "Reforested mixed hardwood and evergreen; 700 acres hardwoods, 200 acres evergreens, 269 acres native woodland; 120-acre arboretum with 1,600+ species; CCC plantings 1935-42; National Register of Historic Places 2010.", "geology": "~450 million years ago (Ordovician bedrock); surface soils entirely reworked by 19th-century agricultural erosion and 20th-century reforestation.", "hydrology": "West Fork Mill Creek headwaters; steep ravine drainage; historically severe sheet erosion prior to reforestation; upland watershed now stabilized by forest canopy.", "native_lands": "Shawnee (Shawanwaki) \u00b7 Fort Ancient culture (900-1650 CE); upland forest ridge a known hunting and travel corridor; Shawnee ceded Hamilton County lands via Treaty of Greene Ville 1795.", "native_lands_api": "[\"\\ud801\\udccf\\ud801\\udcb0\\ud801\\udcd3\\ud801\\udcb0\\ud801\\udcd3\\ud801\\udcb7  \\ud801\\udcbc\\ud801\\udcc2\\ud801\\udcca\\ud801\\udcbb  \\ud801\\udcc6\\ud801\\udcbb\\ud801\\udcbf\\ud801\\udcb7  \\ud801\\udcc0\\ud801\\udcb0^\\ud801\\udcd3\\ud801\\udcb0^(Osage)\", \"Shawandasse Tula (Shawanwaki/Shawnee)\", \"Kaskaskia\", \"Myaamia\"]", "shadow_history": "CCC Company 1505-C, an all-Black unit, arrived at Mount Airy in May 1935 and logged 51,414 man-hours building forest infrastructure; its encampment was constructed by the enrollees themselves on land Cincinnati Parks describes as unsuccessful farmland; Cincinnati maintained formal racial segregation of public recreational facilities through the 1950s, with the Sunlite Pool at Coney Island not desegregated until 1961 following NAACP litigation; whether Mount Airy Forest operated under a formal segregation policy for visitors during this period has not been confirmed in accessible public records.", "conservation_status": "Municipal forest (City of Cincinnati); National Register of Historic Places.", "photo_count": 3}}, {"type": "Feature", "geometry": {"type": "Point", "coordinates": [-83.8328, 39.7993]}, "properties": {"slug": "clifton-gorge-state-nature-preserve", "name": "Clifton Gorge State Nature Preserve", "state": "OH", "acreage": "268 acres", "ecology": "Gorge microclimate; relict northern flora including red baneberry, walking fern, Canadian yew; old-growth forest remnants; cool moist conditions maintain species absent from surrounding landscape.", "geology": "~445-430 million years ago (bedrock); gorge carved ~15,000 years ago.", "hydrology": "Little Miami River (Ohio\u2019s first State Scenic River, 1968; National Wild & Scenic River); cascading falls and rapids through dolomite narrows; Steamboat Rock slump block; slump cave.", "native_lands": "Shawnee (Shawanwaki) \u00b7 Miami \u00b7 Adena and Hopewell cultures; Little Miami River a principal Shawnee waterway and travel corridor; Shawnee ceded Ohio lands via Treaty of Greene Ville 1795.", "native_lands_api": "[\"\\ud801\\udccf\\ud801\\udcb0\\ud801\\udcd3\\ud801\\udcb0\\ud801\\udcd3\\ud801\\udcb7  \\ud801\\udcbc\\ud801\\udcc2\\ud801\\udcca\\ud801\\udcbb  \\ud801\\udcc6\\ud801\\udcbb\\ud801\\udcbf\\ud801\\udcb7  \\ud801\\udcc0\\ud801\\udcb0^\\ud801\\udcd3\\ud801\\udcb0^(Osage)\", \"Shawandasse Tula (Shawanwaki/Shawnee)\", \"Kaskaskia\", \"Myaamia\"]", "shadow_history": "The gorge corridor supported six operating mills within one mile by the early 19th century, all functioning before child labor and workplace safety laws; Hugh Taylor Birch, who donated 160 acres to the state in 1937 and also donated the initial parcel of Glen Helen to Antioch College in 1929, was an attorney and real estate speculator who assembled multiple large tracts in the Little Miami corridor; no records of displaced tenants in either acquisition appear in accessible archives.", "conservation_status": "Ohio State Nature Preserve; National Natural Landmark; National Wild and Scenic River (Little Miami River); Ohio State Scenic River (Little Miami River).", "photo_count": 5}}, {"type": "Feature", "geometry": {"type": "Point", "coordinates": [-84.5348, 39.1709]}, "properties": {"slug": "parker-woods", "name": "Parker Woods", "state": "OH", "acreage": "~63 acres", "ecology": "Mature mixed mesophytic forest dominated by sugar maple, white oak, and American beech; spring ephemeral wildflowers; active removal of invasive bush honeysuckle and Tree-of-Heaven underway.", "geology": "~450 Mya Ordovician shale and limestone (Kope Formation).", "hydrology": "Mill Creek watershed; drains to West Fork Mill Creek, a tributary flowing through Northside Cincinnati to Mill Creek and the Ohio River; steep ravine topography characteristic of Kope Formation hillsides.", "native_lands": "Shawnee (Shawanwaki) \u00b7 Myaamia (Miami) \u00b7 Adena and Hopewell moundbuilder cultures; Cincinnati area a major nexus of Shawnee and Miami territory; Fort Washington established 1789 as U.S. military base on Shawnee lands; Shawnee and Miami among signatories ceding southern Ohio via Treaty of Greenville 1795 following Battle of Fallen Timbers 1794.", "native_lands_api": "[\"\\ud801\\udccf\\ud801\\udcb0\\ud801\\udcd3\\ud801\\udcb0\\ud801\\udcd3\\ud801\\udcb7  \\ud801\\udcbc\\ud801\\udcc2\\ud801\\udcca\\ud801\\udcbb  \\ud801\\udcc6\\ud801\\udcbb\\ud801\\udcbf\\ud801\\udcb7  \\ud801\\udcc0\\ud801\\udcb0^\\ud801\\udcd3\\ud801\\udcb0^(Osage)\", \"Shawandasse Tula (Shawanwaki/Shawnee)\", \"Kaskaskia\", \"Myaamia\"]", "shadow_history": "The park sits adjacent to the Mill Creek watershed, which a 1996 assessment found to contain three Superfund sites on its banks, 31 other hazardous waste sites, and 158 combined sewer overflow outflows; EPA conducted a buried-drum hazardous waste removal on the West Fork Mill Creek in South Cumminsville in 2004; no contamination record specific to the Parker Woods parcel has been located, though the Mill Creek corridor has been among the most industrially contaminated urban streams in the Midwest.", "conservation_status": "Cincinnati Parks nature preserve (City of Cincinnati).", "photo_count": 6}}, {"type": "Feature", "geometry": {"type": "Point", "coordinates": [-83.891, 39.803]}, "properties": {"slug": "glen-helen-nature-preserve", "name": "Glen Helen Nature Preserve", "state": "OH", "acreage": "1,147 acres", "ecology": "Mixed mesophytic gorge forest; 400-year-old trees; regionally significant old-growth stands; beaver wetland; Raptor Center (Ohio\u2019s first raptor rehabilitation facility); 20+ miles of trail connecting to John Bryan State Park and Clifton Gorge.", "geology": "~445-430 million years ago (bedrock); gorge and ravine system formed by glacial meltwater ~15,000 years ago.", "hydrology": "Little Miami River (2.5 miles; National Wild & Scenic River); Yellow Spring Creek; Birch Creek; iron-rich Yellow Spring seep; beaver impoundment; Cascades waterfall.", "native_lands": "Shawnee (Shawanwaki) \u00b7 Miami \u00b7 Adena culture; Orators Mound (Adena burial mound) within preserve boundaries; Yellow Spring a known Shawnee waypoint; Little Miami River a principal Shawnee waterway.", "native_lands_api": "[\"\\ud801\\udccf\\ud801\\udcb0\\ud801\\udcd3\\ud801\\udcb0\\ud801\\udcd3\\ud801\\udcb7  \\ud801\\udcbc\\ud801\\udcc2\\ud801\\udcca\\ud801\\udcbb  \\ud801\\udcc6\\ud801\\udcbb\\ud801\\udcbf\\ud801\\udcb7  \\ud801\\udcc0\\ud801\\udcb0^\\ud801\\udcd3\\ud801\\udcb0^(Osage)\", \"Shawandasse Tula (Shawanwaki/Shawnee)\", \"Kaskaskia\", \"Myaamia\"]", "shadow_history": "Frank Van Wort partially excavated the Orators Mound within the preserve in 1953 to 1954, finding five skeletons (two adults, three infants) and placing seven skeletons along with artifacts in the Dayton Museum of Natural History; Van Wort published no reports; the current location or repatriation status of this material is not confirmed in available sources; a 1971 Antioch College excavation under archaeologist Wolfgang Marschall identified the mound as Hopewellian; the Neff family's 246-room hotel at the Yellow Spring, built in 1869 at a cost of approximately $250,000 and targeting Southern vacationers, failed financially within 13 years.", "conservation_status": "Private nature preserve (Antioch College); National Natural Landmark; National Wild and Scenic River (Little Miami River); Ohio State Scenic River (Little Miami River).", "photo_count": 8}}, {"type": "Feature", "geometry": {"type": "Point", "coordinates": [-84.428, 39.102]}, "properties": {"slug": "otto-armleder-memorial-park", "name": "Otto Armleder Memorial Park", "state": "OH", "acreage": "347 acres", "ecology": "Floodplain wetland; bottomland hardwood forest; willow, cottonwood, silver maple, boxelder; critical migratory bird stopover on the Ohio flyway; 76+ documented bird species.", "geology": "~450 million years ago (Ordovician bedrock); floodplain deposits Holocene.", "hydrology": "Little Miami River floodplain; subject to periodic inundation; adjacent to Lunken Airfield oxbow; Mill Creek watershed confluence nearby.", "native_lands": "Shawnee (Shawanwaki) \u00b7 Fort Ancient culture (900-1650 CE); Little Miami River a principal Shawnee corridor; Shawnee ceded Ohio lands via Treaty of Greene Ville 1795.", "native_lands_api": "[\"\\ud801\\udccf\\ud801\\udcb0\\ud801\\udcd3\\ud801\\udcb0\\ud801\\udcd3\\ud801\\udcb7  \\ud801\\udcbc\\ud801\\udcc2\\ud801\\udcca\\ud801\\udcbb  \\ud801\\udcc6\\ud801\\udcbb\\ud801\\udcbf\\ud801\\udcb7  \\ud801\\udcc0\\ud801\\udcb0^\\ud801\\udcd3\\ud801\\udcb0^(Osage)\", \"Shawandasse Tula (Shawanwaki/Shawnee)\", \"Kaskaskia\", \"Myaamia\"]", "shadow_history": "Ohio EPA and USGS assessments of the Little Miami basin have documented elevated trace elements and synthetic organic compounds including organochlorine insecticides and PCBs in streambed sediments downstream of Cincinnati's industrial corridor; no Superfund listing specific to the Armleder floodplain section appears in EPA records; the park's floodplain location, which prevented prior development and made acquisition relatively inexpensive, reflects the same industrial contamination history that kept the land undeveloped.", "conservation_status": "Municipal park (City of Cincinnati / Great Parks of Hamilton County).", "photo_count": 4}}, {"type": "Feature", "geometry": {"type": "Point", "coordinates": [-84.62, 39.11]}, "properties": {"slug": "bender-mountain-nature-preserve", "name": "Bender Mountain Nature Preserve", "state": "OH", "acreage": "130+ acres", "ecology": "Mixed mesophytic forest; steep south-facing Ohio River bluff; 390+ vascular plant species; described as best site in Hamilton County for native wildflowers; invasive honeysuckle removal ongoing since 2003.", "geology": "~450 million years ago (Ordovician bedrock); ridge morphology shaped by Illinoian glaciation ~400,000 years ago.", "hydrology": "Rapid Run Creek drainage to the north; Ohio River corridor to the south; steep slope hydrology with seasonal seeps.", "native_lands": "Shawnee (Shawanwaki) \u00b7 earlier Adena and Hopewell peoples; Ohio River ridge a known travel and hunting corridor; Shawnee ceded Hamilton County lands via Treaty of Greene Ville 1795.", "native_lands_api": "[\"\\ud801\\udccf\\ud801\\udcb0\\ud801\\udcd3\\ud801\\udcb0\\ud801\\udcd3\\ud801\\udcb7  \\ud801\\udcbc\\ud801\\udcc2\\ud801\\udcca\\ud801\\udcbb  \\ud801\\udcc6\\ud801\\udcbb\\ud801\\udcbf\\ud801\\udcb7  \\ud801\\udcc0\\ud801\\udcb0^\\ud801\\udcd3\\ud801\\udcb0^(Osage)\", \"Shawandasse Tula (Shawanwaki/Shawnee)\", \"Kaskaskia\", \"Myaamia\"]", "shadow_history": "Prior land use included grazing, hog foraging, fruit growing, and selective logging; no quarrying, industrial use, or documented forced removal has been identified for this Ohio River bluff site in accessible records; the Western Wildlife Corridor began managing the site in 2003 and describes it as degraded agricultural and silvicultural land undergoing active restoration.", "conservation_status": "Private nature preserve (Western Wildlife Corridor / Delhi Township).", "photo_count": 6}}]};
