<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root { --sand: #e8e8e8; --ink: #161616; --moss: #444444; --stone: #8c8c8c; --panel-w: 440px; }
html, body { height: 100%; font-family: 'Inter', sans-serif; background: var(--ink); }
#map { position: fixed; inset: 0; }
#wordmark { position: fixed; top: 28px; left: 32px; z-index: 10; pointer-events: none; }
#wordmark h1 { font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 300; letter-spacing: 0.2em; text-transform: uppercase; color: var(--sand); opacity: 0.85; line-height: 1; }
#topnav { position: fixed; top: 28px; right: 32px; z-index: 10; display: flex; gap: 18px; align-items: baseline; }
#topnav a { color: rgba(255,255,255,0.55); font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; font-weight: 300; text-decoration: none; transition: color 0.15s; }
#topnav a:hover { color: var(--sand); }
#site-count { color: rgba(255,255,255,0.3); font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; font-weight: 300; }
#layers { position: fixed; bottom: 32px; left: 32px; z-index: 10; display: flex; flex-direction: column; gap: 6px; }
.layer-btn { background: rgba(18,18,18,0.72); border: 1px solid rgba(255,255,255,0.2); color: var(--sand); font-family: 'Inter', sans-serif; font-size: 12px; font-weight: 300; letter-spacing: 0.1em; text-transform: uppercase; padding: 6px 12px; cursor: pointer; backdrop-filter: blur(8px); transition: border-color 0.2s; text-align: left; }
.layer-btn:hover { border-color: rgba(255,255,255,0.5); }
.layer-btn.active { color: #ffffff; border-color: #ffffff; background: rgba(18,18,18,0.9); }
#legend { position: fixed; bottom: 32px; right: 32px; z-index: 10; background: rgba(18,18,18,0.85); backdrop-filter: blur(8px); border: 1px solid rgba(255,255,255,0.15); padding: 14px 16px; min-width: 200px; display: none; }
#legend.visible { display: block; }
#legend-title { font-size: 10px; font-weight: 500; letter-spacing: 0.14em; text-transform: uppercase; color: rgba(255,255,255,0.45); margin-bottom: 10px; }
.legend-item { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; font-size: 11px; font-weight: 300; color: rgba(255,255,255,0.75); }
.legend-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
#panel { position: fixed; top: 0; right: 0; width: var(--panel-w); height: 100%; background: var(--sand); z-index: 20; transform: translateX(100%); transition: transform 0.4s cubic-bezier(0.16,1,0.3,1); overflow-y: auto; overflow-x: hidden; }
#panel.open { transform: translateX(0); }
#panel-close { position: sticky; top: 0; z-index: 5; display: flex; justify-content: flex-end; padding: 16px 20px 0; background: var(--sand); }
#panel-close button { background: none; border: none; cursor: pointer; color: var(--stone); font-size: 20px; line-height: 1; padding: 4px; }
#panel-close button:hover { color: var(--ink); }
#panel-body { padding: 8px 32px 48px; }
.panel-site-name { font-family: 'Inter', sans-serif; font-size: 22px; font-weight: 300; letter-spacing: -0.01em; color: var(--ink); line-height: 1.2; margin-bottom: 4px; }
.panel-site-name a { color: inherit; text-decoration: none; border-bottom: 1px solid rgba(18,18,18,0.25); }
.panel-site-name a:hover { border-bottom-color: var(--ink); }
.panel-page-link { font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; margin: 14px 0 0; text-align: right; }
.panel-page-link a { color: var(--moss); text-decoration: none; border-bottom: 1px solid var(--moss); }
.panel-state { font-size: 11px; font-weight: 400; letter-spacing: 0.12em; text-transform: uppercase; color: var(--stone); margin-bottom: 20px; }
.photo-grid { display: grid; grid-template-columns: 1fr 1fr; grid-auto-rows: 180px; gap: 3px; margin-bottom: 6px; }
.photo-thumb { background: #c8c8c8; cursor: pointer; overflow: hidden; }
.photo-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; opacity: 0; transition: opacity 0.25s; }
.photo-thumb img.loaded { opacity: 1; }
.photo-thumb:hover img { opacity: 0.75; }
.photo-grid-more { font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--stone); margin-bottom: 20px; text-align: right; }
.photo-grid-more a { color: var(--moss); text-decoration: none; border-bottom: 1px solid var(--moss); }
.panel-section { margin-bottom: 20px; border-top: 1px solid rgba(18,18,18,0.12); padding-top: 16px; }
.panel-section-label { font-size: 10px; font-weight: 500; letter-spacing: 0.16em; text-transform: uppercase; color: var(--stone); margin-bottom: 8px; }
.panel-section p { font-size: 13.5px; font-weight: 300; line-height: 1.7; color: #2a2a2a; }
.geo-block { margin-bottom: 20px; border-top: 1px solid rgba(18,18,18,0.12); padding-top: 16px; }
.geo-label { font-size: 10px; font-weight: 500; letter-spacing: 0.16em; text-transform: uppercase; color: var(--stone); margin-bottom: 10px; }
.geo-era-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
.geo-swatch { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
.geo-era-name { font-size: 14px; font-weight: 300; color: var(--ink); }
.geo-mya { font-size: 11px; font-weight: 300; color: var(--stone); margin-left: auto; letter-spacing: 0.04em; }
.geo-bar-wrap { position: relative; height: 3px; background: rgba(18,18,18,0.08); margin-bottom: 8px; border-radius: 2px; }
.geo-bar-fill { position: absolute; right: 0; top: 0; height: 100%; border-radius: 2px; }
.geo-prose { font-size: 12px; font-weight: 300; line-height: 1.6; color: var(--stone); }
#lightbox { position: fixed; inset: 0; z-index: 100; background: rgba(12,12,12,0.97); display: none; flex-direction: column; }
#lightbox.open { display: flex; }
#lb-img-wrap { flex: 1; display: flex; align-items: center; justify-content: center; min-height: 0; padding: 56px 72px 0; position: relative; }
#lb-img { max-width: 100%; max-height: 100%; object-fit: contain; display: block; opacity: 0; transition: opacity 0.2s; }
#lb-img.loaded { opacity: 1; }
#lb-spinner { position: absolute; color: rgba(255,255,255,0.3); font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; }
#lb-bar { display: flex; align-items: center; justify-content: space-between; padding: 14px 72px 20px; gap: 24px; flex-shrink: 0; border-top: 1px solid rgba(255,255,255,0.07); }
#lb-meta { flex: 1; min-width: 0; }
#lb-filename { font-size: 12px; font-weight: 300; color: rgba(255,255,255,0.55); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 3px; }
#lb-date { font-size: 11px; font-weight: 300; letter-spacing: 0.1em; text-transform: uppercase; color: rgba(255,255,255,0.3); }
#lb-actions { display: flex; gap: 8px; flex-shrink: 0; }
.lb-action { font-size: 11px; font-weight: 300; letter-spacing: 0.1em; text-transform: uppercase; text-decoration: none; padding: 5px 12px; border: 1px solid rgba(255,255,255,0.3); color: rgba(255,255,255,0.65); transition: border-color 0.15s, color 0.15s; white-space: nowrap; }
.lb-action:hover { border-color: rgba(255,255,255,0.75); color: var(--sand); }
#lb-close { position: fixed; top: 18px; right: 24px; z-index: 101; background: none; border: none; cursor: pointer; color: rgba(255,255,255,0.4); font-size: 22px; line-height: 1; transition: color 0.15s; }
#lb-close:hover { color: var(--sand); }
#lb-prev, #lb-next { position: fixed; top: 50%; transform: translateY(-50%); z-index: 101; background: none; border: none; cursor: pointer; color: rgba(255,255,255,0.3); font-size: 36px; padding: 16px; transition: color 0.15s; line-height: 1; }
#lb-prev { left: 8px; } #lb-next { right: 8px; }
#lb-prev:hover, #lb-next:hover { color: var(--sand); }
#lb-counter { position: fixed; top: 22px; left: 50%; transform: translateX(-50%); font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; color: rgba(255,255,255,0.25); }
.maplibregl-popup-content { background: var(--ink); color: var(--sand); font-family: 'Inter', sans-serif; font-size: 12px; font-weight: 300; padding: 8px 12px; border-radius: 0; box-shadow: none; }
.maplibregl-popup-tip { border-top-color: var(--ink) !important; }
.maplibregl-ctrl-attrib { font-size: 9px; opacity: 0.4; }
@media (max-width: 640px) {
  :root { --panel-w: 100%; }
  #wordmark { top: 16px; left: 16px; }
  #wordmark h1 { font-size: 11px; }
  #topnav { top: 16px; right: 16px; gap: 12px; }
  #topnav a, #site-count { font-size: 10px; }
  #layers { bottom: 16px; left: 16px; right: 16px; }
  .layer-btn { font-size: 11px; padding: 7px 10px; }
  #legend { left: 16px; right: 16px; bottom: 84px; min-width: 0; }
  #panel { width: 100%; }
  #panel-body { padding: 8px 20px 48px; }
  .panel-site-name { font-size: 19px; }
  .photo-grid { grid-template-columns: 1fr 1fr; grid-auto-rows: 130px; }
  .panel-section p, .geo-prose { word-break: break-word; overflow-wrap: break-word; }
  #lb-img-wrap { padding: 56px 16px 0; }
  #lb-bar { padding: 14px 16px 20px; flex-direction: column; align-items: flex-start; gap: 10px; }
  #lb-actions { flex-wrap: wrap; }
  #lb-prev, #lb-next { font-size: 28px; padding: 10px; }
  #lb-prev { left: 0; } #lb-next { right: 0; }
}
</style>

<script>
const SITES={"type":"FeatureCollection","features":[{"type":"Feature","geometry":{"type":"Point","coordinates":[-107.5081,44.7878]},"properties":{"slug":"bighorn-national-forest","name":"Bighorn National Forest","state":"WY","acreage":"1,115,171","geology":"~2.84 billion years (Archean) granite-gneiss core (Bighorn Batholith); ~485-444 Mya Ordovician Bighorn Dolomite","epoch":"Archean (basement) / Late Ordovician (Bighorn Dolomite)","hydrology":"Headwaters of the Tongue River, fed by snowpack and spring groundwater, draining north into the Yellowstone River system; the forest also forms the divide between the Bighorn River drainage to the west and the Powder River drainage to the east, with the Tongue, Bighorn, and Powder Rivers all ultimately tributary to the Yellowstone River.","native_lands":"Crow (Apsaalooke); Eastern Shoshone; Cheyenne (Tsitsistas); Arapaho (Hinono'eino); Lakota/Sioux; the Bighorn Mountains and Powder River Basin were contested hunting grounds, with Cheyenne ranging through Clear Creek Valley and the Powder/Bighorn/Tongue River country, Arapaho moving through the Bighorns alongside the Black Hills and Medicine Bow Range, and Lakota expanding west into Crow, Cheyenne, Arapaho, and Shoshone territory by the 1850s, dominating the Powder River Basin by mid-century; Treaty of Fort Laramie 1851 (Horse Creek Treaty) recognized roughly 38 million acres of Crow (Apsaalooke) territory including the Bighorns; Second Treaty of Fort Laramie 1868 reduced Crow recognized territory to about 8 million acres and established the Crow Indian Reservation in eastern Montana, while Crow leaders retained off-reservation hunting rights on ceded lands (affirmed in Herrera v. Wyoming, 2019); Eastern Shoshone settled on the Wind River Reservation per treaties of 1863 and 1868, later sharing it with the Northern Arapaho (1878); Medicine Wheel/Medicine Mountain, within the forest, remains a sacred ceremonial site for at least 16 tribal nations","displacement_tenure":"Treaty of Fort Laramie 1851 (Horse Creek Treaty) recognized approximately 38 million acres of Crow (Apsaalooke) territory encompassing the Bighorn Mountains; Second Treaty of Fort Laramie 1868 reduced Crow lands to roughly 8 million acres and established the Crow Indian Reservation south of the Yellowstone River in present-day Montana, removing the Bighorns from recognized tribal territory while Crow leaders retained hunting rights on ceded land; Eastern Shoshone ceded claims via treaties of 1863 and 1868 establishing the Wind River Reservation; Bighorn National Forest established February 22, 1897 from these ceded lands","shadow_history":"Medicine Wheel/Medicine Mountain National Historic Landmark, sacred to many Plains nations, became the focus of access disputes beginning in 1988 when the Forest Service proposed tourism-oriented changes; over two decades of negotiation among federal and state agencies and traditional elders representing 16 tribes produced a Historic Preservation Plan in September 1996 establishing a 23,000-acre area of consultation and restricting vehicle access to 1.5 miles on foot, with renewed disputes over road access in recent years","ecology":"Lodgepole pine, subalpine fir, and Engelmann spruce dominate higher elevations, transitioning to ponderosa pine, Douglas fir, and aspen at lower elevations; alpine tundra, meadows, and lakes occur above treeline; wildlife includes elk, mule deer, moose, pronghorn, mountain lion, and a remnant population of bighorn sheep, the forest's namesake, though numbers have declined sharply due to disease transmission from domestic sheep grazing.","conservation_status":"National Forest (established February 22, 1897, one of the first national forests); Cloud Peak Wilderness (designated 1984, ~189,000 acres); Medicine Wheel/Medicine Mountain National Historic Landmark","endangered_species":"Canada lynx (Lynx canadensis, federally Threatened)","gps":"44.7878° N, 107.5081° W","primary_nation":"Crow (Apsaalooke)","agency_type":"USFS"}},{"type":"Feature","geometry":{"type":"Point","coordinates":[-103.4595,43.8791]},"properties":{"slug":"mount-rushmore-national-memorial","name":"Mount Rushmore National Memorial","state":"SD","acreage":"1,278","geology":"~1,715 Mya Paleoproterozoic Harney Peak leucogranite","epoch":"Paleoproterozoic","hydrology":"Drains via Starling Basin, Lafferty Gulch, and East Boundary basins to Rapid Creek, a tributary of the Cheyenne River in the Missouri River basin; Starling Basin is the principal surface-water contributor and supports a wetland complex.","native_lands":"Lakota (Thitunwan Oyate), specifically the Oceti Sakowin (Seven Council Fires): Oglala, Sicangu (Brule), Miniconjou, Hunkpapa, Sans Arc, Oohenunpa, and Sihasapa bands; Cheyenne (Tsitsistas); Arapaho (Hinono'eino); the Black Hills are He Sapa / Paha Sapa (heart of everything that is) in Lakota cosmology; the mountain carved as Mt. Rushmore was known as Tunkasila Sakpe Paha (Six Grandfathers) and was a sacred destination for vision quests; Treaty of Fort Laramie (1868) guaranteed the Great Sioux Reservation, including the Black Hills, for exclusive Sioux use; the U.S. coerced a defective agreement from roughly 10% of adult male Sioux (the Manypenny Agreement) and Congress unilaterally abrogated the 1868 treaty via the Act of February 28, 1877 (19 Stat. 254); in United States v. Sioux Nation of Indians (1980) the Supreme Court ruled the taking was an unconstitutional Fifth Amendment violation; the Lakota declined over $1 billion in compensation and continue to assert land rights","displacement_tenure":"Royce Cession 597: Treaty of Fort Laramie (April 29, 1868) established the Great Sioux Reservation, guaranteeing the Black Hills to the Oceti Sakowin in perpetuity, with valid cession requiring three-fourths adult male Sioux consent; the Manypenny Commission obtained signatures from approximately 10% of adult males in 1876; Congress implemented this defective agreement via the Act of February 28, 1877 (19 Stat. 254), abrogating the 1868 treaty and seizing the Black Hills without lawful cession; the U.S. Supreme Court ruled in United States v. Sioux Nation of Indians (1980) that the taking violated the Fifth Amendment; the Lakota have declined the monetary award and preserved their land claim","shadow_history":"Gutzon Borglum, commissioned as sculptor in 1927, had documented ties to the Ku Klux Klan through his earlier Stone Mountain, Georgia commission (begun 1915); he attended Klan rallies, served on Klan committees, and agreed to incorporate a KKK altar into the Stone Mountain design at the request of United Daughters of the Confederacy president Helen Plane; he corresponded with D.C. Stephenson, the Grand Dragon later convicted of rape and murder; biographers Howard and Audrey Karl Shaff documented that his public denials of Klan membership were \"for public consumption\"; Borglum's letters express alarm at the \"mongrel horde\" threatening \"Nordic\" racial purity; the carving of Tunkasila Sakpe Paha (Six Grandfathers), a sacred Lakota vision quest site, was carried out without tribal consent on land the Supreme Court later ruled was illegally taken; Civilian Conservation Corps workers from nearby camps contributed labor to the memorial from 1935 onward, hauling debris and erecting support structures","ecology":"Ponderosa pine (Pinus ponderosa) forest dominates, including one of the largest concentrations of old-growth ponderosa pine in the Black Hills; quaking aspen in drainages, Douglas fir on north-facing slopes; wildlife includes mule deer, mountain goat, yellow-bellied marmot, turkey vulture, and woodpeckers; bat species monitored in Starling Basin wetland complex.","conservation_status":"NPS National Memorial","endangered_species":"none documented","gps":"43.8791° N, 103.4595° W","primary_nation":"Oceti Sakowin (Sioux)","agency_type":"NPS"}},{"type":"Feature","geometry":{"type":"Point","coordinates":[-103.8072,44.4197]},"properties":{"slug":"black-hills-national-forest","name":"Black Hills National Forest","state":"SD","acreage":"1,253,308","geology":"~1,715 Mya Paleoproterozoic Harney Peak granite at the core; ~2,500 Mya Precambrian schist and quartzite; encircled by Paleozoic limestone and Cretaceous shale","epoch":"Paleoproterozoic","hydrology":"The Black Hills form the headwaters divide between the Cheyenne River (southern and eastern drainages) and the Belle Fourche River (northern drainage), both Missouri River tributaries; principal streams include Spearfish Creek, Rapid Creek, French Creek, and Beaver Creek; 11 stocked reservoirs; the Madison and Minnelusa aquifers are recharged within the Black Hills and provide the primary regional water supply for western South Dakota; karst springs at limestone formation bases produce unusually stable base flow.","native_lands":"Lakota (Thitunwan Oyate), the seven bands of the Oceti Sakowin: Oglala, Sicangu (Brule), Miniconjou, Hunkpapa, Sans Arc, Oohenunpa, and Sihasapa; Cheyenne (Tsitsistas/Suhtai); Arapaho (Hinono'eino); earlier presence of Crow, Kiowa, and Arikara; the Black Hills are Paha Sapa / He Sapa (heart of everything that is) to the Lakota, central to spirituality, ceremony, and subsistence; the Treaty of Fort Laramie (1868) guaranteed the Black Hills and all of present South Dakota west of the Missouri River for exclusive Sioux occupation; gold discovered during the 1874 Custer Expedition triggered an illegal invasion; the Act of February 28, 1877 stripped the Black Hills from the Sioux without the required three-fourths adult male consent; United States v. Sioux Nation of Indians (1980) ruled this an unconstitutional taking; the Sioux declined over $1 billion in compensation and continue to demand land return","displacement_tenure":"Treaty of Fort Laramie (April 29, 1868): Black Hills included in the Great Sioux Reservation, reserved for exclusive Sioux use; Act of February 28, 1877 (19 Stat. 254): Congress unilaterally seized approximately 7.3 million acres including the Black Hills, ratified by fewer than 10% of adult male Sioux in direct violation of the 1868 treaty's three-fourths consent requirement; United States v. Sioux Nation of Indians, 448 U.S. 371 (1980): Supreme Court held the 1877 Act constituted an unconstitutional Fifth Amendment taking; $105 million award declined by the Sioux","shadow_history":"Homestake Gold Mine (Lead, SD) operated 1876-2002; by 1971 EPA documented the mine discharging 312 lbs of cyanide, 240 lbs of zinc, and 721 lbs of copper daily into Gold Run Creek; an estimated 75 million tons of tailings containing 270,000 tons of arsenic were discharged into Whitewood Creek across an 18-mile stretch; EPA listed Whitewood Creek on the National Priorities List in 1983, delisted 1996 after residential soil remediation; the Gilt Edge Mine, a former open-pit gold and cyanide heap-leach operation east of Lead, was listed on the NPL in 2000 after the operator abandoned it, leaving three open pit lakes with 150 million gallons of acidic heavy-metal water generating approximately 95 million gallons of acid rock drainage annually, with EPA spending roughly $120 million on cleanup through 2024; approximately 170 abandoned uranium mines in Custer and Fall River counties, remnants of the 1950s-1970s federal nuclear weapons program, leach radioactive material into the Cheyenne River watershed with disproportionate impact on communities near Pine Ridge Reservation; Homestake Mining Company was the dominant timber consumer in the Hills from the late 19th century onward, with 30 sawmills operating by 1900 and sustained high-volume harvest significantly altering forest structure for over a century","ecology":"Ponderosa pine (Pinus ponderosa) forest covers lower to mid elevations; white spruce at higher elevations; aspen, bur oak, and paper birch in riparian zones; mixed-grass prairie at lower margins; wildlife includes elk, mule deer, pronghorn, bighorn sheep, mountain goat, black bear, cougar, bald eagle, peregrine falcon, and approximately 200 bird species; prairie dog towns within the forest support black-footed ferret reintroduction efforts.","conservation_status":"National Forest (proclaimed 1897 as Black Hills Forest Reserve); Black Elk Wilderness (13,541 acres, designated 1980); Norbeck Wildlife Preserve (46,096 acres, designated 1920)","endangered_species":"Black-footed ferret (Mustela nigripes, federally Endangered, reintroduced adjacent populations); Canada lynx (Lynx canadensis, federally Threatened)","gps":"44.4197° N, 103.8072° W","primary_nation":"Oceti Sakowin (Sioux)","agency_type":"USFS"}},{"type":"Feature","geometry":{"type":"Point","coordinates":[-102.3397,43.8554]},"properties":{"slug":"badlands-national-park","name":"Badlands National Park","state":"SD","acreage":"242,756","geology":"~34-23 Mya Oligocene-Eocene White River Group (Chadron, Brule, Sharps Formations)","epoch":"Late Eocene to Late Oligocene","hydrology":"Lies within the White River drainage; the prairie grasslands south of the Badlands Wall are drained by tributaries of the White River, which shapes the park's badland erosion and supports migratory wildlife corridors across the Great Plains.","native_lands":"Oceti Sakowin (Great Sioux Nation, Seven Council Fires), specifically Oglala Lakota (Oglala Lakhota, \"They Scatter Their Own\"); the Stronghold Unit (South Unit) lies entirely within the Pine Ridge Indian Reservation on land owned by the Oglala Sioux Tribe and co-managed with the National Park Service under formal agreement; Stronghold Table was the site of one of the last Ghost Dance ceremonies in 1890, shortly before the Wounded Knee Massacre","displacement_tenure":"Treaty of Fort Laramie (1868) guaranteed the Great Sioux Reservation, including the Badlands region, \"forever\" to the Oceti Sakowin; following the discovery of gold in the Black Hills, Congress unilaterally seized the Black Hills in the Act of February 28, 1877 (the \"Black Hills Act\"), a taking the U.S. Supreme Court ruled unconstitutional in United States v. Sioux Nation of Indians (1980), awarding compensation the Oceti Sakowin have refused, holding out for return of the land; the Sioux Act of 1889 broke the Great Sioux Reservation into five smaller reservations including Pine Ridge; in 1942 the U.S. Army Air Force seized 341,726 acres of the Pine Ridge Reservation by eminent domain for the Badlands Aerial Gunnery Range, condemning the homes of 150 to 250 Oglala Lakota families (paying as little as $8 per acre) and forcibly relocating roughly 125 families; in 1968 Congress returned 202,357 acres to the Oglala Sioux Tribe and designated 136,882 acres as Badlands National Monument, renamed Badlands National Park in 1978","shadow_history":"The Badlands Bombing Range and Pine Ridge Gunnery Range operated from 1942 to 1968 for air-to-air and air-to-ground gunnery practice, precision and demolition bombing exercises, a postwar Army National Guard range, and a Cold War Radar Bomb Scoring site; the range displaced 150 to 250 Oglala Lakota families from their homes and ranches under eminent domain; live and unexploded ordnance (UXO) contamination remains a persistent hazard across the former range, with a 2023 federal risk assessment still listing the site as \"medium risk\" and UXO regularly reported decades after military use ended; cleanup remains incomplete","ecology":"The largest protected expanse of mixed grass prairie in the United States, supporting more than 400 plant species; home to American bison, the U.S. national mammal, and a reintroduced population of black footed ferrets, among the world's most endangered mammals, with roughly 120 individuals in the park.","conservation_status":"National Park (established as Badlands National Monument 1939, redesignated Badlands National Park 1978, NPS); includes the Badlands Wilderness Area, one of the first NPS wilderness designations (1976)","endangered_species":"Black-footed ferret (Mustela nigripes, federally Endangered, reintroduced population)","gps":"43.8554° N, 102.3397° W","primary_nation":"Oglala Lakota","agency_type":"NPS"}},{"type":"Feature","geometry":{"type":"Point","coordinates":[-96.325,44.0133]},"properties":{"slug":"pipestone-national-monument","name":"Pipestone National Monument","state":"MN","acreage":"301","geology":"~1,700 Mya Paleoproterozoic Sioux quartzite (catlinite/pipestone argillite interbeds)","epoch":"Paleoproterozoic","hydrology":"Pipestone Creek runs through the monument and drops over Winnewissa Falls along the three-quarter-mile Circle Trail; the catlinite quarry pits sit immediately along the creek within outcrops of Sioux quartzite.","native_lands":"Oceti Sakowin (Great Sioux Nation, Seven Council Fires); the quarries were treated as neutral ground where rival Plains nations peacefully extracted pipestone for ceremonial calumets across more than 3,000 years; Yankton Dakota (Ihanktunwan) maintained the traditional role of caretakers of the quarry; under the Yankton Treaty (1858), Article 8, Yankton chief Struck-by-the-Ree (Pan Tanka Sapa Wicasa) secured a one-mile-square reserved tract around the quarry for continued Dakota quarrying use even as surrounding land was ceded; the U.S. government attempted to seize the tract in 1899, and the Yankton Sioux Tribe won restitution at the U.S. Supreme Court in 1926; the reserved tract became the core of Pipestone National Monument, established 1937, today administered in consultation with 23 federally affiliated tribal nations who retain free quarry permit rights","displacement_tenure":"Cession 289: Treaty of Traverse des Sioux (1851); Sisseton and Wahpeton Dakota ceded roughly 21 million acres of southern Minnesota, though the cession map erroneously swept in Yankton territory around the Pipestone quarry that the Sisseton did not control. Yankton Treaty (1858), Article 8, separately reserved a one-mile-square tract around the quarry for Yankton Dakota quarrying despite the surrounding Yankton Sioux Reservation cession; the U.S. attempted to seize the reserved tract in 1899, overturned by the U.S. Supreme Court in 1926, which ordered compensation; the tract became Pipestone National Monument in 1937","shadow_history":"The Pipestone Indian Training School, a federal Bureau of Indian Affairs off reservation boarding school, operated on the monument grounds and adjacent reservation land from 1893 to roughly 1953, one of the last such schools to close; it forcibly enrolled Dakota, Anishinaabe (Ojibwe), Oneida, Pottawatomi (Bodewadmi), Arikara, and Sac and Fox (Meskwaki) children from across the Midwest; a campus cemetery holds the graves of children who died there, including a five year old non-English-speaking child who died ten days after arrival; the National Park Service is now partnering with the Pipestone Human Rights Commission and the American Indian Movement to research the cemetery and identify the children buried there","ecology":"Tallgrass prairie, including sections never plowed, supports more than 500 plant species, roughly 100 bird species, 25 mammal species, 26 fish species, and 45 macroinvertebrate species within the Coteau des Prairies.","conservation_status":"National Monument (established 1937, NPS); listed on the National Register of Historic Places; associated with the Pipestone Quarries National Historic Landmark designation","endangered_species":"Topeka shiner (Notropis topeka, federally Endangered) documented in Pipestone Creek; western prairie fringed orchid (Platanthera praeclara, federally Threatened)","gps":"44.0133° N, 96.3250° W","primary_nation":"Oceti Sakowin (Sioux)","agency_type":"NPS"}},{"type":"Feature","geometry":{"type":"Point","coordinates":[-96.514,43.69]},"properties":{"slug":"palisades-state-park","name":"Palisades State Park","state":"SD","acreage":"435","geology":"~1,700 Mya Paleoproterozoic Sioux quartzite","epoch":"Paleoproterozoic","hydrology":"Split Rock Creek, part of the Big Sioux River watershed, runs through a gorge cut into Sioux quartzite, forming palisades and shelf cliffs up to 50 feet tall.","native_lands":"Oceti Sakowin (Great Sioux Nation, Seven Council Fires); the Big Sioux River and Split Rock Creek corridor lay along the boundary between Sisseton-Wahpeton Dakota territory to the east and Yankton Dakota territory to the south and west; Sisseton and Wahpeton Dakota ceded lands extending west to the Big Sioux River under the Treaty of Traverse des Sioux (1851), while Yankton Dakota retained competing claims to portions of this country until the Yankton Treaty of 1858 established the Yankton Sioux Reservation and extinguished Yankton title to the ceded lands to its east","displacement_tenure":"Cession 289: Treaty of Traverse des Sioux (1851); Sisseton and Wahpeton Dakota ceded lands reaching west to the Big Sioux River, encompassing the Split Rock Creek country near present-day Garretson; Yankton Dakota's competing claims to portions of this region were not resolved until the Yankton Treaty (1858), which established the Yankton Sioux Reservation and formally extinguished Yankton title to lands ceded east of the reservation","shadow_history":"A quartzite quarry opened near Garretson in the early 1890s, drawing on the same Sioux quartzite formation sacred to Dakota quarrying traditions at Pipestone, and supplied stone for the town's banks, opera house, and stores; Split Rock Park, the predecessor to Palisades State Park, began as a Works Progress Administration project in the 1930s, when laborers built a dam, bathhouse, and bridge from quarried quartzite that remain in the park today; a brief 1886 silver rush drew nearly 300 mining claims before collapsing when the ore proved low grade","ecology":"Native tallgrass prairie and woodland border Split Rock Creek's quartzite gorge; a 2018-19 expansion added riparian habitat and woody plantings along the creek corridor.","conservation_status":"South Dakota State Park (established 1970 as Split Rock Park; managed by South Dakota Game, Fish and Parks)","endangered_species":"none documented","gps":"43.6900° N, 96.5140° W","primary_nation":"Oceti Sakowin (Sioux)","agency_type":"State park"}},{"type":"Feature","geometry":{"type":"Point","coordinates":[-93.3089,43.6372]},"properties":{"slug":"myre-big-island-state-park","name":"Myre-Big Island State Park","state":"MN","acreage":"1,578","geology":"~375 Mya Middle to Late Devonian limestone and dolomite","epoch":"Middle to Late Devonian (Givetian-Frasnian)","hydrology":"Albert Lea Lake (2,669 acres, mean depth 3.5 ft), a glacially formed moraine-dammed lake, borders the park on its eastern edge; the Shell Rock River originates at the Albert Lea Lake outlet and flows 113 miles south into Iowa, joining the Cedar River and then the Mississippi; total upland drainage to Albert Lea Lake is approximately 89,500 acres; the lake has experienced chronic phosphorus loading and algae blooms, with an electric fish barrier and water control structure installed to manage invasive carp.","native_lands":"Wahpekute (Wahpahkoota, \"Shooters Among the Leaves\"), the southernmost band of the Dakota (Oceti Sakowin), held the Albert Lea lakes region as core homeland, with at least 9,000 years of documented continuous Indigenous occupation; Sisseton (Sisitunwan, \"People of the Boggy Ground\") territory also extended into southern Minnesota; Lt. Albert Miller Lea led the first documented Euro-American military survey of Freeborn County in 1835, at that time still unambiguously Dakota land; Wahpekute and Mdewakanton bands ceded all of southern Minnesota including Freeborn County under the Treaty of Mendota (August 5, 1851) for $1,410,000 and relocation to a narrow Minnesota River reservation; following the U.S.-Dakota War (1862), Congress passed the Sioux Removal Act (March 3, 1863) banishing all Dakota bands from Minnesota; hundreds of Dakota women, children, and elders died in a winter internment camp on Pike Island before mass exile to Nebraska and Dakota Territory","displacement_tenure":"Treaty of Mendota (August 5, 1851): Mdewakanton and Wahpekute bands ceded approximately 24 million acres across southern Minnesota for $1,410,000; Freeborn County included in cession; reservation land along the Minnesota River assigned but never fully honored; U.S.-Dakota War (August-September 1862) followed by Congress voiding all Dakota treaties and passing the Sioux Removal Act (1863), expelling all Dakota from Minnesota; park land passed into federal public domain and opened to Euro-American settlement by 1855; Minnesota DNR established the park in 1947 as Big Island State Park, renamed Helmer Myre State Park, then renamed Myre-Big Island State Park in 1990","shadow_history":"Owen Johnson, a local amateur archaeologist, conducted extensive surface collection of Native American artifacts around Albert Lea Lake through the 1940s and donated the collection to the state park in 1972; it is held in the Owen Johnson Interpretive Center and available for research but not publicly displayed; Lloyd Wilford of the University of Minnesota conducted field-checking of archaeological site records around Albert Lea Lake in 1945; a formal archaeological reconnaissance survey conducted during park development documented thirteen excavation test units in the development area, indicating construction proceeded on Dakota-era occupation sites (Minnesota Legislative Reference Library document 811650)","ecology":"Oak savanna, wet lowlands, and glacially deposited esker ridges characterize the mainland; the 116-acre Big Island supports a rare remnant of old-growth sugar maple and basswood forest, one of the few remaining in southern Minnesota; Albert Lea Lake draws large concentrations of American white pelicans and waterfowl during spring and fall migration; prairie and wetland restoration via controlled burns is ongoing.","conservation_status":"Minnesota State Park (established 1947 as Big Island State Park; renamed Myre-Big Island State Park 1990)","endangered_species":"none confirmed; regal fritillary (Speyeria idalia) historically present in southern Minnesota oak savanna, likely extirpated from the state","gps":"43.6372° N, 93.3089° W","primary_nation":"Wahpekute Dakota","agency_type":"State park"}},{"type":"Feature","geometry":{"type":"Point","coordinates":[-90.7678,42.1203]},"properties":{"slug":"maquoketa-caves-state-park","name":"Maquoketa Caves State Park","state":"IA","acreage":"370","geology":"~430 Mya Silurian dolomite (Hopkinton and Scotch Grove formations) overlying Late Ordovician Maquoketa Formation limestone and shale","epoch":"Early Silurian (Llandovery-Wenlock); Late Ordovician strata below","hydrology":"Drains to the North Fork Maquoketa River, a tributary of the Maquoketa River (approximately 150 miles long), which flows southeast to the Mississippi; within the Maquoketa River HUC 07060006 watershed (~1,895 sq mi); classic karst hydrology with sinkholes, underground streams, and natural bridges formed by groundwater dissolution of Silurian dolomite over an estimated 500,000 years.","native_lands":"Báxoje (Ioway, \"grey snow people\") held the Mississippi River corridor and Iowa River drainage as core territory; Sauk (Ozaakiiwaki) and Meskwaki (Meshkwahkihaki, \"Red-Earths people\") moved into eastern Iowa during the 18th century after conflicts with French colonists and by 1800 claimed the eastern Iowa strip including the Maquoketa River valley; the river name derives from the Meskwaki Maquaw-Autaw, meaning \"Bear River\"; Ho-Chunk (Hochungra) were placed in the Neutral Ground of northeast Iowa after 1832 as a buffer between Sauk-Meskwaki and Dakota peoples; Woodland-period peoples used the caves as winter shelter, leaving pottery, stone tools, and projectile points; Sauk and Meskwaki ceded the eastern Iowa strip under the Black Hawk Purchase, Treaty with the Sauk and Foxes (September 21, 1832, Royce Cession 175), with Black Hawk held prisoner during signing; remaining Iowa claims were extinguished by treaties in 1836, 1837, and 1842, with final removal west of the Missouri River completed by 1846; a Meskwaki band purchased land and returned to Iowa in 1856, remaining at the Meskwaki Settlement in Tama County","displacement_tenure":"Royce Cession 175: Treaty with the Sauk and Foxes (September 21, 1832) -- the Black Hawk Purchase -- ceded a strip approximately 50 miles wide along the west bank of the Mississippi River from the Missouri state line north to the Upper Iowa River, encompassing the Maquoketa Caves area in Jackson County; cession covered roughly 6 million acres and was extracted as a punitive condition of Black Hawk's defeat, with Black Hawk held prisoner during signing; second Black Hawk Purchase (October 21, 1837) ceded 1.25 million acres immediately west; Treaty with the Sauk and Foxes (October 11, 1842) extinguished all remaining Sauk and Meskwaki Iowa claims; forced removal west of the Missouri River completed by 1846; Iowa Federation of Women's Clubs purchased approximately 17 acres including the main caves in 1921; the 111-acre core was dedicated as a state park in 1933","shadow_history":"Woodland-period pottery, stone tools, and projectile points recovered from the caves are held in collections, though no NAGPRA compliance documentation is available in public records for these materials","ecology":"Mixed hardwood forest of upland white oak, red oak, and sugar maple on ridgetops and slopes; shaded ravines and dolomite bluff faces support rare species including yellow lady's slipper orchid, leatherwood, and gromwell; the park sits in the Driftless Area, unglaciated during the Pleistocene, and contains more caves than any other Iowa state park.","conservation_status":"Iowa State Park (dedicated 1933; Iowa DNR); Maquoketa Caves State Park Historic District listed on the National Register of Historic Places (1991, NRHP #91001843)","endangered_species":"Indiana bat (Myotis sodalis, federally Endangered); northern long-eared bat (Myotis septentrionalis, federally Endangered); caves closed November 15 through April 1 annually as hibernacula; white-nose syndrome monitoring in place","gps":"42.1203° N, 90.7678° W","primary_nation":"Báxoje (Ioway)","agency_type":"State park"}},{"type":"Feature","geometry":{"type":"Point","coordinates":[-90.159,42.1384]},"properties":{"slug":"mississippi-palisades-state-park","name":"Mississippi Palisades State Park","state":"IL","acreage":"2,500","geology":"~425 Mya Silurian dolomite","epoch":"Late Silurian (Wenlock-Ludlow)","hydrology":"Located at the confluence of the Apple River and the Mississippi River in the Upper Mississippi watershed; ravines drain west to the Mississippi; karst topography produces sinkholes and vertical caves within the park.","native_lands":"Ho-Chunk (Hochungra) and Sauk (Ozaakiiwaki) held the Mississippi-Rock River corridor of northwestern Illinois; Meskwaki (Meshkwahkihaki) allied with the Sauk and claimed the eastern Iowa and western Illinois strip from roughly 1722; Woodland and Hopewell cultures documented in rock shelters and burial mounds throughout Carroll County; Apple River Fort, 15 miles from the park, was attacked by Black Hawk (Ma-ka-tai-me-she-kia-kiak) and approximately 200 warriors on June 24, 1832, during the Black Hawk War; Ho-Chunk ceded their northwestern Illinois lands by Treaty with the Winnebago (September 15, 1832, Fort Armstrong) and were removed to Iowa; Sauk and Meskwaki ceded all lands east of the Mississippi by Treaty with the Sauk and Foxes (September 21, 1832, Fort Armstrong) following their defeat in the Black Hawk War; both nations relocated to Iowa under federal removal policy","displacement_tenure":"Treaty with the Winnebago (September 15, 1832): Ho-Chunk ceded northwestern Illinois lands and were removed to Iowa; Treaty with the Sauk and Foxes (September 21, 1832): Sauk and Meskwaki ceded all Illinois lands east of the Mississippi following the Black Hawk War [Royce cession number for this Illinois east-bank cession unconfirmed; Cession 175 refers to the Iowa west-bank Black Hawk Purchase strip]; Carroll County lands entered the federal public domain in the mid-1830s under the Public Land Survey System; Illinois acquired park lands progressively through the 20th century","shadow_history":"The Savanna Army Depot Activity (EPA Superfund ID 0501174) operated 7 miles north of the park from 1917 to 1995, with its southern boundary at the Apple River, which flows through the park and into the Mississippi at the park's western edge; the depot's abandoned landfill on the Apple River bank is documented by EPA as leaching TNT residues, PCBs, lead (soil concentrations up to 110,000 mg/kg), DDT, TCE, and mustard agent demilitarization residues into the Apple River and adjacent Mississippi River; the site was listed on the National Priorities List in 1989 and closed under BRAC in 2000; 9,404 acres were transferred to become the Lost Mound Unit of the Upper Mississippi River National Wildlife and Fish Refuge, immediately adjacent to the park; contamination monitoring at multiple on-depot sites is required through 2066","ecology":"Oak-hickory forest dominates the uplands of this unglaciated Driftless Area landscape, transitioning to sugar maple and basswood in moist north-facing ravines; dolomite bluff faces and karst sinkholes support relict fern communities and calciphilic wildflowers including yellow lady's slipper orchid, Virginia bluebells, bloodroot, and wild ginger.","conservation_status":"Illinois State Park; National Natural Landmark (designated 1973)","endangered_species":"Higgins eye pearlymussel (Lampsilis higginsii, federally Endangered); Indiana bat (Myotis sodalis, federally Endangered) in Driftless Area range; northern long-eared bat (Myotis septentrionalis, federally Endangered) in range","gps":"42.1384° N, 90.1590° W","primary_nation":"Ho-Chunk","agency_type":"State park"}},{"type":"Feature","geometry":{"type":"Point","coordinates":[-85.6201,40.0958]},"properties":{"slug":"mounds-state-park","name":"Mounds State Park","state":"IN","acreage":"290","geology":"~420 Mya Silurian dolomite and limestone forming bedrock subcrop; Pleistocene Wisconsinan glacial till (Tipton Till Plain) blankets the upland surface; limestone bluffs exposed along the White River valley","epoch":"Late Silurian; Pleistocene (Wisconsinan) surficial landscape","hydrology":"West Fork of the White River flows along the park's southern boundary, forming limestone bluffs; spring-fed creeks drain the interior woodland; artesian wells documented within the park; part of the West Fork White River sub-watershed draining central Indiana","native_lands":"Adena culture (c. 250 BCE-50 CE) and Hopewell tradition (c. 100 BCE-500 CE) constructed and used the 10 earthworks; evidence of human occupation at the site from c. 8000 BCE through 1400 CE; a New Castle Phase affiliated Hopewell group built earthworks throughout the West Fork White River watershed; Delaware (Lenape; Lenapehoking) held the White River corridor as primary territory; Kikthawenund (Chief William Anderson, c. 1740-1831), Unalatchgo Lenape leader whose name means \"creaking boughs,\" lived in what is now Madison County and signed the Treaty of Greenville (1795) as one of 14 Lenape leaders; the city of Anderson is named for him; Miami (Myaamiaki) jointly held the White River drainage; Delaware and Miami ceded Indiana lands via Treaty with the Delawares (October 3, 1818) and Treaty of St. Mary's (October 6, 1818), both encompassed within the New Purchase; Delaware reserved occupancy for three additional years, with Kikthawenund relocating approximately 1,350 Lenape to the Current River, Missouri in 1821","displacement_tenure":"Treaty with the Delawares (October 3, 1818) ceded all Delaware Indiana claims including the White River corridor, incorporated within Royce Cession 15 (the New Purchase) ceded by the Miami October 6, 1818; Delaware reserved occupancy for three years, removing to Current River, Missouri by 1821; Bronnenberg family held and farmed more than 600 acres from the 1840s, protecting the southern enclosures from agricultural cultivation; Union Traction Company developed a 40-acre amusement park on the property beginning 1897, accessed by Interurban streetcar from Anderson; park closed 1929; Madison County Historical Society acquired the property and transferred it to the State of Indiana; established as Mounds State Park October 7, 1930","shadow_history":"Union Traction's amusement park (1897-1929) operated directly on the earthwork complex; attractions included the roller coaster \"Leap the Dips\" (opened 1908), a skating rink, merry-go-round, and a section of the White River dammed for canoe rides, with the Great Mound serving as a visual landmark for the rides; Ball State University conducted multiple archaeological excavations at the site, including work in 1968-69 on the Great Mound that revealed three successive clay floors with ash layers indicating repeated ceremonial use; two human burials were recovered, a 50-year-old adult male and the redeposited partial remains of a cremated individual, along with copper beads, mica, obsidian, seashells, a limestone platform pipe, deer bone awls, and pottery; disposition and repatriation status of recovered remains and artifacts under NAGPRA has not been confirmed in publicly available records","ecology":"Mixed hardwood upland forest with spring wildflower communities; limestone bluffs and riparian woodland along the White River; diverse songbird populations and waterfowl; 10 miles of trails through varied woodland habitat","conservation_status":"Indiana State Park (established October 7, 1930); earthwork complex listed on the National Register of Historic Places","endangered_species":"Indiana bat (Myotis sodalis, federally Endangered); northern long-eared bat (Perimyotis subflavus, federally Threatened)","gps":"40.0958° N, 85.6201° W","primary_nation":"Lenape","agency_type":"State park"}},{"type":"Feature","geometry":{"type":"Point","coordinates":[-87.049,39.9423]},"properties":{"slug":"pine-hills-nature-preserve","name":"Pine Hills Nature Preserve","state":"IN","acreage":"480","geology":"~310 Mya Pennsylvanian sandstone over ~340 Mya Mississippian Borden Group siltstone and limestone; junction of formations produces abundant springs throughout the preserve; marine fossils including crinoids, bryozoans, and brachiopods in Mississippian layer","epoch":"Pennsylvanian (upper); Mississippian (lower)","hydrology":"Clifty Creek and Indian Creek drain the preserve before joining Sugar Creek within adjacent Shades State Park; Sugar Creek is a 93-mile Wabash River tributary; springs emerge throughout the preserve at the junction of Pennsylvanian and Mississippian bedrock; within the Deer Creek-Sugar Creek sub-watershed of the Upper Wabash River basin","native_lands":"Miami (Myaamiaki) and Wea held the west-central Indiana Sugar Creek corridor; Wea established at Ouiatenon near present Lafayette to the north; Potawatomi (Neshnabe) oral tradition records a battle fought in the Clifty Creek and Indian Creek ravines of Pine Hills in the 1770s, when Potawatomi forces and Miami warriors contested control of the Wabash Valley, with the legend claiming nearly 600 warriors killed on both sides and the account possibly giving rise to the 'Shades of Death' name for the surrounding terrain; Miami and Wea ceded the Sugar Creek territory through Treaty of Grouseland (August 21, 1805) and Treaty with the Miami (October 6, 1818)","displacement_tenure":"Royce Cession 56: Treaty of Grouseland (August 21, 1805) ceded Miami, Eel River, and Wea southern Indiana lands; Royce Cession 15: Treaty with the Miami (October 6, 1818, St. Mary's) ceded the New Purchase, covering the Sugar Creek corridor; Treaty with the Wea (October 2, 1818) ceded all remaining Wea Indiana claims; Wea final reserve ceded August 11, 1820; property remained in the Hasselman family until 1960; Indiana Academy of Science initiated preservation efforts in 1953; The Nature Conservancy purchased the property from the Hasselman family for $15,000 in 1960 and donated it to the Indiana Department of Natural Resources in October 1961; designated Indiana State Nature Preserve No. 1 on October 6, 1969","shadow_history":"The Mill Cut Backbone takes its name from an 1868 cut made through a sandstone ridge by the Pine Hill Woolen Mill Company, which dammed Clifty Creek and notched the hillside to channel water to a woolen mill built in 1870; the mill operated approximately three years before being moved, leaving the notch permanently inscribed in the bedrock topography; historic carvings on cliff faces dating to the 1800s, including forms speculated to represent passenger pigeons, are documented on rock surfaces within the preserve","ecology":"Relict stands of northern hemlock, white pine, and Canada yew on canyon walls and ravine floors, representing the northernmost white pine stand in this part of the continent; old-growth oak and hickory uplands; beech-maple and floodplain forest; diverse fern communities and rare wildflowers on shaded cliff faces; five miles of clear streams","conservation_status":"Indiana State Nature Preserve No. 1 (designated October 6, 1969); National Natural Landmark (107th, designated 1968); managed by Indiana Division of State Parks and Reservoirs","endangered_species":"Indiana bat (Myotis sodalis, federally Endangered) likely present in ravine habitat; no confirmed site-specific survey data in public records","gps":"39.9423° N, 87.0490° W","primary_nation":"Miami","agency_type":"State nature preserve"}},{"type":"Feature","geometry":{"type":"Point","coordinates":[-86.8425,40.4973]},"properties":{"slug":"prophetstown-state-park","name":"Prophetstown State Park","state":"IN","acreage":"2,000","geology":"~375 Mya Devonian New Albany Shale and Mississippian Borden Group siltstone and crinoidal limestone forming the bedrock subcrop; landscape sculpted by Pleistocene Wabash Torrent (~14,000 BP) as glacial Lake Maumee breached the Fort Wayne moraine, depositing glacial outwash terraces above the Wabash-Tippecanoe confluence","epoch":"Late Devonian to early Mississippian (Famennian to Kinderhookian); surficial landscape Pleistocene (Wisconsinan)","hydrology":"Wabash River drainage; Tippecanoe River (180 miles, watershed 1,947 sq mi) confluences with the Wabash within the park near Battle Ground; Harrison Creek flows through the park interior forming fen ponds; park occupies three Wabash terraces shaped by the Pleistocene Wabash Torrent; 317-acre wetland restoration zone adjacent to the confluence; Tippecanoe River supports the most diverse mussel fauna in Indiana including eight federally listed species","native_lands":"Miami (Myaamiaki) and Wea held the Wabash-Tippecanoe confluence as core territory; Potawatomi (Neshnabe) occupied lands north of the Wabash; Shawnee (Shawanwaki) brothers Tecumseh and Tenskwatawa established Prophetstown at the confluence in 1808 as a multiethnic confederacy stronghold drawing Potawatomi, Kickapoo, Lenape (Delaware), Winnebago (Ho-Chunk), Wea, Wyandot, Ottawa, Ojibwe, Menominee, Sauk, Fox, Creek, and an estimated 14 nations totaling up to 3,000 people; Woodland-period peoples occupied the river terraces at least 3,000 years prior; Harrison's forces burned Prophetstown November 8, 1811 following the Battle of Tippecanoe (November 7, 1811); Tecumseh continued organizing until his death at the Battle of the Thames (October 5, 1813)","displacement_tenure":"Treaty of Fort Wayne (September 30, 1809): Delaware, Miami, Eel River Miami, and Potawatomi ceded approximately 3 million acres along the Wabash north of Vincennes in three tracts (Royce Cessions 9, 10, 11); Wea concurrence by separate treaty October 26, 1809; cession encompassed the Wabash-Tippecanoe confluence and directly provoked Tecumseh's War; Battle of Tippecanoe November 7, 1811 and burning of Prophetstown November 8, 1811; Treaty of St. Mary's (October 6, 1818) extinguished remaining Miami and Potawatomi claims south of the Wabash; Potawatomi removed via Trail of Death (September 1838, 40+ deaths en route to Kansas); Miami partially removed 1846, many returning under individual allotment protections; Indiana DNR established Prophetstown State Park 2004","shadow_history":"Tenskwatawa (Lalawethika, The Prophet) launched a pan-Indian spiritual revival beginning in 1805 and in April 1808 led his followers from Greenville, Ohio to the Tippecanoe-Wabash confluence, establishing Prophetstown on land claimed by the Miami and Wea over the explicit objection of Miami war chief Little Turtle; his brother Tecumseh (Crouching Tiger) transformed the religious movement into a political and military confederacy, recruiting an estimated 14 nations including Potawatomi, Kickapoo, Lenape, Winnebago, Wyandot, Ottawa, Ojibwe, Menominee, Sauk, Fox, and Creek; at its peak Prophetstown was the largest multi-tribal settlement in the Great Lakes region, housing an estimated 3,000 people; Harrison's forces burned Prophetstown on November 8, 1811, one day after the Battle of Tippecanoe, destroying the village and stored provisions after non-combatants had evacuated across the Wabash; the village's precise location remained unknown for nearly two centuries and was not archaeologically documented at park establishment in 2004; investigations at Site 12-T-59 and adjacent locations recovered 3,000-year-old flake tools, stone points, and shell-reinforced potsherds; archaeologist Christopher Moore (University of Indianapolis) identified multiple dispersed occupation zones separated by cornfields rather than a single centralized village; documentation of tribal consultation in early excavations is absent from public record","ecology":"Restored tallgrass prairie dominated by big bluestem (Andropogon gerardii), Indian grass (Sorghastrum nutans), little bluestem (Schizachyrium scoparium), and sideoats grama with forbs including black-eyed Susan; wetland fens fed by hillside seeps, bottomland sycamore and cottonwood forest along the Wabash and Tippecanoe floodplains, and open woodland savanna; over 180 bird species documented including state-significant Henslow's sparrow","conservation_status":"Indiana State Park (established 2004); adjacent to Tippecanoe Battlefield National Historic Landmark (separate property, Tippecanoe County Historical Association)","endangered_species":"Indiana bat (Myotis sodalis, federally Endangered); northern long-eared bat (Perimyotis subflavus, federally Threatened); clubshell (Pleurobema clava, federally Endangered), fanshell (Cyprogenia stegaria, federally Endangered), tubercled blossom (Epioblasma torulosa, federally Endangered), and additional federally listed mussel species in the Tippecanoe River; Henslow's sparrow (Centronyx henslowii, Indiana state-endangered) documented on-site","gps":"40.4973° N, 86.8425° W","primary_nation":"Miami","agency_type":"State park"}},{"type":"Feature","geometry":{"type":"Point","coordinates":[-87.0748,39.9326]},"properties":{"slug":"shades-state-park","name":"Shades State Park","state":"IN","acreage":"3,082","geology":"~310 Mya Pennsylvanian sandstone over ~340 Mya Mississippian Borden Group siltstone and limestone; deep sandstone ravines carved by Sugar Creek drainage","epoch":"Pennsylvanian (upper); Mississippian (lower, Borden Group)","hydrology":"Sugar Creek, a 93-mile Wabash River tributary, runs the length of the park; Indian Creek drains the northern ravines before joining Sugar Creek within the park; numerous named ravines including Frisz, Kintz, Pearl, and Red Fox carry seasonal flows; Silver Cascade waterfall; abundant springs where Pennsylvanian and Mississippian bedrock layers meet; park lies within the Deer Creek-Sugar Creek sub-watershed of the Upper Wabash River basin","native_lands":"Miami (Myaamiaki) and Wea held the west-central Indiana Sugar Creek corridor; Wea settled along the middle Wabash near present-day Lafayette; Sugar Creek is a Wabash tributary draining the park; Shawnee bands present in the region prior to European contact; Potawatomi oral tradition documents a battle between Potawatomi and Miami in the Pine Hills canyons in the 1770s during conflict over control of the Wabash Valley; Treaty of Grouseland (August 21, 1805, Royce Cession 56) ceded Miami, Eel River, and Wea southern Indiana lands; Treaty with the Miami (October 6, 1818, St. Mary's, Royce Cession 15) ceded central Indiana south of the Wabash, covering the Shades area; Treaty with the Wea (October 2, 1818) ceded all remaining Wea Indiana claims; Wea removed west to Missouri after 1820; Miami largely removed to Kansas in October 1846","displacement_tenure":"Royce Cession 56: Treaty of Grouseland (August 21, 1805) ceded Miami, Eel River, and Wea southern Indiana lands; Royce Cession 15: Treaty with the Miami (October 6, 1818, St. Mary's) ceded the New Purchase, covering the Shades area; Wea final reserve ceded August 11, 1820; steep terrain resisted farming and remained in private hands; operated as a resort in the 1890s; naturalist Joseph Frisz acquired the property in the 1930s to protect it; following Frisz's death (1939) a civic Save the Shades campaign raised $255,000 in 1947; Indianapolis businessman Arthur Baxter purchased the land from the Frisz heirs and transferred it to the State of Indiana; dedicated as Indiana's 15th state park July 18, 1948","shadow_history":"Government surveys in the early 1800s documented the Sugar Creek springs, and by the late 19th century the Garland Dells Mineral Springs Association had acquired the land and built a 40-room inn in 1887, operating it as a health resort called The Shades; the wellness commerce model (mineral springs, curative air, outdoor exposure) preceded and enabled the eventual conservation purchase; Joseph Frisz acquired the resort property in the 1930s to protect it from timber interests, and CCC enrollees built shelter houses and trail infrastructure on the land during this period while it was still privately held; the park was not formally state-owned until 1948, placing it outside the Indiana DNR's official CCC company assignment records despite documented CCC presence on site; the specific CCC company designation has not been located in publicly available records","ecology":"Old-growth and second-growth beech-maple and oak-hickory hardwood forest covers the uplands; relict populations of eastern hemlock, white pine, and Canada yew on north-facing canyon walls and ravine floors; rare ferns and wildflowers on shaded cliff faces throughout the Sugar Creek ravine system","conservation_status":"Indiana State Park","endangered_species":"Indiana bat (Myotis sodalis, federally Endangered) likely present in suitable habitat; no confirmed site-specific survey data in public records","gps":"39.9326° N, 87.0748° W","primary_nation":"Miami","agency_type":"State park"}},{"type":"Feature","geometry":{"type":"Point","coordinates":[-83.4063,39.1131]},"properties":{"slug":"fort-hill-state-memorial","name":"Fort Hill State Memorial","state":"OH","acreage":"1,300","geology":"~443-323 Mya Silurian through Mississippian dolomite, shale, and sandstone; Peebles Dolomite (Silurian Wenlockian-Ludlovian) forms the plateau upland; Ohio Shale and Berea Sandstone exposed in gorge section; site on unglaciated Allegheny Plateau with natural bridge.","epoch":"Wenlockian to Mississippian.","hydrology":"Headwaters of Middle Fork Ohio Brush Creek and Paint Creek on the unglaciated Allegheny Plateau; Baker Fork borders the limestone gorge; Ohio Brush Creek flows 59.9 miles to the Ohio River; hilltop stands approximately 500 feet above creek level; natural bridge feature on Gorge Trail.","native_lands":"Hopewell (Middle Woodland, ~100 BC-AD 500) built the 1.5-mile hilltop ceremonial enclosure and a village and ceremonial buildings in the Brush Creek valley; Adena culture (c. 500 BC-100 AD) antecedent; obsidian from Yellowstone-area sources and mica recovered from the site reflect Hopewell Interaction Sphere trade networks; Shawnee (Shawanwaki) held Paint Creek and Scioto watershed territories through the 18th century; Shawnee chiefs Blue Jacket and Black Hoof signed the Treaty of Greenville (August 3, 1795) following the Battle of Fallen Timbers (August 20, 1794), ceding Ohio territory south of the treaty line; final Ohio Shawnee removal to Kansas under Treaty with the Shawnee (1831).","displacement_tenure":"Hopewell decline approximately AD 400-500; Shawnee (Shawanwaki) Paint Creek territory; Battle of Fallen Timbers August 20, 1794; Treaty of Greenville August 3, 1795 ceded Ohio south of treaty line with Wyandot, Delaware, Shawnee, Ottawa, Chippewa, Potawatomi, Miami, and allied nations as signatories; Treaty of Fort Meigs (Miami Rapids) September 29, 1817 extinguished remaining northwestern Ohio reservations; Treaty with the Shawnee (1831) removed Ohio Shawnee to Kansas; listed on the National Register of Historic Places 1970; designated a National Natural Landmark 1974; managed by Ohio History Connection.","shadow_history":"Amateur antiquarians Ephraim George Squier, a journalist and later diplomat, and Edwin Hamilton Davis, a physician, excavated Fort Hill in 1846 for the Smithsonian, surveying the enclosure and removing artifacts; their survey was published in Ancient Monuments of the Mississippi Valley (1848), the first Smithsonian publication, with no artifact-provenience recording by modern standards; Ohio Historical Society archaeologist Raymond Baby re-excavated the circular enclosure in 1952, discovering a 174-foot-diameter double post ring before tribal consultation standards existed; CCC Company 1505 (Sinking Spring, 1934) constructed site infrastructure under the New Deal labor program.","ecology":"Mixed mesophytic old-growth forest among the highest tree-diversity forest types in temperate North America, with oak-hickory, beech-maple, and riverine communities; over 800 vascular plant species documented, including state-threatened Wherry's catchfly (Silene caroliniana var. wherryi); cerulean and worm-eating warblers nest in the contiguous forest block.","conservation_status":"National Register of Historic Places (1970); National Natural Landmark (1974); Ohio State Memorial managed by Ohio History Connection; inducted into Old Growth Forest Network (2015).","endangered_species":"Indiana bat (Myotis sodalis, federally Endangered) and northern long-eared bat (Perimyotis subflavus, federally Threatened) likely present based on forested karst habitat; Wherry's catchfly (Silene caroliniana var. wherryi, Ohio state-threatened) documented on site.","gps":"39.1131° N, 83.4063° W","primary_nation":"Hopewell","agency_type":"State historic site"}},{"type":"Feature","geometry":{"type":"Point","coordinates":[-81.5497,41.2417]},"properties":{"slug":"cuyahoga-valley-national-park","name":"Cuyahoga Valley National Park","state":"OH","acreage":"32,950","geology":"~360 Mya Upper Devonian shale and sandstone (Bedford Shale, Berea Sandstone, Chagrin Shale, Ohio Shale); overlain by Mississippian Cuyahoga Formation and Pennsylvanian Sharon Conglomerate; valley carved by Pleistocene glaciation with glacial drift to 400-foot depth.","epoch":"Upper Devonian (Famennian) to early Mississippian.","hydrology":"Cuyahoga River 26-mile corridor through park, dropping 600 feet between Akron and Cleveland and creating steep ravines and waterfalls including Brandywine Falls (65 ft); Berea Sandstone caprock over softer Bedford Shale creates differential erosion waterfalls throughout the valley; glacial drift fills valley to 400-foot depth; approximately 1,700 acres of wetlands in 1,500 discrete patches provide significant water filtration and flood attenuation; river largely recovered from industrial contamination following Clean Water Act enforcement.","native_lands":"Hopewell culture (c. 100 BC-500 AD) constructed burial mounds within current park boundaries, including the Everett Mound in northern Summit County; Erie (Eriehronon), an Iroquoian-speaking nation, held the region before the Beaver Wars (1640s-1650s) dispersed the Erie confederacy; Wendat (Wyandot/Huron) confederacy, incorporating survivors of the Erie and Petun (Tionontati) nations, designated the Cuyahoga Valley as communal hunting ground shared among nations; Lenape (Delaware; Lenapehoking) held refugee presence in the 18th century; Shawandasse Tula (Shawnee) and Haudenosaunee Seneca held shared hunting access; Treaty of Fort McIntosh (January 21, 1785) defined the Cuyahoga River mouth as the eastern boundary of Indian territory; Treaty of Greenville (August 3, 1795) ceded all land south and east of the Cuyahoga River following the Battle of Fallen Timbers (August 20, 1794); Seneca removed November 1831 via steamboat from Cincinnati, suffering starvation and disease en route to Kansas; Shawnee ceded Ohio lands and removed to Kansas 1831; Wyandot, the last nation in Ohio, resisted removal until 1843; approximately 664 Wyandot removed to Kansas July 1843 via Treaty with the Wyandots (1842), arriving to find no land available and forced to purchase 44,000 acres from the Delaware; Wyandotte Nation now headquartered in Wyandotte, Oklahoma.","displacement_tenure":"Treaty of Greenville (1795) extinguished Indigenous title; Cuyahoga County organized 1808 and entered private ownership; the Ohio and Erie Canal (1827-1913) corridor runs through the valley; 19th and 20th century industrial and agricultural use heavily degraded the Cuyahoga River; President Gerald Ford signed legislation establishing Cuyahoga Valley National Recreation Area December 27, 1974, as direct legislative response to the 1969 Cuyahoga River fire and the national environmental movement; redesignated Cuyahoga Valley National Park October 11, 2000.","shadow_history":"The Cuyahoga River caught fire at least 13 documented times between 1868 and 1969; the June 22, 1969 fire, ignited by a train flare on an oil slick trapped under railroad bridges near Republic Steel, burned for less than 30 minutes causing approximately $100,000 in damage to railroad bridges; the 1952 fire caused more than $1 million in damage; by 1951 the Ohio Department of Natural Resources documented the river as biologically dead from petroleum derivatives, solvents, and industrial effluent discharged by steel mills, rubber plants, and paint factories in Akron and Cleveland; the 1969 fire catalyzed passage of the Clean Water Act amendments (1972), the Great Lakes Water Quality Agreement (1972), and the establishment of the U.S. EPA (1970) and Ohio EPA (1971); the Krejci Dump, a private hazardous waste facility operating 1948-1980 on 47 acres within current park boundaries in Boston Township, was acquired by NPS in 1985 as a routine junkyard purchase, with contamination discovered only after a person fell ill collecting scrap in 1986; the Everett Mound (Hopewell) was destructively excavated during schoolhouse construction in 1856 before professional salvage by archaeologist David Brose in 1974; the Phillis Wheatley Association operated Camp Mueller in the Cuyahoga Valley in the 1930s to provide African American children access to overnight camping, excluded by segregation from white-only recreational facilities including Euclid Beach Park; racial exclusion from Cuyahoga Valley communities continued through restrictive covenants and mortgage redlining from the 1920s through the 1960s.","ecology":"Mixed deciduous forest with American beech and sugar maple dominant on upland ridges; eastern hemlock and yellow birch in cool north-facing ravines; cottonwood, sycamore, and black walnut in Cuyahoga River floodplain; more than 900 plant species; approximately 1,700 acres of wetlands in 1,500 discrete patches; bald eagle, peregrine falcon, river otter, and beaver reestablished through habitat restoration.","conservation_status":"Cuyahoga Valley National Park (established December 27, 1974 as Cuyahoga Valley National Recreation Area; redesignated national park October 11, 2000); Cuyahoga River designated National Heritage River.","endangered_species":"Indiana bat (Myotis sodalis, federally Endangered); eastern box turtle (Ohio state-threatened); Blanding's turtle (Emydoidea blandingii, Ohio species of special concern); bald eagle delisted federally 2007, now common in park.","gps":"41.2417° N, 81.5497° W","primary_nation":"Hopewell","agency_type":"NPS"}},{"type":"Feature","geometry":{"type":"Point","coordinates":[-81.5449,41.272]},"properties":{"slug":"krejci-dump","name":"Krejci Dump, Cuyahoga Valley National Park","state":"OH","acreage":"200","geology":"~360 Mya Upper Devonian shale (Bedford Shale, Ohio Shale, Cleveland Shale); overlain by Pleistocene glacial till and clay deposits of the Wisconsinan glaciation.","epoch":"Upper Devonian (Famennian).","hydrology":"Cuyahoga River tributary drainage in Boston Township, Summit County; Pleistocene glacial till and clay deposits create layered hydrogeological conditions above Devonian shale bedrock; remediation included hydrological management systems to prevent residual contaminant migration; seasonal wetland hydrology restored post-cleanup.","native_lands":"Wendat (Wyandot/Huron), Lenape (Delaware), Shawandasse Tula (Shawnee), Erie (Eriehronon), and Haudenosaunee Seneca nations held the Cuyahoga Valley and Boston Township; Treaty of Fort McIntosh (January 21, 1785) defined the Cuyahoga River mouth as the eastern boundary of Indian territory; Treaty of Greenville (August 3, 1795) extinguished Indigenous title to Summit County; final Wyandot removal to Kansas July 1843.","displacement_tenure":"Treaty of Greenville (1795) extinguished Indigenous title to Summit County; Boston Township organized c. 1810; the Krejci family opened a junkyard and waste disposal facility on the property in 1948, accepting industrial waste from Ford, General Motors, Chrysler, 3M, Chevron, and others through 1980; NPS acquired the 234-acre property in 1985 as part of Cuyahoga Valley National Recreation Area land assembly; redesignated Cuyahoga Valley National Park October 11, 2000; CERCLA remediation certified complete December 2020; 200-acre restored reserve opened to public access December 2020.","shadow_history":"The Krejci family operated an unregulated hazardous waste disposal facility on 47 acres in Boston Township from 1948 to 1980, accepting industrial waste from Ford Motor Company, General Motors, Chrysler, 3M, Chevron (Kewanee Industries), Federal Metal Company, and Waste Management of Ohio; waste was burned in open pits and buried in unlined trenches, allowing PCBs, dioxins, polyaromatic hydrocarbons, arsenic, cadmium, lead, benzene, and thousands of drums of 3M printing inks, solvents, and photographic emulsions to migrate into soil and groundwater; NPS acquired the property in 1985 as a routine junkyard purchase; contamination was discovered only after a person fell ill collecting scrap on the site in 1986; the site supported almost no life during the contamination period; the U.S. Department of Justice filed CERCLA suit against the responsible corporations in 1997; 3M refused settlement and went to trial, was found jointly and severally liable September 2001, and ordered to pay $15.5 million February 2002; Ford Motor Company served as lead remediation contractor under a 2002 settlement, removing 77,000 cubic yards of contaminated soil; total cleanup cost approximately $50 million, removing approximately 375,000-400,000 tons of contaminated material to depths of up to 20 feet; the site consists of two parcels separated by I-271, a 28-acre eastern parcel and a 19-acre western parcel comprising the 47-acre contaminated core; cleanup certified complete December 2020; 3.5 acres of seasonal wetland and wet meadow restored and opened to public access.","ecology":"Restored seasonal wetland and wet meadow habitat; 3.5 acres of native sedge, grass, and wildflower communities established post-remediation; Jefferson salamander (Ambystoma jeffersonianum), American toad, woodcock, and diverse migratory birds documented; site classified as NPS Sentinel Wetland within the Lower Cuyahoga wetlands monitoring program in partnership with The Nature Conservancy; site supported almost no life during active contamination.","conservation_status":"Unit of Cuyahoga Valley National Park; CERCLA enforcement site (EPA Site ID OHD981785074; not NPL-listed); cleanup certified complete December 2020; managed as restored wetland reserve open to public.","endangered_species":"none documented","gps":"41.2720° N, 81.5449° W","primary_nation":"Wyandot","agency_type":"NPS"}},{"type":"Feature","geometry":{"type":"Point","coordinates":[-82.2095,39.9848]},"properties":{"slug":"flint-ridge-state-memorial","name":"Flint Ridge State Memorial","state":"OH","acreage":"533","geology":"~320 Mya Pennsylvanian Vanport chert (Vanport Limestone Member, Allegheny Group); cryptocrystalline quartz (SiO2) formed through secondary silicification of a marine limestone by sponge-derived silica-rich fluids.","epoch":"Desmoinesian stage, Middle Pennsylvanian.","hydrology":"South Fork Licking River drainage basin, Muskingum River watershed; local drainage influenced by the impermeable Vanport chert layer; ancient quarry pits function as vernal pools and seasonal wetlands; broader landscape affected by agricultural tile drainage.","native_lands":"Archaic cultures quarried Flint Ridge chert beginning approximately 12,000 years ago; Adena culture (c. 500 BC-100 AD, Early Woodland) actively quarried and shaped tools here; Hopewell culture (c. 100 BC-500 AD, Middle Woodland) exploited Flint Ridge as a primary long-distance trade commodity, distributing the multicolored chert across the Hopewell Interaction Sphere as far west as present-day Kansas and Missouri, south to the Gulf Coast, and east to the Carolinas, exchanging flint for Michigan copper, Appalachian mica, and Gulf Coast marine shells; Flint Ridge served as a multi-tribal gathering and extraction place for millennia; Wyandot, Lenape (Delaware), Shawandasse Tula (Shawnee), Myaamia (Miami), Ottawa, Ojibwe, and Potawatomi held the Licking and Muskingum County region and were signatories to the Treaty of Greenville (August 3, 1795), which extinguished Indigenous title to this portion of Ohio.","displacement_tenure":"Treaty of Greenville (August 3, 1795) extinguished Indigenous title to Licking and Muskingum Counties; lands entered private agricultural ownership in the early 19th century; European settlers mined Flint Ridge commercially from the late 18th century through approximately 1840 for gunflints, whetstones, and millstones; Ohio Historical Society established Flint Ridge State Memorial in 1933; listed on the National Register of Historic Places 1970; Ohio flint designated official state gemstone 1965; managed by Ohio History Connection, successor to the Ohio Historical Society.","shadow_history":"European settlers extracted Flint Ridge chert commercially from the late 18th century through approximately 1840 for gunflints, whetstones, and millstones, constituting unregulated exploitation of a 12,000-year-old Indigenous quarry landscape; the first formal study of the site appeared in the 1884 Smithsonian Institution annual report; William C. Mills, Curator of Archaeology at the Ohio Historical Society, conducted extensive excavations in 1920, removing artifacts from the quarry pits to institutional collections in Columbus; the Gilbert W. Dilley Museum was constructed in 1968 directly over an original quarry pit; uncontrolled 19th and 20th century artifact collection removed unknowable quantities of material from the surface and quarry pits; the broader Flint Ridge quarry complex spans more than 2,000 acres across Licking and Muskingum Counties, the vast majority outside memorial boundaries and unprotected from agricultural disturbance.","ecology":"Mature beech-maple-oak mixed hardwood forest; the Vanport chert layer 3-5 feet below the surface influences local drainage and root systems; approximately 14,000 years of quarrying activity has permanently altered local soil structure; ancient quarry pits have evolved into vernal pools supporting diverse amphibian and wetland plant communities; among the finest remaining examples of mature hardwood forest in Licking County.","conservation_status":"Ohio State Memorial (established 1933); National Register of Historic Places (listed 1970); Ohio flint (Vanport chert) designated official state gemstone of Ohio (1965).","endangered_species":"none documented","gps":"39.9848° N, 82.2095° W","primary_nation":"Hopewell","agency_type":"State historic site"}},{"type":"Feature","geometry":{"type":"Point","coordinates":[-82.4278,40.0403]},"properties":{"slug":"octagon-earthworks","name":"Octagon Earthworks","state":"OH","acreage":"70","geology":"~385 Mya Devonian limestone (Columbus Limestone, Delaware Limestone); earthworks constructed on Pleistocene glacial outwash terraces above the Licking River system.","epoch":"Middle to Late Devonian.","hydrology":"Raccoon Creek drainage, Licking River basin; earthworks positioned on glacial outwash terrace; groundwater and soil conditions impacted by decades of golf course maintenance chemical applications.","native_lands":"Hopewell culture (c. 100 BC-500 AD) constructed the Octagon Earthworks as a precision lunar observatory; eight walls are aligned to all eight lunar standstill moonrise and moonset extremes of the 18.6-year lunar cycle, demonstrated by Earlham College physicists Hively and Horn (1982) with Monte Carlo analysis placing the odds of accidental alignment at less than 1 in 40 million; the Octagon and its attached Observatory Circle together comprise the largest geometric earthwork in the Americas by enclosed area; Lenape (Delaware; Lenapehoking), Shawandasse Tula (Shawanwaki/Shawnee), Myaamia (Miami), Wyandot, Ottawa, and Ojibwe held the Ohio Valley in the historic period; Treaty of Greenville (August 3, 1795) extinguished Indigenous title to
