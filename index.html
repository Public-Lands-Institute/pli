Licking County.","displacement_tenure":"Treaty of Greenville (1795) extinguished Indigenous title; lands passed to private ownership in the early 19th century; Ohio Historical Society acquired the deed in 1933 while the Moundbuilders Country Club lease (established 1910) remained in force; the 18-hole golf course was completed in 1923; Ohio History Connection initiated legal action to terminate the lease 2018; Ohio Supreme Court affirmed eminent domain authority December 2022; settlement reached August 1, 2024 (terms confidential); Octagon Earthworks opened to full public access January 1, 2025.","shadow_history":"The Moundbuilders Country Club operated a private golf course on the Octagon Earthworks from 1910 to 2025, blocking public and scholarly access to the largest geometric earthwork in the Americas for 115 years; Tom Bendelow designed the original nine-hole course, which opened June 1911 and expanded to 18 holes by 1923; decades of golf course maintenance required repeated applications of pesticides, herbicides, fungicides, and arsenic-based compounds on the earthwork surfaces; Ohio History Connection began removal of sand traps, tee boxes, cart paths, and golf infrastructure beginning January 2025, with multi-year soil remediation required; UNESCO World Heritage inscription criteria required unrestricted public access to the site, making termination of the golf lease a prerequisite to the 2023 inscription; the 1982 discovery of the Octagon's precise lunar alignments came more than 70 years after the golf course was established over them.","ecology":"Former golf course turf undergoing active restoration; Ohio History Connection converting fairways and roughs to native grassland and prairie species beginning 2025; pre-contact vegetation was oak-hickory forest on upland terraces adjacent to the Raccoon Creek floodplain.","conservation_status":"Octagon State Memorial (Ohio State Memorial); National Historic Landmark (1964, jointly with Great Circle Earthworks); Official Prehistoric Monument of Ohio (2006); UNESCO World Heritage Site (Hopewell Ceremonial Earthworks, list no. 1689, inscribed September 19, 2023, criteria i and iii).","endangered_species":"none documented","gps":"40.0403° N, 82.4278° W","primary_nation":"Hopewell","agency_type":"State historic site"}},{"type":"Feature","geometry":{"type":"Point","coordinates":[-82.4301,40.0422]},"properties":{"slug":"newark-earthworks","name":"Newark Earthworks","state":"OH","acreage":"206","geology":"~385 Mya Devonian limestone (Columbus Limestone, Delaware Limestone) and shale (Olentangy Shale, Ohio Shale); earthworks constructed on Pleistocene glacial outwash terraces above the Licking River system.","epoch":"Middle to Late Devonian.","hydrology":"Licking River drainage basin; Raccoon Creek (683 sq mi watershed) and tributaries flow adjacent to the earthwork complex; earthworks positioned on elevated glacial outwash terraces above the Raccoon Creek floodplain in Licking County; rapid urban development in northwestern Licking County has increased flood frequency and impervious surface runoff.","native_lands":"Hopewell culture (c. 100 BC-500 AD) constructed the Newark Earthworks complex; the original complex covered more than 4 square miles and included interconnected geometric enclosures, parallel-walled roads, and ceremonial plazas; the Hopewell Interaction Sphere distributed Newark flint and prestige goods from this site across North America from the Great Lakes to the Gulf Coast; Lenape (Delaware; Lenapehoking), Shawandasse Tula (Shawanwaki/Shawnee), Myaamia (Miami), Wyandot, Ottawa, and Ojibwe held the Ohio Valley in the historic period; Treaty of Greenville (August 3, 1795) extinguished Indigenous title to Licking County, displacing Delaware, Shawnee, Wyandot, Miami, and allied nations; Indian Removal Act (1830) forced remaining Delaware, Shawnee, Seneca, and Ottawa west of the Mississippi.","displacement_tenure":"Treaty of Greenville (1795) extinguished Indigenous title to Licking County; lands entered private agricultural and commercial ownership in the early 19th century; Ohio Canal construction, urban development in Newark, and agricultural clearing destroyed more than 90% of the original complex by 1900; Ohio Historical Society acquired the Great Circle in 1933; Wright Earthworks fragment donated 1934; Moundbuilders Country Club held lease on the Octagon Earthworks from 1910, blocking public access; Ohio History Connection filed eminent domain action 2018; Ohio Supreme Court affirmed authority December 2022; settlement reached August 1, 2024; Octagon Earthworks opened to full public access January 1, 2025; inscribed UNESCO World Heritage Site (Hopewell Ceremonial Earthworks, list no. 1689, criteria i and iii, September 19, 2023).","shadow_history":"The original Newark Earthworks complex covered more than 4 square miles; 19th-century canal construction, railroad development, urban expansion, and agricultural clearing destroyed more than 90% of the complex, reducing it to three surviving fragments; in 1827, workers excavating an Ohio and Erie Canal lock destroyed a mound of the Cherry Valley Ellipse and found 14 human skeletons buried with large quantities of mica, one completely covered in mica sheets and described as carbonized; the remains were dispersed or lost during construction and never repatriated; the canal and Central Ohio Railroad construction (1852-1855) destroyed the entire Cherry Valley Ellipse, which originally contained 11 conical burial mounds and a large central mound, and the railroad bisected the pond north of the Great Circle and leveled eastern embankment structures; the Wright Earthworks, originally a geometrically precise square enclosure of approximately 20 acres, was almost entirely destroyed by canal construction, railroad grading, and Newark street and residential development before surviving fragments were donated to the Ohio Historical Society in 1934; Licking County Agricultural Society purchased the Great Circle in 1853 and used it as county fairgrounds for 80 years; Bureau of American Ethnology director W.H. Holmes warned in 1892 that continued fairground use would cause practical demolition within a few generations; the warning was ignored for another 40 years; the Great Circle was converted to Idlewilde Park in 1897, with a Ferris wheel, roller coaster, casino, racetrack, and recreational facilities installed inside the earthwork walls; Idlewilde Park operated until 1924; Squier and Davis surveyed the full complex for the Smithsonian Institution in the 1840s and published their findings in Ancient Monuments of the Mississippi Valley (1848), documenting that the scale of destruction already underway was irreversible; Emerson Greenman excavated Eagle Mound at the Great Circle in 1928, recovering copper ornaments and mica fragments; in 1860, Licking County surveyor David Wyrick excavated burial mounds at Newark and produced the disputed Newark Holy Stones, inscribed stones bearing Hebrew text allegedly found in Hopewell context, which most scholars consider 19th-century fabrications but which generated decades of fraudulent claims about pre-Columbian Hebrew presence in Ohio.","ecology":"Artificially maintained open grassland within earthwork enclosures, dominated by non-native turfgrass from former golf course management; Ohio History Connection implementing transition to native prairie species beginning 2025; pollen evidence indicates pre-contact oak-hickory climax forest on surrounding uplands; riparian corridors along Raccoon Creek support native floodplain woodland.","conservation_status":"Ohio State Memorial (Great Circle Earthworks, Wright Earthworks); National Historic Landmark (1964); Official Prehistoric Monument of Ohio (2006); UNESCO World Heritage Site (Hopewell Ceremonial Earthworks, list no. 1689, inscribed September 19, 2023, criteria i and iii).","endangered_species":"none documented","gps":"40.0422° N, 82.4301° W","primary_nation":"Hopewell","agency_type":"State historic site"}},{"type":"Feature","geometry":{"type":"Point","coordinates":[-82.8395,41.5039]},"properties":{"slug":"magee-marsh-wildlife-area","name":"Magee Marsh Wildlife Area","state":"OH","acreage":"2,202","geology":"~380 Mya Middle Devonian limestone (Columbus Limestone, Delaware Limestone); bedrock overlain by Pleistocene glacial lake plain deposits from proglacial Lake Maumee (~14,000 ya).","epoch":"Middle Devonian (Eifelian/Givetian); surface Pleistocene (Late Wisconsinan).","hydrology":"Lake Erie (southwestern shore, Ottawa County); Crane Creek drains through the wildlife area to Lake Erie; Ottawa River and Portage River drain adjacent watershed; site occupies the lake plain of proglacial Lake Maumee, which preceded Lake Erie and deposited clay-rich glacial till forming the water-retaining substrate of the coastal marsh complex; Maumee River (largest tributary of Lake Erie by discharge, draining 6,620 sq mi across Ohio, Indiana, and Michigan) enters Lake Erie approximately 20 miles west at Toledo.","native_lands":"Ottawa (Odawa/Anishinaabe), Wyandot (Wendat), Potawatomi (Bodéwadmi), and Erie (Eriehronon); Ottawa County named for the Odawa nation who held the Lake Erie shore from the Maumee to the Cuyahoga; Roche de Boeuf and Wolf Rapids on the Maumee River served as principal Ottawa settlement sites; Erie nation dispersed by Haudenosaunee after 1656; Treaty of Greene Ville (August 3, 1795) ceded northwestern Ohio including Ottawa County; Treaty of Maumee Rapids (September 29, 1817) forced additional Wyandot cessions; Treaty with the Ottawa (February 18, 1833) extinguished remaining Ottawa title in Ohio; Ottawa of the Roche de Boeuf and Wolf Rapids bands relocated west 1833-1837, approximately 300 of 600 Odawa dying within two years of Kansas resettlement; Wyandot removed to Kansas July 1843 in final forced removal from Upper Sandusky.","displacement_tenure":"Ceded via Treaty of Greene Ville (1795, Article 3); private shooting clubs leased and purchased the 30,000-acre Lake Erie marsh complex from Toledo to Sandusky through the late 19th and early 20th centuries, restricting public access to the entire southwestern Lake Erie wetland system during peak waterfowl harvest era; Ohio Division of Wildlife purchased 2,202 acres in August 1951 from private club ownership, establishing the state wildlife area; Ottawa National Wildlife Refuge (USFWS) established 1961 to protect adjacent wetland and beach ridge habitat.","shadow_history":"The Great Black Swamp, a 5,000+ square mile glacial wetland complex occupying the Maumee valley and southwestern Lake Erie plain, was systematically drained for agriculture between the 1850s and 1920s using hand-dug ditches and subsurface tile drainage; elimination of this wetland complex destroyed the filtration and water retention function of the largest coastal marsh on Lake Erie, contributing directly to the western basin hypoxia and algal bloom crises of the 1950s-1970s; before state acquisition in 1951, the entire 30,000-acre Lake Erie marsh from Toledo to Sandusky was held by private hunting clubs, excluding public access and permitting intensive unregulated waterfowl harvest that severely depleted breeding and migratory populations; Davis-Besse Nuclear Power Station, located approximately 10 miles southwest on the Lake Erie shore in Oak Harbor (Ottawa County), was commissioned in 1977 and in March 2002 was found to have a football-sized void in its reactor pressure vessel head caused by boric acid corrosion from a decade-long borated water leak, the most severe corrosion damage to a U.S. nuclear reactor pressure vessel head ever recorded; thermal discharge from the plant affects near-shore Lake Erie temperature regimes adjacent to the wildlife area.","ecology":"Coastal Lake Erie emergent freshwater marsh, beach ridge woodland, and submergent aquatic habitat; dominant communities include cattail (Typha spp.), bulrush (Schoenoplectus spp.), arrowhead (Sagittaria latifolia), and pickerelweed (Pontederia cordata) in the marsh, with oak-hickory beach ridge woodland on elevated sandy ridges; the 1.3-mile boardwalk through beach ridge and marsh edge is among the world's premier spring warbler migration watchpoints, with 26+ warbler species recorded during late April-early May migration; piping plover and bald eagle documented nesting on adjacent Lake Erie beaches.","conservation_status":"Ohio State Wildlife Area (Ohio DNR, established 1951); adjacency with Ottawa National Wildlife Refuge (USFWS, established 1961); Important Bird Area (IBA, Lake Erie Western Basin IBA); Western Hemisphere Shorebird Reserve Network Site of Regional Importance.","endangered_species":"Piping plover (Charadrius melodus, federally Endangered, Great Lakes population; first Ohio nest in 83 years documented 2021 on adjacent Lake Erie beach); lake sturgeon (Acipenser fulvescens, federally Threatened; juvenile releases in Maumee River since 2018); bald eagle (Haliaeetus leucocephalus, delisted 2007, nesting documented in adjacent Ottawa National Wildlife Refuge).","gps":"41.5039° N, 82.8395° W","primary_nation":"Ottawa (Odawa)","agency_type":"State wildlife area"}},{"type":"Feature","geometry":{"type":"Point","coordinates":[-83.8518,41.5545]},"properties":{"slug":"oak-openings-metropark","name":"Oak Openings Metropark","state":"OH","acreage":"5,000","geology":"~390 Mya Middle Devonian dolomite and limestone (Lucas Dolomite, Silica Formation) buried beneath Pleistocene glacial drift; surface dominated by glacial outwash sand deposited from glacial Lake Warren (~13,000 ya) and aeolian dune formation 13,000-8,000 ya.","epoch":"Middle Devonian; surface Pleistocene (Late Wisconsinan).","hydrology":"Maumee River watershed (8,316 sq mi); Oak Openings sits on a glacial lake plain between Maumee tributaries; Tiffin River to the north; Swan Creek drains through the Toledo urban area to the Maumee; historic glacial Lake Warren deposited the outwash sands ~13,000 ya and drained northeast through what is now the Lake Erie basin.","native_lands":"Wyandot (Wendat/Tionnontate), Ottawa (Odawa/Anishinaabe), Potawatomi (Bodwéwadmi), Shawnee (Šawanwaki), Miami (Myaamia), Kaskaskia, Kickapoo (Kiiakapoi), and Meškwahki (Fox); lower Maumee River valley a principal corridor between Lake Erie and interior Ohio; Wyandot and Ottawa held the Maumee territory; Treaty of Greene Ville (August 3, 1795) ceded northwestern Ohio; Treaty with the Wyandot et al. (September 29, 1817) secured remaining Maumee valley land reservations; Wyandot community departed Sandusky, Ohio July 20, 1843 in final forced removal to Wyandot County, Kansas, then relocated to Oklahoma Indian Territory.","displacement_tenure":"Ceded via Treaty of Greene Ville (1795, Article 3); additional cession via Treaty of September 29, 1817; Lucas County organized 1835; land entered private agricultural and industrial ownership through 19th century; oak savanna ecosystem reduced from ~130 sq mi regional extent to scattered remnants through logging, agricultural conversion, fire suppression, and sand mining; Metroparks Toledo established core preserve in the 1930s-1940s and expanded to current ~5,000-acre Metropark through ongoing acquisitions; Kitty Todd Nature Preserve (The Nature Conservancy, 1,017 acres) and additional Metroparks parcels form ~1,900-acre Oak Openings Corridor in adjacent Fulton and Henry counties.","shadow_history":"Oak savanna ecosystem reduced from historic regional extent of approximately 130 square miles to fewer than 300 high-quality remnant acres through 19th- and 20th-century logging, agricultural conversion, and decades of fire suppression; silica sand mining at the Toledo Stone and Glass Sand Quarry in adjacent Sylvania Township extracted the distinctive glacial outwash deposits that define the ecosystem; Civilian Conservation Corps conducted work at Oak Openings during the Depression era (1933-1942); Maumee Area of Concern (AOC) designated by U.S. EPA and IJC in 1985 covering the Maumee River corridor, citing sediment contamination by PCBs, PAHs, and heavy metals from industrial discharges by Toledo-area refineries, foundries, and chemical plants; prescribed fire restoration of oak savanna began 1988 after decades of suppression degraded understory composition.","ecology":"Globally rare oak savanna and Midwest sand barren with more than 1,200 native plant species; dominant communities include black oak savanna, twig-rush wet prairie, and tallgrass sand prairie with little bluestem (Schizachyrium scoparium), big bluestem (Andropogon gerardii), and Pennsylvania sedge (Carex pensylvanica); wild lupine (Lupinus perennis), obligate larval host of the federally endangered Karner blue butterfly, documented in significant colonies; one-third of Ohio's endangered plant species occur in the region.","conservation_status":"Metroparks Toledo Preserve; Important Bird Area (IBA, Audubon Ohio, 230+ bird species); critical habitat for federally endangered Karner blue butterfly (Lycaeides melissa samuelis); The Nature Conservancy Last Great Places recognition; Kitty Todd Nature Preserve (Ohio State Nature Preserve, 1,017 acres, managed by The Nature Conservancy); Maumee AOC restoration partnership (U.S. EPA Great Lakes program).","endangered_species":"Karner blue butterfly (Lycaeides melissa samuelis, federally Endangered since 1992); Persius dusky wing (Erynnis persius, Ohio state-endangered); frosted elfin butterfly (Callophrys irus, Ohio state-endangered); wild lupine (Lupinus perennis) documented as keystone larval host plant; 33 Ohio state-endangered and 32 state-threatened species among 93 monitored taxa.","gps":"41.5545° N, 83.8518° W","primary_nation":"Wyandot","agency_type":"County park"}},{"type":"Feature","geometry":{"type":"Point","coordinates":[-83.3412,41.8977]},"properties":{"slug":"ford-marsh-unit","name":"Ford Marsh Unit, Detroit River International Wildlife Refuge","state":"MI","acreage":"485","geology":"~385 Mya Middle Devonian dolomite and limestone (Detroit River Group); bedrock overlain by Pleistocene Wisconsin glacial clay, silt, and lacustrine deposits; site occupies the western Lake Erie lake plain at the mouth of the River Raisin.","epoch":"Middle Devonian (Eifelian).","hydrology":"River Raisin (135-mile Lake Erie tributary, 1,072 sq mi drainage basin, 92% agricultural land use) enters Lake Erie at the western boundary of the site; Clearwater Drain runs between Ford Marsh Unit and Sterling State Park; Sandy Creek (18.5-mile Lake Erie tributary) enters the lake approximately 2 miles south; western Lake Erie basin (shallowest, warmest, most productive of the Great Lakes).","native_lands":"Ottawa (Odawa/Anishinaabek), Potawatomi (Bodéwadmik), Wyandot (Wendat/Huron), and Ojibwe (Anishinaabek); River Raisin mouth and western Lake Erie shore a principal corridor in the Great Lakes Anishinaabe territory; Potawatomi established trade relations with French settlers at Frenchtown c. 1780; Potawatomi warriors allied with British and Canadian forces at the Battle of Frenchtown (January 1813); Treaty of Detroit (November 17, 1807) ceded ~5.6 million acres of southeastern Michigan including Monroe County, signed by Ottawa, Chippewa, Wyandot, and Potawatomi; Potawatomi removed via Treaty of Chicago (1833) and forced relocation 1838-1840 (Potawatomi Trail of Death); Wyandot ceded remaining Michigan lands via treaty 1842, removed to Kansas 1843.","displacement_tenure":"Ceded via Treaty of Detroit (November 17, 1807); Frenchtown established c. 1780 at the River Raisin mouth by French Canadian settlers under ribbon farm land grants; following U.S. re-occupation of Michigan Territory after the War of 1812, French land claims regularized under U.S. land law; Monroe County organized 1817; 19th-century industrial development included paper mills, foundries, and automotive parts manufacturing along the lower River Raisin; Ford River Raisin Warehouse site (3200 East Elm Avenue) operated successively as a steel mill (1930s-1940s), ALCOA WWII munitions facility (1943-1947), Kelsey-Hayes automotive wheel plant, and Ford Motor Company property (acquired 1949); Ford and Automotive Components Holdings LLC (ACH) managed adjacent coastal wetland under cooperative agreement with USFWS from 2005; Ford and ACH donated 242-acre Ford Marsh Unit to USFWS Detroit River International Wildlife Refuge in 2010; Eagle Island Marsh Unit (243 acres) brought under DRIWR cooperative management 2005.","shadow_history":"The River Raisin mouth and adjacent wetland corridor is the site of the Battle of Frenchtown (January 18 and 22, 1813), the worst American defeat of the War of 1812; of approximately 934 American soldiers engaged in the Second Battle of Frenchtown, only 33 escaped; following the January 22 battle, between 30 and 100 wounded American prisoners unable to travel were killed by Native warriors while under British guard in an event known as the River Raisin Massacre; the political aftermath was weaponized to justify Indian Removal, accelerating the forced relocation of Potawatomi, Wyandot, Ottawa, and Ojibwe from the Great Lakes; River Raisin National Battlefield Park (NPS) preserves the primary battle site approximately 1.5 miles north; River Raisin designated a Great Lakes Area of Concern (AOC) by U.S. EPA and IJC due to PCB contamination from a century of industrial discharges from paper mills, foundries, and automotive manufacturing; 2012-2013 Great Lakes Legacy Act remediation project removed 106,000 cubic yards of PCB-contaminated sediment from the river mouth and turning basin in a $44.2 million cost-shared project between EPA, Michigan EGLE, and Ford Motor Company; contaminated dredge material permanently disposed in a Confined Disposal Facility within Sterling State Park; Ford River Raisin Warehouse (3200 East Elm Avenue, Monroe), immediately adjacent to the river, operated as a steel mill, ALCOA WWII munitions facility (1943-1947), and Kelsey-Hayes wheel plant before Ford acquisition in 1949; PFAS contamination discovered in monitoring wells at the Ford warehouse site in May 2019, linked to historical chrome plating operations, with Michigan PFAS Action Response Team (MPART) managing ongoing migration risk to the River Raisin; Monroe Power Plant (DTE Energy, approximately 5 miles north) releases more arsenic into Lake Erie than any other U.S. coal-fired plant and produced more than half of Michigan's coal combustion residuals; Ford Motor Company's 2010 wetland donation borders the contaminated Ford warehouse site; River Raisin watershed is 92% agricultural land use with 3,000 miles of man-made drainage infrastructure, having lost the vast majority of historic wetland cover to 19th-century ditching.","ecology":"Coastal Great Lakes emergent and submergent marsh at the River Raisin mouth; American lotus (Nelumbo lutea, Michigan state-threatened, Michigan's official clean waterways symbol) prominent in open water; swamp rose-mallow (Hibiscus moscheutos) in marsh margins; habitat supports bald eagle, osprey, peregrine falcon, and diverse waterfowl; lake sturgeon (Acipenser fulvescens), walleye, and burrowing mayfly documented as water quality improves following AOC remediation; 300+ bird species recorded across the DRIWR corridor.","conservation_status":"Detroit River International Wildlife Refuge (USFWS, established December 21, 2001), first international wildlife refuge in North America; Ford Marsh Unit (242 acres, donated by Ford Motor Company/ACH 2010); Eagle Island Marsh Unit (243 acres, DRIWR cooperative management since 2005); River Raisin Area of Concern (EPA/Great Lakes Legacy Act active restoration zone).","endangered_species":"Piping plover (Charadrius melodus, federally Endangered, Great Lakes population); lake sturgeon (Acipenser fulvescens, Michigan state-threatened); American lotus (Nelumbo lutea, Michigan state-threatened).","gps":"41.8977° N, 83.3412° W","primary_nation":"Ottawa (Odawa)","agency_type":"USFWS"}},{"type":"Feature","geometry":{"type":"Point","coordinates":[-83.3335,41.9156]},"properties":{"slug":"william-c-sterling-state-park","name":"William C. Sterling State Park","state":"MI","acreage":"1,300","geology":"~385 Mya Middle Devonian dolomite and limestone (Detroit River Group); bedrock overlain by Pleistocene Wisconsin glacial clay, silt, and sand deposits.","epoch":"Middle Devonian (Eifelian).","hydrology":"Lake Erie shoreline (southeastern Michigan); Sandy Creek (18.5-mile Lake Erie tributary, rises London Township, Monroe County, drains to Lake Erie at park entrance in Frenchtown Charter Township); River Raisin (135-mile Lake Erie tributary, 1,072 sq mi drainage basin) enters Lake Erie approximately 3 miles north at Monroe; four man-made lagoons within park provide sheltered aquatic habitat.","native_lands":"Ottawa (Odawa/Anishinaabek), Potawatomi (Bodéwadmik), Wyandot (Wendat/Huron), and Ojibwe (Anishinaabek); Sandy Creek mouth and Lake Erie shore a key corridor in the Great Lakes Anishinaabe territory; Treaty of Detroit (November 17, 1807) ceded approximately 5.6 million acres of southeastern Michigan including Monroe County to the United States, signed by Ottawa, Chippewa, Wyandot, and Potawatomi; Potawatomi received $400 annual annuity and separate payments for communities on the River Raisin and Lake Erie tributaries; Odawa forced removal to Iowa then Kansas 1830s-1840s, more than 300 of approximately 600 Odawa dying within two years of resettlement; Wyandot removed to Kansas via treaty 1842-1843.","displacement_tenure":"Ceded via Treaty of Detroit (November 17, 1807); Monroe County organized 1817; land entered private agricultural ownership through 19th century; park proposed by Monroe citizens and dedicated as Sterling State Park in 1934 as a 115-acre preserve north of the River Raisin mouth, named for William C. Sterling (d. 1924), Monroe County civic leader; expanded over decades to current 1,300 acres; incorporated as southern anchor of Detroit River International Wildlife Refuge (USFWS) in 2001, enabling a $12 million federal-state restoration partnership.","shadow_history":"Monroe Power Plant (DTE Energy, commissioned 1970-1974, four coal-fired units, ~3,300 MW), located approximately 5 miles north of the park on Lake Erie, withdraws approximately 600 million gallons per day via once-through cooling causing large-scale fish larval entrainment and impingement; produces more than 800,000 tons per year of coal combustion residuals containing arsenic, mercury, lead, and selenium; 2025 data identified Monroe as the highest-discharging U.S. power plant for arsenic; EPA issued Notice of Violation June 2010; DOJ filed civil enforcement action 2013 over unpermitted Unit 2 modifications; River Raisin designated a TMDL-impaired waterbody due to agricultural runoff, failing Home Sewage Treatment Systems, and elevated E. coli concentrations; piping plover breeding absent from Lake Erie from 1977 until 2017 re-colonization, in part due to regional shoreline disturbance; 106,000 cubic yards of PCB-contaminated sediment dredged from the River Raisin mouth (2012-2013) permanently disposed in a Confined Disposal Facility within park boundaries.","ecology":"Great Lakes emergent and submergent marsh, restored lake plain prairie, and Lake Erie sandy beach habitat; dominant vegetation includes narrow-leaved cattail (Typha angustifolia), arrowhead (Sagittaria latifolia), and pondweeds in four managed lagoons; restored prairie community established on former agricultural land; American lotus (Nelumbo lutea) found in selected Lake Erie embayments; common reed (Phragmites australis) actively managed as invasive species; only Michigan state park on Lake Erie.","conservation_status":"Michigan State Park (established 1934); Detroit River International Wildlife Refuge co-management boundary (USFWS, 2001); Detroit-Western Lake Erie Coastal Wetland Management Area (CWMA) partnership for invasive Phragmites eradication.","endangered_species":"Piping plover (Charadrius melodus, federally Endangered, Great Lakes population); re-colonized Lake Erie beaches in 2017 for first time since 1977; spotted turtle (Clemmys guttata, Michigan state-threatened); wood turtle (Glyptemys insculpta, Michigan state-threatened).","gps":"41.9156° N, 83.3335° W","primary_nation":"Ottawa (Odawa)","agency_type":"State park"}},{"type":"Feature","geometry":{"type":"Point","coordinates":[-83.315,40.7158]},"properties":{"slug":"killdeer-plains-wildlife-area","name":"Killdeer Plains Wildlife Area","state":"OH","acreage":"9,054","geology":"~390 Mya Middle Devonian limestone (Columbus Limestone); bedrock overlain by Pleistocene glacial till and outwash from the Wisconsin glaciation.","epoch":"Middle Devonian (Eifelian/Givetian); surface Pleistocene (Wisconsinan).","hydrology":"Sandusky River watershed (1,825+ sq mi drainage); Broken Sword Creek (95 sq mi drainage, 82.6% agricultural land use) primary stream corridor through the wildlife area; over 100 managed ponds and impoundments provide shallow water habitat for migratory shorebirds and waterfowl; legacy agricultural tile drainage systems partially removed during restoration; historically part of the 30,000-acre Sandusky Plains wet prairie drained 1850s-1880s.","native_lands":"Wyandot (Wendat/waⁿdát), Shawnee (Šawanwaki), and Delaware (Lenape); Wyandot County named for the Wyandot nation who held the Sandusky Plains and upper Sandusky River corridor; Cranberry Swamp at Broken Sword Creek, a named Wyandot wetland outside the current wildlife area boundary, was reserved as a 1 square-mile parcel in Article 4 of the Treaty of Maumee Rapids (September 29, 1817); Treaty of Greene Ville (August 3, 1795) ceded northwestern Ohio including Wyandot County; Treaty of Maumee Rapids (1817) ceded 4.6 million acres of northwestern Ohio and Indiana while reserving 12 square miles at Upper Sandusky and the Cranberry Swamp parcel on Broken Sword Creek; Wyandot signed 19 treaties with the United States before final removal; more than 600 Wyandot departed Upper Sandusky on foot in July 1843, traveling to Cincinnati then by steamboat west, arriving in Kansas to find no land available, and subsequently removed again to Oklahoma Indian Territory.","displacement_tenure":"Ceded via Treaty of Greene Ville (1795, Article 3) and Treaty of Maumee Rapids (September 29, 1817), extinguishing Wyandot, Shawnee, and Delaware title to Wyandot County; Cranberry Swamp reserve on Broken Sword Creek extinguished by subsequent cessions; Wyandot County organized 1845 following final removal; Sandusky Plains wet prairie drained and converted to agricultural row crop production through the second half of the 19th century; Ohio Division of Wildlife began acquiring farmland parcels in 1952, assembling the current 9,054-acre wildlife area through purchases completed by 2007; wetland and grassland restoration ongoing since acquisition.","shadow_history":"Cranberry Swamp at Broken Sword Creek, reserved by Article 4 of the Treaty of Maumee Rapids (1817) as a named Wyandot wetland parcel of 1 square mile, was extinguished by subsequent treaty cessions and converted to agricultural use following the forced removal of the Wyandot nation in July 1843; the July 1843 removal from Upper Sandusky of more than 600 Wyandot -- the last American Indian nation to leave Ohio -- was precipitated by sustained pressure from Ohio settlers and state government despite the Wyandot being among the most acculturated nations in the region; arriving in Kansas to find their promised lands unavailable, the Wyandot were subsequently removed again to Oklahoma; Killdeer Plains lies within the former 30,000-acre Sandusky Plains wet prairie, which was systematically drained for agriculture between the 1850s and 1880s through hand-dug ditches and clay tile drainage; land was farmed as row crops through the mid-20th century before state acquisition beginning in 1952; legacy agricultural tile drainage infrastructure was largely reversed during wetland restoration, but Broken Sword Creek (82.6% agricultural land use in watershed) remains designated as impaired under Ohio EPA criteria.","ecology":"Restored wetland and native grassland complex on former Sandusky Plains wet prairie; habitat mosaic includes managed impoundments (over 100 ponds from less than 1 acre to 50 acres), a 360-acre green tree reservoir, native grasslands, grain crop fields maintained for wildlife, and oak-hickory woodlands; one of the premier sandhill crane (Antigone canadensis) migration staging areas in Ohio with 10,000+ cranes observed in fall as part of the mid-continent population of 660,000+; 275 documented bird species including grassland breeders bobolink (Dolichonyx oryzivorus), dickcissel (Spiza americana), upland sandpiper (Bartramia longicauda), Henslow's sparrow (Centronyx henslowii), and loggerhead shrike (Lanius ludovicianus); northern harrier and short-eared owl regular in fall migration.","conservation_status":"Ohio State Wildlife Area (Ohio DNR Division of Wildlife, acquired 1952-2007); Killdeer Plains-Big Island Important Bird Area (IBA, Ohio IBA Program, 13,659 combined acres with adjacent Big Island Wildlife Area); designated sandhill crane migration staging area for the mid-continent population.","endangered_species":"Loggerhead shrike (Lanius ludovicianus, Ohio state-endangered, federal candidate species); upland sandpiper (Bartramia longicauda, Ohio state-endangered); Henslow's sparrow (Centronyx henslowii, species of conservation concern, 53% population decline since 1970).","gps":"40.7158° N, 83.3150° W","primary_nation":"Wyandot","agency_type":"State wildlife area"}},{"type":"Feature","geometry":{"type":"Point","coordinates":[-83.198,42.0117]},"properties":{"slug":"pointe-mouillee-state-game-area","name":"Pointe Mouillee State Game Area","state":"MI","acreage":"4,040","geology":"~375 Mya Late Devonian shale and carbonate (Famennian); bedrock overlain by Pleistocene Wisconsin glacial and lacustrine deposits; site occupies the Lake Erie lake plain formed by the drainage of glacial Lake Maumee ~14,500 ya.","epoch":"Late Devonian (Famennian).","hydrology":"Western Lake Erie basin, Monroe and Wayne counties; Huron River (126-mile main stem, 908 sq mi watershed draining Oakland, Livingston, Washtenaw, Wayne, and Monroe counties) enters Lake Erie at the northern margin; River Raisin enters Lake Erie approximately 8 miles southwest; mechanical pump system with artificial dike cells controls water levels across discrete marsh units, replacing natural hydrologic cycling disrupted by Huron River dam and lake level management.","native_lands":"Ottawa (Odawa/Anishinaabek), Potawatomi (Bodéwadmik), Wyandot (Wendat/Huron), and Ojibwe (Anishinaabek); Lake Erie shore and Huron River mouth a key resource corridor in Anishinaabe territory; Treaty of Detroit (November 17, 1807) ceded ~5.6 million acres of southeastern Michigan including Monroe County; Potawatomi received $400 annual annuity for communities on River Raisin and Lake Erie tributaries; Potawatomi removed via Treaty of Chicago (1833) and forced relocation 1838-1840 (Potawatomi Trail of Death); Wyandot ceded remaining Michigan and Ohio lands via treaty 1842, removed to Kansas 1843.","displacement_tenure":"Ceded via Treaty of Detroit (November 17, 1807); land entered private agricultural ownership through 19th century; coastal wetlands drained for agriculture and reduced from historic extent; site held as a private hunting club through early 20th century; State of Michigan acquired land in 1945, establishing Pointe Mouillee State Game Area; U.S. Army Corps of Engineers and Michigan DNR agreed in 1974 to establish the Confined Disposal Facility at Pointe Mouillee for containment of polluted dredge material from the Detroit and Rouge rivers; CDF dike structure (Big Banana) constructed 1974-1979; marsh restoration initiated in cooperation with Army Corps and USFWS.","shadow_history":"U.S. Army Corps of Engineers Confined Disposal Facility (Big Banana), a 700-acre crescent-shaped dike structure 3.5 miles long and 1,400 feet wide constructed 1974-1979, contains contaminated dredge spoil from the Detroit River and Rouge River carrying PCBs, heavy metals, and PAHs; designed to replace open-lake dredge disposal that spread industrial pollutants across Lake Erie sediments; facility projected to reach capacity by 2029 with no replacement site identified as of 2025; historic loss of approximately 95% of western Lake Erie emergent marsh through 19th- and 20th-century agricultural drainage; Huron River dam disrupted natural hydrology and required mechanical pumping to restore wetland water levels; invasive hybrid cattail (Typha x glauca) has colonized large portions of the managed marsh, reducing fish diversity and suppressing native plant communities.","ecology":"One of the largest freshwater coastal marsh restoration projects in the Great Lakes; managed diked cell system supporting emergent cattail (Typha spp.) marsh, open water impoundments, wet meadow, and shrub swamp; more than 295 bird species documented with up to 300,000 diving ducks during fall migration; designated International Shorebird Importance Area (2001) supporting 10,000-20,000 shorebirds annually including globally significant concentrations of Lesser Yellowlegs and Short-billed Dowitcher; bald eagle, osprey, sandhill crane, black-crowned night heron, glossy ibis, and whimbrel regularly observed.","conservation_status":"Michigan State Game Area (established 1945, Michigan DNR Wildlife Division); Important Bird Area (IBA, National Audubon Society); Western Hemisphere Shorebird Reserve Network Site of Regional Importance; International Shorebird Importance Area (2001); North American Wetlands Conservation Act grant recipient.","endangered_species":"Piping plover (Charadrius melodus, federally Endangered, Great Lakes population); Eastern Massasauga rattlesnake (Sistrurus catenatus, federally Threatened since 2016); Eastern fox snake (Pantherophis gloydi, Michigan state-threatened); Eastern prairie fringed orchid (Platanthera leucophaea, Michigan state-endangered).","gps":"42.0117° N, 83.1980° W","primary_nation":"Ottawa (Odawa)","agency_type":"State game area"}},{"type":"Feature","geometry":{"type":"Point","coordinates":[-83.384,38.7924]},"properties":{"slug":"edge-of-appalachia","name":"Edge of Appalachia Preserve","state":"OH","acreage":"21,000","geology":"~430 Mya Silurian dolomite (Peebles Dolomite, Wenlockian stage); underlying Ordovician shale and limestone exposed in stream valley bottoms","epoch":"Middle Silurian (Wenlockian)","hydrology":"Ohio Brush Creek watershed; Ohio Brush Creek, a 59.9-mile tributary of the Ohio River draining 435 square miles, flows through the preserve with canoe access at Creek's Bend; Cedar Run gorge feeds Cedar Falls, a 15-foot waterfall over Silurian limestone ledges","native_lands":"Adena (c. 1000 BC-AD 100) and Hopewell (c. 200 BC-500 AD) cultures with sustained presence in Adams County; Serpent Mound, a 1,348-foot effigy mound whose authorship is debated between Adena (~300 BCE, radiocarbon 2014/2019) and Fort Ancient (c. AD 1000-1550, charcoal 1991), sits on a bluff directly above Ohio Brush Creek 7 miles northeast of the preserve; both the Shawnee Tribe and Eastern Shawnee Tribe of Oklahoma hold formal ancestral connection to the site; the Warrior's Path, a major north-south Indigenous corridor linking the Great Lakes to the Carolinas, passed through the Ohio River corridor here; Shawandasse Tula (Shawanwaki/Shawnee) and Myaamia (Miami) held south-central Ohio; ceded via Treaty of Greene Ville (August 3, 1795); remaining Ohio Shawnee removed west via Treaty with the Shawnee 1831","displacement_tenure":"Adams County lies entirely within the Virginia Military District, opened to Virginia Continental Army land warrants beginning 1794 under metes-and-bounds survey; Indigenous title extinguished via Treaty of Greene Ville (August 3, 1795), whose Article 3 boundary placed Adams County fully within the ceded territory; approximately 25% of the Virginia Military District was subsequently acquired by 25 individuals through warrant speculation; Adams County organized 1797; The Nature Conservancy began acquiring preserve lands in 1959","shadow_history":"Killen Generating Station (closed 2018), situated within the Ohio Brush Creek drainage basin upstream from the Ohio River confluence, discharged coal ash slurry directly into the Ohio River during 2020 ash pond dewatering in more than 30 documented incidents; unlined ash ponds at Killen and J.M. Stuart Station continue to leach arsenic, boron, cobalt, lithium, and molybdenum into the regional aquifer above drinking-water standards; a 1977-79 archaeological survey documented prehistoric occupation at the Ohio Brush Creek-Ohio River confluence at the Killen site before the area was committed to ash disposal","ecology":"Mixed mesophytic forest, dry limestone prairies, and cedar barrens on thin Silurian dolomite soils along the Appalachian Escarpment; 30 ecological communities, 8 globally rare; over 1,200 plant species including American bluehearts (Buchnera americana), rattlesnake master (Eryngium yuccifolium), and gladecress; holds the only Allegheny woodrat (Neotoma magister) population in Ohio; green salamander (Aneides aeneus, Ohio-listed Endangered) documented; among the most biologically diverse areas in the Midwestern United States","conservation_status":"National Natural Landmark (component preserves Lynx Prairie, Buzzardroost Rock, Red Rock, and The Wilderness designated 1967); Ohio's largest privately owned nature preserve","endangered_species":"Indiana bat (Myotis sodalis), federally Endangered; green salamander (Aneides aeneus) and Allegheny woodrat (Neotoma magister), both Ohio-listed Endangered","gps":"38.7924° N, 83.3840° W","primary_nation":"Adena","agency_type":"Private preserve"}},{"type":"Feature","geometry":{"type":"Point","coordinates":[-84.3708,39.0343]},"properties":{"slug":"st-annes-woods-and-wetlands","name":"St. Anne's Woods and Wetlands","state":"KY","acreage":"165","geology":"~450 Mya Upper Ordovician shale and fossiliferous limestone (Kope Formation, Cincinnatian Series); Ohio River alluvium at site","epoch":"Late Ordovician (Cincinnatian)","hydrology":"Ohio River floodplain; site drains directly to the Ohio River; seasonal depression wetlands (vernal pools) fill from snowmelt and spring precipitation and dry by summer; no named tributary creek within the preserve boundaries","native_lands":"Adena (c. 1000 BC-100 AD) and Hopewell (c. 200 BC-500 AD) cultures present in Ohio River valley; Fort Ancient culture (c. 1000-1650 AD) maintained villages along the Ohio River and major Northern Kentucky tributaries; Shawandasse Tula (Shawanwaki/Shawnee) ranged through Northern Kentucky as hunting territory in the historic period; Ohio River corridor a contested boundary zone between multiple nations through the mid-18th century; Shawnee ceded regional lands via Treaty of Greene Ville (August 3, 1795)","displacement_tenure":"Northern Kentucky is outside the federal-domain Royce cession system. Virginia created Kentucky County 1776 and enacted the Virginia Land Act 1779, opening Kentucky to land warrants and grants; Campbell County established 1794; Kentucky statehood 1792; the Congregation of Divine Providence acquired the land c. 1908 and established St. Anne's Convent 1919; the Diocese of Covington purchased the convent building in 2013 while the Campbell County Conservation District purchased the wetlands (165 acres) in September 2013 using a Kentucky Heritage Land Conservation Fund grant; a perpetual conservation easement is held by the Commonwealth of Kentucky","shadow_history":"The land was donated in 1909 by Catholic layman Peter O'Shaughnessy to the Sisters of Divine Providence; the prior ownership chain and any antebellum land history remain undocumented in public records.","ecology":"Old-growth American beech (Fagus grandifolia) forest and Ohio River floodplain depression wetlands; one of the last undisturbed wetland remnants along the Ohio River in Northern Kentucky, documented by botanist E. Lucy Braun (University of Cincinnati) in 1916 as \"the best depression forest on the Ohio River floodplain\"; 451 total plant and animal species recorded including Jefferson's salamander (Ambystoma jeffersonianum), wood frog (Lithobates sylvaticus), spinulose woodfern (Dryopteris carthusiana), and American copper butterfly","conservation_status":"Perpetual conservation easement held by Commonwealth of Kentucky (Kentucky Heritage Land Conservation Fund); managed by Campbell County Conservation District","endangered_species":"Indiana bat (Myotis sodalis), federally Endangered; gray bat (Myotis grisescens), federally Endangered; both documented in on-site bat surveys","gps":"39.0343° N, 84.3708° W","primary_nation":"Adena","agency_type":"Conservation district"}},{"type":"Feature","geometry":{"type":"Point","coordinates":[-83.6078,37.8339]},"properties":{"slug":"red-river-gorge-geological-area","name":"Red River Gorge Geological Area","state":"KY","acreage":"29,000","geology":"~310 Mya Pennsylvanian Corbin Sandstone (Grundy Formation, Pottsville Escarpment); deposited in marine and deltaic river delta environments beginning ~340 Mya; prominent iron-oxide Liesegang banding; over 100 natural sandstone arches, highest concentration east of the Mississippi River.","epoch":"Early Pennsylvanian (Morrowan).","hydrology":"Red River drains the gorge through Powell, Wolfe, and Menifee counties before joining the Kentucky River; 19.4-mile section designated National Wild and Scenic River (December 3, 1993) and Kentucky Wild River; Swift Camp Creek and unnamed tributaries upstream of the gorge listed as impaired by Kentucky Division of Water due to sedimentation and loss of riparian vegetation.","native_lands":"Paleoindian peoples first documented in gorge rock shelters c. 10,000 BC; continuous occupation through Archaic and Woodland periods (~12,000 years total); 664 known prehistoric and historic sites including some of the earliest evidence of plant domestication in eastern North America; Tsalagi (Cherokee) held eastern Kentucky as territorial range in the historic period; Shawandasse Tula (Shawanwaki/Shawnee) ranged throughout central Kentucky as a shared hunting corridor; Kentucky was contested hunting ground, not permanently settled by any single nation in the historic period; Cherokee ceded eastern Kentucky via Treaty of Hard Labor (October 1768) and Treaty of Lochaber (October 18, 1770); Shawnee resistance continued through the 1790s, with territorial claims extinguished via Treaty of Greene Ville (August 3, 1795).","displacement_tenure":"Eastern Kentucky is outside the federal-domain Royce cession system. Cherokee ceded eastern Kentucky via Treaty of Hard Labor (October 1768) and Treaty of Lochaber (October 18, 1770), extending the colonial boundary to the Kentucky River; Henderson's Transylvania Purchase (March 17, 1775) from Overhill Cherokee chiefs at Sycamore Shoals asserted private title but was voided by Virginia (1778) and North Carolina; Virginia created Kentucky County 1776 and enacted the Virginia Land Act 1779, opening eastern Kentucky to land warrants and grants; Kentucky statehood 1792; Daniel Boone National Forest lands assembled by USFS via purchase under the Weeks Act beginning 1916; Red River Gorge Geological Area designated by the USFS 1974.","shadow_history":"Congress authorized an Army Corps of Engineers dam project on the Red River in 1962 following that year's Great Flood of Clay City; the proposed dam would have flooded 2,100 acres, covering two-thirds of the gorge and destroying more than half of its plant and animal life; Sierra Club-organized opposition mounted a November 18, 1967 Dam Protest Hike through Clifty Wilderness led by Supreme Court Justice William O. Douglas with over 600 participants that drew national press coverage; two separate dam sites were proposed over the following decades; archaeological looting of rock shelters throughout the 20th century destroyed stratigraphic context at sites containing some of the earliest evidence of plant domestication in eastern North America; by 1990 all rock shelters in the gorge containing both white-haired goldenrod and Indian artifacts had been pillaged by looters; Solidago albopilosa was federally listed as threatened in part because looting-related disturbance uprooted the plant's stolons and seeds; the logging-era Nada Tunnel (1910-1912), a 900-foot passage blasted through sandstone for a narrow-gauge railroad, killed at least one worker during construction; the dam controversy concluded December 3, 1993 when President Clinton signed the Red River into the National Wild and Scenic River system.","ecology":"Mixed mesophytic forest on Pennsylvanian sandstone with diverse rock shelter microhabitats; Solidago albopilosa (white-haired goldenrod), an endemic found nowhere else on Earth, grows exclusively on sandstone ledges and rock shelter floors within the gorge; Canadian-origin relict flora in sheltered canyons includes purple fringed orchid (Platanthera grandiflora), Canada yew (Taxus canadensis), and Canada lily (Lilium canadense); black bear, timber rattlesnake (Crotalus horridus), and copperhead documented.","conservation_status":"National Natural Landmark (1975); National Archaeological District, National Register of Historic Places (2003); Clifty Wilderness Area (13,379 acres); Red River designated National Wild and Scenic River (19.4 miles, December 3, 1993) and Kentucky Wild River; within Daniel Boone National Forest (USDA Forest Service).","endangered_species":"Solidago albopilosa (white-haired goldenrod), endemic to gorge sandstone rock shelters; federally listed threatened 1988, delisted 2016 following population recovery.","gps":"37.8339° N, 83.6078° W","primary_nation":"Cherokee","agency_type":"USFS"}},{"type":"Feature","geometry":{"type":"Point","coordinates":[-83.2214,39.2417]},"properties":{"slug":"seip-earthworks","name":"Seip Earthworks","state":"OH","acreage":"121","geology":"~425 Mya Silurian dolomite (Peebles Dolomite, Tymochtee Dolomite); earthworks constructed on Pleistocene glacial outwash terrace above Paint Creek at the maximum extent of both the Illinoian and Wisconsinan glacial advances.","epoch":"Late Silurian (Ludlovian).","hydrology":"North bank of Paint Creek, a 94.7-mile tributary of the Scioto River draining 1,143 sq mi of south-central Ohio; site situated on Pleistocene glacial outwash terrace immediately adjacent to the Paint Creek floodplain near Bainbridge in Paxton Township, Ross County; LiDAR analysis has documented erosion of earthwork boundaries by old Paint Creek channels; Paint Creek Lake upstream moderates downstream flooding; Paint Creek and Rocky Fork Creek designated Ohio State Scenic Rivers 2021.","native_lands":"Adena (c. 1000 BC-100 AD) and Hopewell (c. 200 BC-500 AD) cultures; Seip lies within the densest 20-mile corridor of Hopewell monumental earthworks on the continent, running from Bainbridge to Chillicothe along the Paint Valley; Chalahgawtha (principal-town) division of the Shawandasse Tula (Shawanwaki/Shawnee) held the Paint Creek valley as the principal Shawnee territorial corridor; documented Chalahgawtha town at Frankfort on Paint Creek in Ross County; Myaamia (Miami) co-held south-central Ohio; Shawnee and Miami lands ceded via Treaty of Greene Ville (August 3, 1795), Article 3 boundary and Article 4 relinquishment; Shawnee removed west via Treaty with the Shawnee 1831 under Indian Removal Act 1830.","displacement_tenure":"Ceded via Treaty of Greene Ville (1795); Paxton Township lands entered private agricultural ownership under the Virginia Military District land grant system; site farmed throughout the 19th century and embankment walls leveled to approximately 10% of their original extent by agricultural plowing; Ohio Historical Society archaeologist William Mills excavated 1906-1909 under agreement with the private landowner; site donated to Ohio Historical Society by landowner James Seip 1923; added as an authorized unit of Hopewell Culture National Historical Park via Public Law 102-294 (May 27, 1992); full deed transferred to National Park Service September 3, 2014.","shadow_history":"William Mills (Ohio Historical Society) excavated three conjoined mounds at Seip 1906-1909, removing 48 burials and artifacts including copper, mica, bone, shell, and pearl objects to the Ohio State Museum in Columbus; Henry Shetrone and Emerson Greenman (Ohio Historical Society) excavated the main Seip Mound over three field seasons 1925-1928, removing 122 burials and elaborate grave goods including Isle Royale copper objects, Carolina mica sheets, five Tennessee effigy pipes known as the Great Pipes, woven milkweed-fiber textiles with preserved geometric designs, and thousands of freshwater pearl beads from a log-lined crypt, all transferred to museum collections in Columbus; farming throughout the 19th and early 20th centuries leveled embankment walls to approximately 10% of their original height before Ohio Historical Society acquisition; earthworks not under full federal protection until NPS deed transfer in 2014; LiDAR analysis has documented old stream channels cutting into original earthwork boundaries, indicating centuries of unmitigated flood erosion.","ecology":"Restored native tallgrass prairie within earthwork enclosures featuring big bluestem (Andropogon gerardii), switchgrass (Panicum virgatum), and Indiangrass (Sorghastrum nutans); reconstructed mound maintained as managed turf; riparian floodplain woodland edge along Paint Creek; 438 vascular plant species in 281 genera and 93 families documented across Hopewell Culture NHP units, representing 17% of Ohio's total flora; Ohio state-listed Spiranthes ovalis (oval ladies'-tresses) and Eleocharis ovata (ovate spike-rush) documented within the park.","conservation_status":"Hopewell Culture National Historical Park component (Public Law 102-294, May 27, 1992); National Register of Historic Places (NRIS 74001611, listed August 13, 1974); UNESCO World Heritage Site (Hopewell Ceremonial Earthworks, list no. 1689, inscribed September 19, 2023, criteria i and iii).","endangered_species":"no federally listed T&E species; Ohio state-listed Spiranthes ovalis (oval ladies'-tresses) and Eleocharis ovata (ovate spike-rush) documented within Hopewell Culture NHP.","gps":"39.2417° N, 83.2214° W","primary_nation":"Adena","agency_type":"NPS"}},{"type":"Feature","geometry":{"type":"Point","coordinates":[-83.472,39.1861]},"properties":{"slug":"rocky-fork-state-park","name":"Rocky Fork State Park","state":"OH","acreage":"3,464","geology":"~425 Mya Silurian dolomite (Peebles Dolomite, Ludlovian); 75-ft gorge incised more than 12,000 years ago when retreating Wisconsin glacier ice blocked Rocky Fork Creek's original drainage outlet, reversing stream flow direction and rapidly cutting through dolomite bedrock; carbonate dissolution formed cave systems in the gorge walls; collapsed cave ceilings visible as large slump blocks in the streambed.","epoch":"Middle Silurian (Wenlockian/Ludlovian).","hydrology":"Rocky Fork Creek drains 70,399 acres (~110 sq mi) before impoundment by Rocky Fork Lake; tributary of Paint Creek, which drains 1,143 sq mi to the Scioto River; gorge reach below the dam runs approximately 7.5 miles to confluence with Paint Creek near Bainbridge; Rocky Fork Creek reversed drainage direction approximately 25,000 years ago during Wisconsin glaciation; Rocky Fork Lake shoreline 31 miles, average depth approximately 15 ft, maximum depth approximately 40 ft; dam classified Class I by ODNR Division of Engineering; Paint Creek and Rocky Fork Creek proposed for Ohio State Scenic River designation (approximately 81.7 miles).","native_lands":"Hopewell culture (c. 200 BC-500 AD) constructed at least two ceremonial earthwork complexes within current park boundaries: Rocky Fork Park Site (NRHP 73001479), a double-concentric circular enclosure with gateways on its eastern side, and the Rocky Fork Park Group (NRHP listed 1973), a separate mound group on an adjacent hilledge; both sites were never plowed, preserving their original earthwork profiles; Chalahgawtha (principal-town) division of the Shawandasse Tula (Shawanwaki/Shawnee) used the Paint Creek and Rocky Fork Creek corridors as principal travel routes and considered the Paint Valley home territory; Myaamia (Miami) co-held southern Ohio; Shawnee lands ceded via Treaty of Greene Ville (August 3, 1795), Article 3; remaining Shawnee removed west via Treaty with the Shawnee 1831 under Indian Removal Act 1830.","displacement_tenure":"Ceded via Treaty of Greene Ville (1795, Article 3), extinguishing Shawnee and Miami title to Highland County; county organized 1805 and entered private agricultural ownership; Rocky Fork Creek valley acquired by Ohio Division of Conservation and Natural Resources for reservoir and recreation development; Rocky Fork State Park established 1950; dam construction began 1951, water first impounded April 1953; Rocky Fork Lake (2,080 acres, 31-mile shoreline, dam 74 ft high and 380 ft long, 30,000 cubic yards of concrete) was constructed strictly for recreational purposes, not flood control; condemnation and flooding of valley-floor agricultural land required displacement of farm families.","shadow_history":"Rocky Fork Lake impounded 1951-1953, flooding the Rocky Fork Creek bottomland and requiring condemnation of valley-floor farm properties; the Blue Ribbon Road covered bridge was among the structures inundated; McCoppin's Mill (in continuous operation since 1829 using water turbines) survived — the dam was built upstream — and operated until the 1970s; Rocky Fork Gorge State Nature Preserve (86 acres, Miller Nature Sanctuary), the only state nature preserve in Highland County, was not dedicated until 1982, leaving the gorge corridor without formal protection for nearly 30 years after park establishment; two Hopewell earthwork complexes within park boundaries, Rocky Fork Park Site and Rocky Fork Park Group (NRHP listed 1973), remain without dedicated on-site archaeological interpretation; Rocky Fork Creek biological communities have performed as badly as or worse than at any time since the initial Ohio EPA study in 1991, impaired by agricultural runoff, failing Home Sewage Treatment Systems, and elevated E. coli concentrations.","ecology":"Mixed mesophytic forest on Silurian dolomite uplands, with alkaline-loving rare plant communities on gorge cliff faces; Sullivantia sullivantii (Sullivant's coolwort, Saxifragaceae) grows profusely on moist seeping dolomite cliffs in the gorge, blooming mid-summer; extremely rare in Ohio and known from only ten midwestern states; snow trillium (Trillium nivale), American Columbo (Frasera caroliniensis, requiring up to 30 years to produce its 5-ft flowering stalk), royal catchfly, queen-of-the-prairie, and prairie dock documented at the gorge preserve; fine-rayed pocketbook mussel (Ohio state-threatened) and 118 fish species documented in the Rocky Fork and Paint Creek watershed; river otter, bald eagle, osprey, cerulean warbler, and Louisiana waterthrush among 230+ bird species; Rocky Fork Creek and Paint Creek jointly rated Exceptional Warmwater Habitat by Ohio EPA.","conservation_status":"Ohio State Park (established 1950); Rocky Fork Gorge State Nature Preserve (86 acres, Miller Nature Sanctuary, dedicated 1982, expanded 1986; sole state nature preserve in Highland County); Rocky Fork Park Site (NRHP 73001479) and Rocky Fork Park Group (NRHP listed 1973) within park boundaries; Paint Creek and Rocky Fork Creek proposed for Ohio State Scenic River designation.","endangered_species":"Sullivantia sullivantii (Sullivant's coolwort, not federally listed, extremely rare in Ohio); fine-rayed pocketbook mussel (Ohio state-threatened) in Rocky Fork Creek and Paint Creek watershed.","gps":"39.1861° N, 83.4720° W","primary_nation":"Shawnee","agency_type":"State park"}},{"type":"Feature","geometry":{"type":"Point","coordinates":[-83.0064,39.3758]},"properties":{"slug":"hopewell-culture-national-historical-park","name":"Hopewell Culture National Historical Park","state":"OH","acreage":"1,170","geology":"~375 Mya Devonian shale (Ohio Shale, Olentangy Shale); earthworks built on Pleistocene glacial outwash terraces.","epoch":"Late Devonian.","hydrology":"Scioto River watershed; Mound City Group on the west bank of the Scioto River north of Chillicothe, situated on Pleistocene glacial outwash terraces; Scioto River drains approximately 7,956 sq mi of central Ohio to the Ohio River; park units span Scioto River and Paint Creek drainages across Ross County.","native_lands":"Adena (c. 1000 BC-100 AD) and Hopewell (c. 1 CE-400 AD) cultures constructed the Mound City earthworks; no direct genealogical link between Hopewell builders and any historically documented tribe has been established; Chalahgawtha (principal-town) division of the Shawandasse Tula (Shawanwaki/Shawnee) returned to the Scioto valley c. 1738 following Haudenosaunee dispersal of Shawnee from the region in the 1670s-80s; the Scioto River Chalahgawtha town (c. 1758-1787) stood on the Scioto west bank near Paint Creek approximately 2-3 miles from Mound City, housing approximately 1,200 people including Tecumseh (b. 1768); Chillicothe, meaning principal town of the Chalahgawtha sept, was the moving political capital of the Shawnee nation with multiple documented locations across southern Ohio; Myaamia (Miami) held the Miami River valleys to the west; Shawnee and Miami lands ceded via Treaty of Greene Ville (August 3, 1795), Article 3 boundary and Article 4 relinquishment, with Shawnee receiving $1,000 annual annuity goods; remaining Shawnee removed west via Treaty with the Shawnee 1831 under Indian Removal Act 1830.","displacement_tenure":"Ceded via Treaty of Greene Ville (1795, Article 3); Mound City tract entered Virginia Military District ownership c. 1796-1798 when frontier land speculator Nathaniel Massie surveyed and acquired the land; Shriver family held title from 1832; Civil War militia used the site as Camp Logan drill ground in 1861; woodland cleared beginning c. 1856 and smaller mounds plowed under during agricultural use; U.S. Army purchased the land in 1917 and established Camp Sherman (construction began June 21, 1917), a 9,700-acre WWI training cantonment built over and around the earthworks, with more than 120,000 soldiers passing through before decommissioning 1921; Ohio Historical Society advocacy resulted in designation as Mound City Group National Monument via Proclamation 1653 (President Warren G. Harding, March 2, 1923) under the Antiquities Act (34 Stat. 225); Hopeton Earthworks added via Public Law 96-607 (1980); redesignated Hopewell Culture National Historical Park via Public Law 102-294 (May 27, 1992), adding Hopewell Mound Group, High Bank Works, and Seip Earthworks; inscribed UNESCO World Heritage Site as Hopewell Ceremonial Earthworks (list no. 1689, criteria i and iii) September 19, 2023.","shadow_history":"Squier and Davis opened mounds at Mound City in 1846, recovering approximately 200 stone effigy cremation pipes from Mound 8 (Mound of Pipes), the majority of the collection sent to the British Museum in London where it remains today; Warren K. Moorehead excavated the Hopewell Mound Group using horses and scrapers 1891-1892, obliterating stratigraphic context to collect artifacts for display at the 1893 World's Columbian Exposition in Chicago, artifacts distributed among the Field Museum, the Robert S. Peabody Institute of Archaeology, and other institutions; U.S. Army construction at Camp Sherman 1917 demolished virtually all mounds at Mound City except the large central Mound 7 to grade barracks, roads, pipelines, and railroad lines; mounds #13 and #23 were specifically cut down; excavation of the destroyed Mound 13 base in 1921 recovered cremated remains of 20 Hopewell individuals and a mica-lined grave representing only what was preserved at the base level, with all upper-context material permanently destroyed; artifacts unearthed during Army construction were taken as military souvenirs; the 813th Pioneer Infantry and other African American segregated units of the 92nd Division trained at Camp Sherman under white officers per Army policy; 1,777 soldiers died of influenza at Camp Sherman during the 1918 pandemic, with 125 deaths in a single day on October 8, 1918, and approximately 60% of Chillicothe's civilian population infected; all leveled mounds were reconstructed by Ohio Historical Society from the 1846 Squier-Davis survey maps, the original fill and artifact context permanently destroyed.","ecology":"Mixed-grass meadow and early successional floodplain woodland on Scioto River glacial outwash terraces; Mound City unit comprises approximately 40 acres managed hay field, 40 acres mixed mesophytic forest, and reconstructed earthworks on managed turf; 438 vascular plant species in 281 genera and 93 families documented across all park units (17% of Ohio's total flora; 65 new county records); habitat for Henslow's Sparrow (species of conservation concern in Eastern Tallgrass Prairie region); Ohio state-listed Spiranthes ovalis (oval ladies'-tresses) and Eleocharis ovata (ovate spike-rush) documented within park.","conservation_status":"National Historical Park via Public Law 102-294 (May 27, 1992); UNESCO World Heritage Site (Hopewell Ceremonial Earthworks, list no. 1689, inscribed September 19, 2023, criteria i and iii); National Register of Historic Places.","endangered_species":"no federally listed T&E species (NPS confirmed); Ohio state-listed Spiranthes ovalis (oval ladies'-tresses) and Eleocharis ovata (ovate spike-rush) documented within park.","gps":"39.3758° N, 83.0064° W","primary_nation":"Shawnee","agency_type":"NPS"}},{"type":"Feature","geometry":{"type":"Point","coordinates":[-81.0758,38.07]},"properties":{"slug":"new-river-gorge-national-park","name":"New River Gorge National Park and Preserve","state":"WV","acreage":"72,808","geology":"~325 Mya Pennsylvanian and Mississippian sandstone, shale, and coal seams.","epoch":"Pennsylvanian (Carboniferous).","hydrology":"New River drains into the Kanawha River and the Ohio River system; park corridor encompasses approximately 85 km (53 miles) of the New River; tributaries include the Bluestone and Greenbrier Rivers; gorge characterized by pools, shoals, riffles, and cascades.","native_lands":"Shawnee (Shawanwaki) and Cherokee (Aniyvwiya) maintained hunting territories throughout the New River drainage; Shawnee forces under Chief Cornstalk fought Virginia militia at the Battle of Point Pleasant (October 10, 1774), a decisive engagement leading to the Treaty of Camp Charlotte (October 19, 1774), in which the Shawnee agreed to cease hunting south of the Ohio River and recognize Virginia's territorial claims; Seneca (Onöndowa'ga:') of the Haudenosaunee Confederacy maintained the Seneca Trail corridor (present US-219) through the region; Moneton peoples documented in pre-contact archaeological evidence; more than 400 archaeological sites along the New, Gauley, and Bluestone Rivers record at least 11,000 years of continuous Indigenous occupation; Shawnee removed to Kansas beginning 1831 under Treaty of Wapakoneta; Loyal Shawnee relocated to Indian Territory (Oklahoma) 1869-1871.","displacement_tenure":"New River Gorge area was part of Virginia's colonial charter (1609) and not included in the Virginia Cession of 1784 to the federal government; lands remained under private Virginia and later West Virginia (statehood June 20, 1863) ownership through coal and timber grants; federal acquisition began when Congress established New River Gorge National River (November 10, 1978, Pub. L. 95-625), with NPS purchasing coal and timber company lands through the 1990s; designated National Park and Preserve December 27, 2020.","shadow_history":"The gorge's coal company towns enforced a scrip economy in which workers were paid in currency redeemable only at company stores, with markups ensuring perpetual indebtedness; armed guards controlled movement in and out of gated communities. African American miners comprised more than 25% of West Virginia's mining workforce by 1909; Helen, WV (developed by East Gulf Coal Company) enforced strict residential and educational segregation above ground while Black and white workers received equal wages for equal work underground; NPS documents segregated housing, schools, and churches at Nuttallburg and Helen. Coal processing operations associated with the gorge's mines introduced heavy metals into New River tributaries, a pattern documented across the Appalachian coalfield. Segregated CCC companies operated in the region 1933-1942 following Director Robert Fechner's 1935 segregation order.","ecology":"Mixed Mesophytic forest with oak-hickory on xeric south-facing slopes and hemlock-hardwood (Tsuga canadensis, Fagus grandifolia) in cool mesic coves; understory of Rhododendron maximum and mountain laurel; 1,383 vascular plant species documented across 41 community types.","conservation_status":"National Park and Preserve (designated December 27, 2020; formerly National River, established 1978).","endangered_species":"Indiana bat (Myotis sodalis), Virginia big-eared bat (Corynorhinus townsendii virginianus), eastern hellbender (Cryptobranchus alleganiensis), northern long-eared bat (Myotis septentrionalis, reclassified Endangered March 2023).","gps":"38.0700° N, 81.0758° W","primary_nation":"Shawnee","agency_type":"NPS"}},{"type":"Feature","geometry":{"type":"Point","coordinates":[-84.7474,38.8838]},"properties":{"slug":"big-bone-lick","name":"Big Bone Lick State Historic Site","state":"KY","acreage":"525","geology":"~450 Mya Ordovician limestone and shale (Kope Formation); Pleistocene fossil-bearing bog deposits (25,000-12,000 BP).","epoch":"Late Ordovician (Cincinnatian Series); late Pleistocene (Wisconsinan Glaciation).","hydrology":"Big Bone Creek drainage, a tributary of the Ohio River; sulphur-bearing mineral springs emerge from the Ordovician bedrock and discharge into the creek floodplain, forming the historic salt lick; Pleistocene fossil record owes its preservation to glacial meltwater drainage from the Laurentide ice sheet during the Wisconsinan Glaciation, which created standing-water conditions that trapped megafauna; Ohio River basin.","native_lands":"Paleoindians from at least ~12,000 BP · Shawnee (Shawanwaki) · Delaware (Lenape); the salt springs drew Indigenous hunters for millennia; Shawnee used the lick as a salt source and hunting ground; Mary Draper Ingles, captured by Shawnee in 1755, was brought to Big Bone Lick and put to work boiling brine; Iroquois Confederacy ceded their Ohio River corridor claim to the British Crown via Treaty of Fort Stanwix 1768, a transaction the Shawnee disputed; Shawnee ceded rights south of the Ohio under duress via Treaty of Camp Charlotte 1774 ending Lord Dunmore's War; Cherokee ceded overlapping claims via Treaty of Sycamore Shoals 1775, a private purchase nullified by Virginia 1778; two prehistoric burial mounds and a cemetery documented by the 1932 Webb-Funkhouser survey; 2008 excavation found possible cut marks on Pleistocene bones suggesting Paleoindian butchering.","displacement_tenure":"Kentucky was organized as a Virginia county in 1776 and was never part of the federal public domain; no federal Royce cession applies; Iroquois Confederacy ceded British Crown claim to lands south of the Ohio via Treaty of Fort Stanwix (1768), disputed by the Shawnee; Shawnee ceded rights south of the Ohio via Treaty of Camp Charlotte (1774); Cherokee claim extinguished via Treaty of Sycamore Shoals (1775), voided by Virginia 1778; Kentucky distributed as Virginia military bounty land grants prior to statehood 1792; the Big Bone Lick Historical Association purchased 16.66 acres and deeded them to the Kentucky State Commissioner for conservation, with the park formally established July 2, 1960.","shadow_history":"Big Bone Lick has been systematically stripped of paleontological material for nearly 300 years. In 1739, French-Canadian military commander Charles Le Moyne de Longueuil collected a tusk, femur, and molars and shipped them to Paris, where they entered Louis XV's Cabinet du Roi under Buffon's direction, initiating the first scientific attention to North American Pleistocene megafauna. In 1765-66, British Indian agent George Croghan extracted specimens on two expeditions; one collection was seized during an attack; the second was presented by Benjamin Franklin to the Royal Society of London. By the late 18th century, hundreds and possibly thousands of bones had been removed by collectors. President Thomas Jefferson, fixated on the site as a rebuttal to Buffon's theory of American animal degeneracy, dispatched Meriwether Lewis in October 1803 to collect specimens; those bones were loaded onto a keelboat and shipped south by river in early 1804 and the boat sank near Natchez, Mississippi, losing the entire collection. Jefferson then commissioned William Clark, who conducted a three-week excavation in fall 1807 with a ten-man crew, removing over 300 bones and teeth; Jefferson divided the collection among the Paris Museum of Natural History, the American Philosophical Society, and Monticello, where specimens were displayed in the Entrance Hall. Clark's 11-page description allowed naturalists to distinguish mammoths from mastodons for the first time, making this the first funded paleontological field excavation in North America. In 1962-67, University of Nebraska paleontologists recovered over 2,000 specimens now held at the University of Nebraska State Museum; four species were formally named from Big Bone Lick material. James Colquohoun operated a salt works at the site from approximately 1795 until 1812; Kentucky salt works of the era routinely used enslaved labor, and the 1800 Boone County census recorded 325 enslaved persons (21% of the county population), though direct documentary evidence tying enslaved workers to Colquohoun's operation has not yet been confirmed in available records. The Clay House hotel opened at Big Bone Lick in 1815 and operated until approximately 1845, serving planter families including the Clays and Breckinridges for mineral spring bathing; enslaved domestic service workers almost certainly staffed the operation, but no named records have been located.","ecology":"Mixed mesophytic forest with oak-hickory overstory on surrounding uplands; active sulphur spring and mineralized salt lick complex creating a distinctive halophytic microhabitat; native grassland and savanna remnants along Discovery Trail; wetland and bog habitat in the spring-fed lowland supports running buffalo clover (Trifolium stoloniferum, delisted 2021) and rare bats.","conservation_status":"Kentucky State Historic Site (established 1960); National Register of Historic Places (1972); National Natural Landmark (January 2009); National Historic Landmark (2024); Lewis and Clark Heritage Trail Site (2002).","endangered_species":"running buffalo clover (Trifolium stoloniferum, federally listed at time of park establishment, delisted by USFWS September 2021; population documented on site); Indiana bat (Myotis sodalis, federally endangered); northern long-eared bat (Myotis septentrionalis, federally endangered 2022).","gps":"38.8838° N, 84.7474° W","primary_nation":"Shawnee","agency_type":"State historic site"}},{"type":"Feature","geometry":{"type":"Point","coordinates":[-84.8153,38.9989]},"properties":{"slug":"dinsmore-woods","name":"Dinsmore Woods State Nature Preserve","state":"KY","acreage":"107","geology":"~450 Mya Ordovician limestone and shale.","epoch":"Late Ordovician (Cincinnatian Series); Kope, Fairview, and Bull Fork formations.","hydrology":"Ridgetop and slope site draining to Middle Creek, a direct tributary of the Ohio River; glacial outwash deposits underlie the site, producing deep, moisture-retentive soils unusual for Kentucky; Ohio River basin.","native_lands":"Adena culture (500 BCE-200 CE) · Shawnee (Shawanwaki) · Cherokee (Tsalagi); Adena moundbuilding culture occupied the Ohio River valley with documented sites in Boone County; Kentucky's interior served as contested hunting ground at the time of European contact; Iroquois Confederacy ceded their Ohio River corridor claim to the British Crown via Treaty of Fort Stanwix 1768; Cherokee ceded approximately 20 million acres including present-day Kentucky to the Transylvania Company via Treaty of Sycamore Shoals March 1775, opposed by Cherokee leader Dragging Canoe who called the cession a betrayal and withdrew to form the Chickamauga; Shawnee recognized the Ohio River as their southern boundary under Treaty of Camp Charlotte 1774, though many Shawnee rejected this cession; Shawnee and allied nations formally ceded remaining Ohio Valley claims via Treaty of Greenville 1795.","displacement_tenure":"Shawnee territory recognized as south of the Ohio River under Treaty of Camp Charlotte (1774), though many Shawnee rejected this cession; Cherokee claim extinguished via Henderson Purchase (Treaty of Sycamore Shoals, 1775), voided by Virginia 1778; Iroquois claim to the Ohio River valley ceded to the British Crown via Treaty of Fort Stanwix 1768; northern Kentucky distributed as Virginia military bounty land grants prior to Kentucky statehood 1792; no federal Royce cession applies; the Dinsmore Woods parcel was part of approximately 700 acres purchased by James and Martha Dinsmore in 1839; Martha Munro Ferguson Breasted, a Dinsmore descendant, donated 107 acres to The Nature Conservancy in 1985; dedicated as a Kentucky State Nature Preserve May 16, 1990; Boone County purchased the preserve from the Conservancy using Kentucky Heritage Land Conservation Fund proceeds in November 2010.","shadow_history":"The 107-acre nature preserve is the forested portion of the original Dinsmore farm, a working plantation on which enslaved people lived and labored from 1842 onward. James Dinsmore brought approximately ten to fifteen enslaved individuals from his Mississippi and Louisiana holdings to Kentucky upon completing Dinsmore Homestead in 1842. Those documented by name include: Coah (ca. 1790-1862), born in West Africa and previously enslaved in Mississippi and Louisiana; Nancy McGruder (ca. 1809-1906), purchased by Dinsmore ca. 1825 in Mississippi; Sally Taylor (ca. 1810-?) and her children John, Daniel, David, Nannette, Judy, Angeline, and Isaac. Jilson Hawkins (ca. 1811-1879) and Eliza Hawkins (ca. 1819-1903) remained in Louisiana until approximately 1862-63, joining the Kentucky farm during the Civil War. Nancy McGruder left the farm after the Civil War's end, then returned to work as a free person, living on the property until her death in 1906. The Dinsmore Homestead, listed on the National Register of Historic Places, installed interpretive panels documenting the African American experience on the farm from 1840 through 1865. The woodland tract that became the nature preserve was inseparable from this farm landscape; no public interpretation at the preserve connects the old-growth forest to the labor history of the people who lived among it.","ecology":"Old-growth mixed hardwood forest unlogged since at least the 1830s, dominated by sugar maple, white oak, hackberry, and walnut; understory of pawpaw thickets and rich spring ephemerals including trillium, bloodroot, dwarf larkspur, wood poppy, and trout lily on deep glacially influenced soils.","conservation_status":"Kentucky State Nature Preserve (dedicated May 16, 1990; managed by Boone County Fiscal Court under Office of Kentucky Nature Preserves).","endangered_species":"running buffalo clover (Trifolium stoloniferum, federall
